x-compatibility-notes:
  legacyBasePaths:
  - partners/*
  - terminal/*
  rules:
  - New integrations should use /api/v2/* only.
  - Legacy GET-with-body endpoints remain supported during transition but are deprecated.
  - External contracts use business names such as locationId and employeeId; internal
    DB names remain internal.
  - Legacy payloads may be translated server-side into v2 application commands before
    domain handling.
  endpointMapping:
  - legacy: partners/companies
    v2: GET /api/v2/companies
  - legacy: partners/locations
    v2: GET /api/v2/companies/{companyId}/locations
  - legacy: partners/employees
    v2: GET /api/v2/companies/{companyId}/employees
  - legacy: terminal/device
    v2: GET /api/v2/devices/{deviceId}
  - legacy: terminal/device/update
    v2: PATCH /api/v2/devices/{deviceId}
  - legacy: partners/order
    v2: POST /api/v2/orders
  - legacy: terminal/order
    v2: POST /api/v2/orders
  deprecationPolicy:
    status: legacy supported during migration
    rule: new integrations must target /api/v2/* only
    sunsetHeaders: recommended for legacy endpoints when rollout plan is approved
x-governance:
  contractStyle: business-resource naming externally, DB naming internal
  publicAudience: partners and first-party clients
  compatAudience: legacy clients during migration window
  namingConventions:
    ids: camelCase resource ids externally (companyId, locationId, employeeId, deviceId)
    timestamps: RFC3339 date-time strings with timezone offsets
    money: minor units unless otherwise agreed per endpoint
    envelopes: success uses data/meta, failures use error
    writes: POST/PATCH writes should support Idempotency-Key where retry safety matters
