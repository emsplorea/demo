                  organizationNumber: '1234'
                  website: https://example.com
                  phone: '+4744559988'
                  email: contact@example.com
                  about: Something about this company
                  countryId: 30
                  currencyId: 89
                  languageId: 1
                  shortCode: '1234'
                  capabilities:
