x-order-state-machine:
  statusField: status
  initialStatus: NEW
  terminalStatuses:
  - REJECTED
  - FULFILLED
  - CANCELLED
  transitions:
    NEW:
      allowedActions:
      - accept
      - reject
      - cancel
      nextStatuses:
      - ACCEPTED
      - REJECTED
      - CANCELLED
    ACCEPTED:
      allowedActions:
      - mark-in-progress
      - cancel
      nextStatuses:
      - IN_PROGRESS
      - CANCELLED
    IN_PROGRESS:
      allowedActions:
      - mark-ready
      - cancel
      nextStatuses:
      - READY
      - CANCELLED
    READY:
      allowedActions:
      - fulfill
      - cancel
      nextStatuses:
      - FULFILLED
      - CANCELLED
    REJECTED:
      allowedActions: []
      nextStatuses: []
    FULFILLED:
      allowedActions: []
      nextStatuses: []
    CANCELLED:
      allowedActions: []
      nextStatuses: []
  notes:
  - Partners must not assume unsupported transitions will be auto-coerced.
  - Actions returning HTTP 409 indicate an illegal transition from the current order
    status.
  - Service-type specific operational rules may add stricter validation, but may not
    broaden the canonical transition graph.
  - Cancelling from READY is supported by the canonical contract for operational recovery
    cases such as no-show customers or packing errors; integrations should supply
    a reason when available.
