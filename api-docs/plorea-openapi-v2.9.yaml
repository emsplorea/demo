openapi: 3.1.0
info:
  title: Plorea Public Integration API
  version: 2.9.0-draft
  summary: Canonical API-first contract for Plorea integrations (v2.9 draft)
  description: "Draft OpenAPI contract for Plorea's public integration layer.\n\n\
    Design goals:\n  - Use business-oriented resource names externally.\n  - Keep\
    \ database naming internal.\n  - Replace legacy GET-with-body patterns with query/path\
    \ params.\n  - Normalize response envelopes to data/meta/error.\n  - Support a\
    \ single Order Core across channels.\n\nThis spec is intended as a developer-ready\
    \ starting point for implementation,\nmock servers, contract review, and compatibility\
    \ mapping from legacy endpoints.\n\n\nVersion 2.1 additions:\n  - operationId\
    \ on all operations\n  - x-db-mapping on core schemas\n  - webhook event payload\
    \ schemas and examples\n  - expanded reusable error responses\n  - compatibility\
    \ notes for legacy partners/* and terminal/* migration\n\n\nVersion 2.2 additions:\n\
    \  - operationId naming cleanup for consistency\n  - x-domain-owner and x-audience\
    \ metadata on tags and operations\n  - x-tagGroups for clearer domain navigation\
    \ in docs\n  - lifecycle/deprecation metadata for compatibility paths and schemas\n\
    \  - standardized naming conventions section for public contract governance\n\n\
    \nVersion 2.3 additions:\n  - standardized 422 validation error usage across write\
    \ endpoints\n  - canonical list controls for pagination, sorting, sparse fieldsets,\
    \ and filtering guidance\n  - webhook signing headers and delivery security model\n\
    \  - expanded order edge-case examples for checkout and state transitions\n  -\
    \ reusable list contract metadata for developers and SDK generation\n\n\nVersion\
    \ 2.4 additions:\n  - enum cleanup and canonical naming guidance for public values\n\
    \  - request schema required-field review notes and PATCH semantics clarifications\n\
    \  - concrete response examples on list endpoints\n  - webhook retry policy and\
    \ delivery status model\n  - explicit legacy compatibility inventory with deprecation\
    \ targets\n\n\n\nVersion 2.5 additions:\n  - field-level validation guidance on\
    \ all public write request schemas\n  - standard filter contract per core resource\
    \ domain\n  - explicit idempotency policy metadata per write operation and globally\n\
    \  - webhook eventVersion and schemaVersion fields for event evolution\n\n\n\n\
    Version 2.6 additions:\n  - true PATCH schemas without inherited required fields\n\
    \  - normalized catalog item pricing/tax schema and examples\n  - corrected address\
    \ country example types\n  - explicit catalog read-only contract metadata\n  -\
    \ split OrderSummary vs Order detail examples for clearer SDK generation\n  -\
    \ consistent list/get/create/update operationId naming\n  - documented canonical\
    \ order state machine and allowed transitions\n\n\nVersion 2.7 additions:\n  -\
    \ implementation-readiness pass on nested request schemas and nullability notes\n\
    \  - explicit AddressInput schema for write operations\n  - fixed remaining PATCH\
    \ semantics gap on LocationUpdateRequest\n  - stronger required/minProperties\
    \ rules on partial updates\n  - consistency pass on core examples and schema descriptions\n\
    \  - added summary/detail examples for key read models\n\n\nVersion 2.9 additions:\n\
    \  - added inbound sync domain for upstream master-data ownership\n  - introduced\
    \ write-optimized endpoints for companies, locations, employees, menus, items,\
    \ modifiers, and VAT groups\n  - added batch item upsert for realistic partner\
    \ catalog synchronization\n  - documented source-system metadata, external references,\
    \ and idempotent sync behavior\n"
servers:
- url: https://api.plorea.com
  description: Production
- url: https://staging-api.plorea.com
  description: Staging
tags:
- name: Auth
  x-domain-owner: Platform / IAM
  x-audience: public
- name: Device Sessions
  x-domain-owner: Platform / IAM
  x-audience: public
- name: Companies
  x-domain-owner: Core Configuration
  x-audience: public
- name: Locations
  x-domain-owner: Core Configuration
  x-audience: public
- name: Employees
  x-domain-owner: Core Configuration
  x-audience: public
- name: Devices
  x-domain-owner: Order Experience
  x-audience: public
- name: Catalog
  x-domain-owner: Catalog & Pricing
  x-audience: public
- name: Availability
  x-domain-owner: Order Core
  x-audience: public
- name: Orders
  x-domain-owner: Order Core
  x-audience: public
- name: Webhooks
  x-domain-owner: Integrations
  x-audience: public
- name: Inbound Sync
  description: Write-optimized inbound synchronization endpoints for upstream master-data
    systems such as Amendo and RMSV.
  x-domain-owner: Integrations / Master Data Sync
  x-audience: partner-write
security:
- bearerAuth: []
paths:
  /api/v2/auth/login:
    post:
      tags:
      - Auth
      summary: Authenticate integration user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              basic:
                value:
                  email: partner@plorea.com
                  password: strong-secret
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLoginResponse'
              examples:
                success:
                  value:
                    data:
                      token: jwt_xxx
                      tokenType: Bearer
                      expiresAt: '2026-03-09T21:00:00+01:00'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
      operationId: createAuthToken
      x-domain-owner: Platform / IAM
      x-audience: public
      x-release-stage: draft
      x-idempotency:
        supported: false
        behavior: Not supported on this operation.
  /api/v2/me:
    get:
      tags:
      - Auth
      summary: Get authenticated integration context
      responses:
        '200':
          description: Current authenticated principal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
      operationId: getAuthenticatedContext
      x-domain-owner: Platform / IAM
      x-audience: public
      x-release-stage: draft
  /api/v2/device-sessions:
    post:
      tags:
      - Device Sessions
      summary: Resolve a device token into a runtime session context
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceSessionCreateRequest'
            examples:
              qrDevice:
                value:
                  deviceToken: devtok_live_xxx
      responses:
        '201':
          description: Device session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceSessionResponse'
              examples:
                resolved:
                  value:
                    data:
                      sessionToken: jwt_session_xxx
                      company:
                        id: cmp_120
                        name: Plorea Example
                      location:
                        id: loc_10
                        name: Steinkjer Sentrum
                        timezone: Europe/Oslo
                      device:
                        id: dev_8
                        name: QR Main Entrance
                        type: QR
                        active: true
        '404':
          $ref: '#/components/responses/NotFoundError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '429':
          $ref: '#/components/responses/RateLimitError'
      operationId: createDeviceSession
      x-domain-owner: Platform / IAM
      x-audience: public
      x-release-stage: draft
      x-idempotency:
        supported: true
        header: Idempotency-Key
        behavior: Returns the original result for safe client retries.
