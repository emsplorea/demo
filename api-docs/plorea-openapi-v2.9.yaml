x-artifacts:
  publicSpec: This file contains public endpoints, inbound sync endpoints, and migration
    notes.
  recommendedFutureSplit:
  - public-openapi.yaml
  - compatibility-notes.yaml
  - webhooks-openapi.yaml
x-contract-governance:
  enumNaming:
    rule: Public enums use stable canonical values. State enums use UPPER_SNAKE_CASE.
      Event types use lower.dot.case.
    examples:
      orderStatus: IN_PROGRESS
      serviceType: DELIVERY
      webhookEventType: order.status.changed
  patchSemantics:
    rule: PATCH request bodies are partial updates. Omitted fields remain unchanged.
      Null clears a nullable field only where explicitly supported by implementation.
  listContract:
    pagination: page + pageSize
    sorting: sort field optionally prefixed with - for descending order
    sparseFieldsets: fields comma-separated public field names only
  webhookDelivery:
    signature: HMAC-SHA256 over timestamp + raw body using webhook secret
    retryPolicy:
      strategy: exponential-backoff
      maxAttempts: 6
      scheduleSeconds:
      - 0
      - 30
      - 120
      - 600
      - 1800
      - 7200
  compatibility:
    legacyBasePaths:
    - partners/*
    - terminal/*
    policy: Legacy endpoints remain translation layers only. New integrations must
      use /api/v2/*.
  idempotency:
    header: Idempotency-Key
    appliesTo:
    - POST /api/v2/device-sessions
    - POST /api/v2/companies
    - POST /api/v2/companies/{companyId}/locations
    - POST /api/v2/companies/{companyId}/employees
    - POST /api/v2/locations/{locationId}/devices
    - POST /api/v2/orders
    - POST /api/v2/webhooks
    - POST /api/v2/webhooks/{webhookId}/test
    rule: When supplied, the server must return the original successful or failed
      result for the same authenticated caller, route, and key within the retention
      window.
    retentionWindowHours: 24
    conflictBehavior: Reuse of an Idempotency-Key with a materially different request
      body must return HTTP 409 with code IDEMPOTENCY_KEY_REUSED_WITH_DIFFERENT_PAYLOAD.
  ownershipModel:
    upstreamMasterData: Companies, locations, employees, catalog, VAT, prices, and
      menu structures may be owned by upstream systems such as RMSV and Amendo.
    ploreaOperationalData: Plorea remains the source of truth for availability, channel
      exposure, device rules, order flow, and order lifecycle.
  inboundSync:
    rule: Inbound sync endpoints are write-optimized and intended for upstream system
      integration, not channel rendering.
    matching: Implementations should match first on sourceSystem + externalId, then
      map to internal IDs.
