              schema:
                $ref: '#/components/schemas/CompanyListResponse'
              examples:
                default:
                  value:
                    data:
                    - id: cmp_120
                      name: Plorea Example
                      organizationNumber: '1234'
                      email: contact@example.com
                      phone: '+4744559988'
                      website: https://example.com
                      country:
                        id: cty_30
                        iso: 'NO'
                        name: Norway
                      currency:
                        id: cur_89
                        code: NOK
                        symbol: kr
                      language:
                        id: lang_1
                        code: nb
                      capabilities:
                        menuInUse: true
                        adminCodeEnabled: true
                        adyenEcomEnabled: true
                      settings: {}
                    meta:
                      page: 1
                      pageSize: 20
                      total: 1
        '401':
          $ref: '#/components/responses/UnauthorizedError'
      operationId: listCompanies
      x-domain-owner: Core Configuration
      x-audience: public
      x-release-stage: draft
      x-list-contract: canonical-page-sort-fields
      x-supported-filters: companies
    post:
      tags:
