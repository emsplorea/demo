<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Operational Control Page - v3 Device-Scoped</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0a0e1a;
      --bg-secondary: #141822;
      --bg-card: #1a1f2e;
      --border: #2a3142;
      --text-primary: #e4e8f0;
      --text-secondary: #9ca3b4;
      --accent-green: #00ff88;
      --accent-yellow: #ffb800;
      --accent-red: #ff3366;
      --accent-blue: #00d4ff;
      --accent-purple: #a855f7;
      --shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    body {
      font-family: 'Space Mono', monospace;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background:
        linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px),
        linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }

    .container { position: relative; z-index: 1; max-width: 1600px; margin: 0 auto; }

    /* Network Simulator */
    .network-simulator {
      position: fixed; top: 20px; right: 20px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px; z-index: 200; box-shadow: var(--shadow);
    }
    .network-simulator-title { font-size: 10px; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
    .network-buttons { display: flex; gap: 5px; }
    .network-btn {
      padding: 6px 10px; font-size: 10px; font-family: 'JetBrains Mono', monospace;
      border: 1px solid var(--border); background: var(--bg-primary); color: var(--text-secondary);
      cursor: pointer; border-radius: 4px; transition: all 0.2s; text-transform: uppercase;
    }
    .network-btn.active { background: var(--accent-green); color: var(--bg-primary); border-color: var(--accent-green); }
    .network-btn.offline { background: var(--accent-red); color: white; border-color: var(--accent-red); }
    .network-btn.slow { background: var(--accent-yellow); color: var(--bg-primary); border-color: var(--accent-yellow); }
    .network-btn.expired { background: var(--accent-purple); color: white; border-color: var(--accent-purple); }

    /* Sticky Header */
    .header {
      position: sticky; top: 0;
      background: var(--bg-secondary); border-bottom: 2px solid var(--accent-green);
      padding: 16px 30px; display: flex; justify-content: space-between; align-items: center;
      box-shadow: var(--shadow); z-index: 100; backdrop-filter: blur(10px);
    }
    .header-left h1 {
      font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700;
      color: var(--accent-green); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 3px;
    }
    .header-left .location { font-size: 13px; color: var(--text-secondary); }
    .header-left .last-change-meta { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
    .header-left .last-change-meta span { color: var(--accent-blue); }

    .status-badge {
      display: inline-block; padding: 5px 12px; border-radius: 6px;
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-left: 12px;
    }
    .status-badge.normal { background: rgba(0,255,136,0.15); color: var(--accent-green); border: 1px solid var(--accent-green); }
    .status-badge.busy { background: rgba(255,184,0,0.15); color: var(--accent-yellow); border: 1px solid var(--accent-yellow); }
    .status-badge.paused { background: rgba(255,51,102,0.15); color: var(--accent-red); border: 1px solid var(--accent-red); }

    .header-right { display: flex; align-items: center; gap: 10px; }
    .last-updated { font-size: 11px; color: var(--text-secondary); text-align: right; }
    .last-updated strong { color: var(--accent-blue); }
    .kbd-hint { font-size: 9px; color: var(--text-secondary); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
    .unsaved-indicator {
      display: inline-block; width: 8px; height: 8px;
      background: var(--accent-yellow); border-radius: 50%; animation: blink 1s infinite;
    }
    @keyframes blink { 0%,50%,100%{opacity:1} 25%,75%{opacity:0.3} }

    /* Sticky Operational Dashboard */
    .ops-dashboard {
      position: sticky; top: 69px; z-index: 90;
      background: var(--bg-secondary); border-bottom: 1px solid var(--border);
      padding: 12px 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    }
    .ops-dashboard-title {
      font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
    }
    .ops-dashboard-grid {
      display: flex; gap: 10px; flex-wrap: wrap;
    }
    .dash-device-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 14px; min-width: 180px; flex: 1;
    }
    .dash-device-card.paused { border-color: var(--accent-red); }
    .dash-device-card.busy { border-color: var(--accent-yellow); }
    .dash-device-card.open { border-color: rgba(0,255,136,0.4); }
    .dash-device-name { font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
    .dash-status { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
    .dash-status.open { color: var(--accent-green); }
    .dash-status.closed { color: var(--accent-red); }
    .dash-status.busy { color: var(--accent-yellow); }
    .dash-meta { font-size: 10px; color: var(--text-secondary); display: flex; flex-direction: column; gap: 2px; }
    .dash-meta span { display: flex; align-items: center; gap: 4px; }
    .dash-badge {
      font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 700;
    }
    .dash-badge.pickup { background: rgba(0,212,255,0.2); color: var(--accent-blue); border: 1px solid rgba(0,212,255,0.4); }
    .dash-badge.delivery { background: rgba(168,85,247,0.2); color: var(--accent-purple); border: 1px solid rgba(168,85,247,0.4); }
    .closing-soon-badge {
      font-size: 9px; padding: 1px 6px; border-radius: 3px; font-weight: 700;
      background: rgba(255,184,0,0.15); color: var(--accent-yellow); border: 1px solid var(--accent-yellow);
    }

    /* Buttons */
    button {
      font-family: 'JetBrains Mono', monospace; padding: 10px 20px; border: none;
      border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer;
      transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px;
      position: relative; overflow: hidden;
    }
    button::before {
      content: ''; position: absolute; top: 50%; left: 50%;
      width: 0; height: 0; border-radius: 50%; background: rgba(255,255,255,0.2);
      transform: translate(-50%,-50%); transition: width 0.4s, height 0.4s;
    }
    button:active::before { width: 300px; height: 300px; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary { background: var(--accent-green); color: var(--bg-primary); box-shadow: 0 0 20px rgba(0,255,136,0.3); }
    .btn-primary:hover:not(:disabled) { background: #00dd77; box-shadow: 0 0 30px rgba(0,255,136,0.5); transform: translateY(-1px); }
    .btn-primary.loading { background: rgba(0,255,136,0.5); cursor: wait; }
    .btn-secondary { background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border); }
    .btn-secondary:hover:not(:disabled) { background: var(--bg-secondary); border-color: var(--accent-blue); }
    .btn-danger { background: rgba(255,51,102,0.15); color: var(--accent-red); border: 1px solid var(--accent-red); }
    .btn-danger:hover:not(:disabled) { background: var(--accent-red); color: white; }
    .btn-sm { padding: 6px 12px; font-size: 10px; }

    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(0,0,0,0.3); border-top-color: var(--bg-primary);
      border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Quick Actions Bar */
    .quick-actions {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
      padding: 16px 20px; margin-bottom: 20px; box-shadow: var(--shadow);
    }
    .quick-actions-title { font-size: 12px; color: var(--accent-blue); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
    .quick-actions-grid { display: flex; gap: 10px; flex-wrap: wrap; }
    .quick-action-btn {
      padding: 12px 16px; background: var(--bg-primary); border: 1px solid var(--border);
      color: var(--text-primary); display: flex; align-items: center; gap: 8px; font-size: 11px; flex: 1; min-width: 160px;
    }
    .quick-action-btn:hover:not(:disabled) { border-color: var(--accent-green); background: rgba(0,255,136,0.05); }
    .quick-action-icon { font-size: 18px; }

    /* Content */
    .content { padding: 25px 30px; }
    .section {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
      padding: 22px; margin-bottom: 20px; box-shadow: var(--shadow);
      position: relative; overflow: hidden;
    }
    .section::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--accent-green), var(--accent-blue));
    }
    .section-title {
      font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 700;
      color: var(--accent-green); margin-bottom: 18px; text-transform: uppercase;
      letter-spacing: 2px; display: flex; align-items: center; gap: 10px;
    }
    .section-title::before { content: '■'; color: var(--accent-green); font-size: 12px; }

    /* Global Pause */
    .global-pause-bar {
      display: flex; align-items: center; gap: 20px; padding: 20px;
      background: rgba(255,51,102,0.05); border: 2px dashed var(--border);
      border-radius: 8px; transition: all 0.3s;
    }
    .global-pause-bar.active { background: rgba(255,51,102,0.12); border-color: var(--accent-red); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.85} }
    .global-pause-label { font-size: 15px; font-weight: 700; color: var(--accent-red); text-transform: uppercase; letter-spacing: 1px; }

    /* Toggle Switch */
    .toggle-switch {
      position: relative; width: 70px; height: 36px; background: var(--border);
      border-radius: 20px; cursor: pointer; transition: all 0.3s; min-width: 70px;
    }
    .toggle-switch.active { background: var(--accent-red); box-shadow: 0 0 20px rgba(255,51,102,0.5); }
    .toggle-switch.normal { background: var(--accent-green); box-shadow: 0 0 20px rgba(0,255,136,0.5); }
    .toggle-slider { position: absolute; top: 3px; left: 3px; width: 30px; height: 30px; background: white; border-radius: 50%; transition: all 0.3s; }
    .toggle-switch.active .toggle-slider { transform: translateX(34px); }
    .toggle-switch.large { width: 90px; height: 46px; }
    .toggle-switch.large .toggle-slider { width: 40px; height: 40px; }
    .toggle-switch.large.active .toggle-slider { transform: translateX(44px); }
    .toggle-switch.disabled-toggle { opacity: 0.4; cursor: not-allowed; }

    /* Device Controls */
    .devices-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 16px; }

    /* Bulk action bar */
    .bulk-bar {
      display: flex; align-items: center; gap: 10px; padding: 12px 16px;
      background: var(--bg-primary); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .bulk-bar-label { font-size: 11px; color: var(--text-secondary); white-space: nowrap; }
    .bulk-bar-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .preset-btn {
      padding: 8px 14px; background: var(--bg-card); border: 1px solid var(--accent-yellow);
      color: var(--accent-yellow); font-size: 12px; font-weight: 700; border-radius: 6px;
    }
    .preset-btn:hover:not(:disabled) { background: rgba(255,184,0,0.15); }
    .select-all-btn { font-size: 10px; color: var(--accent-blue); background: none; border: 1px solid var(--border); padding: 4px 8px; border-radius: 4px; }
    .select-all-btn:hover { border-color: var(--accent-blue); }

    /* Device Card */
    .device-card {
      background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 10px; padding: 18px; transition: all 0.3s;
    }
    .device-card:hover { border-color: var(--accent-blue); box-shadow: 0 4px 20px rgba(0,212,255,0.15); }
    .device-card.disabled { opacity: 0.5; pointer-events: none; }
    .device-card.selected { border-color: var(--accent-blue); background: rgba(0,212,255,0.04); }
    .device-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .device-checkbox { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent-blue); flex-shrink: 0; }
    .device-name { font-size: 14px; font-weight: 700; color: var(--accent-blue); text-transform: uppercase; letter-spacing: 1px; flex: 1; }
    .device-type-badge {
      font-size: 9px; padding: 2px 7px; border-radius: 4px; font-weight: 700; text-transform: uppercase;
      background: rgba(0,212,255,0.1); color: var(--accent-blue); border: 1px solid rgba(0,212,255,0.3);
    }
    .device-status-badge {
      font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 700;
    }
    .device-status-badge.open { background: rgba(0,255,136,0.15); color: var(--accent-green); border: 1px solid rgba(0,255,136,0.4); }
    .device-status-badge.busy { background: rgba(255,184,0,0.15); color: var(--accent-yellow); border: 1px solid rgba(255,184,0,0.4); }
    .device-status-badge.closed { background: rgba(255,51,102,0.15); color: var(--accent-red); border: 1px solid rgba(255,51,102,0.4); }

    .control-group { margin-bottom: 14px; }
    .control-label { display: block; font-size: 11px; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
    .input-with-validation { position: relative; }
    .validation-error { font-size: 11px; color: var(--accent-red); margin-top: 4px; }

    input[type="number"], textarea, input[type="text"], input[type="datetime-local"] {
      width: 100%; background: var(--bg-primary); border: 1px solid var(--border);
      border-radius: 6px; padding: 10px 12px; color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace; font-size: 13px; transition: all 0.2s;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--accent-green); box-shadow: 0 0 8px rgba(0,255,136,0.25); }
    input.error { border-color: var(--accent-red); }
    textarea { resize: vertical; min-height: 55px; }

    .char-count { font-size: 10px; color: var(--text-secondary); text-align: right; margin-top: 4px; }
    .char-count.warning { color: var(--accent-yellow); }
    .char-count.error { color: var(--accent-red); }

    .toggle-row { display: flex; align-items: center; gap: 12px; padding: 6px 0; }
    .toggle-row-label { font-size: 12px; color: var(--text-primary); flex: 1; }
    .toggle-mini { position: relative; width: 52px; height: 28px; background: var(--border); border-radius: 14px; cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
    .toggle-mini.active { background: var(--accent-green); }
    .toggle-mini.paused-toggle { background: var(--accent-red); }
    .toggle-mini-slider { position: absolute; top: 3px; left: 3px; width: 22px; height: 22px; background: white; border-radius: 50%; transition: all 0.2s; }
    .toggle-mini.active .toggle-mini-slider { transform: translateX(24px); }
    .toggle-mini.paused-toggle .toggle-mini-slider { transform: translateX(24px); }

    .closed-until-bar {
      margin-top: 10px; padding: 8px 12px; background: rgba(255,184,0,0.1);
      border: 1px solid var(--accent-yellow); border-radius: 6px; font-size: 11px; color: var(--accent-yellow);
      display: flex; align-items: center; justify-content: space-between;
    }
    .temp-hours-btn {
      padding: 6px 12px; font-size: 10px; background: var(--bg-primary); border: 1px solid var(--border);
      color: var(--text-secondary); border-radius: 4px; margin-top: 10px; width: 100%;
    }
    .temp-hours-btn:hover { border-color: var(--accent-yellow); color: var(--accent-yellow); }

    .online-lead-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* Product Availability */
    .product-search-row { display: flex; gap: 10px; margin-bottom: 16px; }
    .product-search-row input[type="text"] { flex: 1; }
    .product-search-row select {
      background: var(--bg-primary); border: 1px solid var(--border); border-radius: 6px;
      padding: 10px 12px; color: var(--text-primary); font-family: 'JetBrains Mono', monospace;
      font-size: 13px; min-width: 140px;
    }
    .product-list { display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; }
    .product-item {
      display: flex; align-items: center; justify-content: space-between; padding: 10px 14px;
      background: var(--bg-primary); border: 1px solid var(--border); border-radius: 6px;
    }
    .product-item.inactive { border-color: rgba(255,51,102,0.4); background: rgba(255,51,102,0.05); }
    .product-name { font-size: 13px; font-weight: 600; }
    .product-sku { font-size: 10px; color: var(--text-secondary); }
    .product-category { font-size: 10px; color: var(--accent-blue); padding: 2px 6px; background: rgba(0,212,255,0.1); border-radius: 3px; }
    .product-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .inactive-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
    .inactive-title { font-size: 12px; color: var(--accent-red); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
    .inactive-item {
      display: flex; align-items: center; justify-content: space-between; padding: 8px 12px;
      background: rgba(255,51,102,0.05); border: 1px solid rgba(255,51,102,0.3); border-radius: 6px; margin-bottom: 6px;
    }

    /* Audit Log */
    .audit-log { background: var(--bg-primary); border: 1px solid var(--border); border-radius: 8px; padding: 12px; max-height: 250px; overflow-y: auto; }
    .audit-entry { padding: 8px; border-bottom: 1px solid var(--border); font-size: 11px; display: flex; align-items: center; gap: 10px; }
    .audit-entry:last-child { border-bottom: none; }
    .audit-time { color: var(--text-secondary); min-width: 55px; }
    .audit-action { color: var(--accent-green); flex: 1; }
    .audit-user { color: var(--accent-blue); }

    /* Modal */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8); display: flex; align-items: center;
      justify-content: center; z-index: 1000; animation: fadeIn 0.2s;
    }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .modal {
      background: var(--bg-card); border: 2px solid var(--border); border-radius: 12px;
      padding: 28px; max-width: 560px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      animation: slideUp 0.3s; max-height: 80vh; overflow-y: auto;
    }
    @keyframes slideUp { from{transform:translateY(50px);opacity:0} to{transform:translateY(0);opacity:1} }
    .modal-title { font-size: 18px; font-weight: 700; color: var(--accent-red); margin-bottom: 14px; text-transform: uppercase; }
    .modal-body { color: var(--text-secondary); margin-bottom: 22px; line-height: 1.6; font-size: 14px; }
    .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; }

    .change-preview-list { background: var(--bg-primary); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin: 14px 0; }
    .change-preview-item { padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; display: flex; align-items: center; gap: 10px; }
    .change-preview-item:last-child { border-bottom: none; }

    .diff-view { background: var(--bg-primary); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin: 12px 0; font-family: 'JetBrains Mono', monospace; font-size: 11px; }
    .diff-line { padding: 3px 8px; margin: 2px 0; border-radius: 3px; }
    .diff-line.removed { background: rgba(255,51,102,0.15); color: var(--accent-red); }
    .diff-line.added { background: rgba(0,255,136,0.15); color: var(--accent-green); }

    /* Toast */
    .toast {
      position: fixed; bottom: 30px; right: 30px; background: var(--bg-card);
      border: 1px solid var(--accent-green); border-radius: 8px; padding: 14px 18px;
      box-shadow: var(--shadow); animation: slideInRight 0.3s; z-index: 1000; max-width: 380px;
    }
    @keyframes slideInRight { from{transform:translateX(400px)} to{transform:translateX(0)} }
    .toast.success { border-color: var(--accent-green); background: rgba(0,255,136,0.1); }
    .toast.error { border-color: var(--accent-red); background: rgba(255,51,102,0.1); }
    .toast.info { border-color: var(--accent-blue); background: rgba(0,212,255,0.1); }

    /* Banner */
    .banner {
      background: rgba(255,184,0,0.12); border: 1px solid var(--accent-yellow);
      border-radius: 8px; padding: 13px 18px; margin-bottom: 18px; display: flex; align-items: center; gap: 14px;
    }
    .banner.offline { background: rgba(255,51,102,0.12); border-color: var(--accent-red); }
    .banner-icon { font-size: 22px; }

    /* Shortcuts hint */
    .shortcuts-hint { position: fixed; bottom: 20px; left: 20px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 10px; color: var(--text-secondary); z-index: 100; }
    .shortcuts-hint strong { color: var(--accent-green); font-family: 'JetBrains Mono', monospace; }

    input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent-blue); }

    @media (max-width: 1024px) {
      .network-simulator { top: auto; bottom: 80px; right: 20px; }
      .shortcuts-hint { display: none; }
    }
    @media (max-width: 768px) {
      .header { flex-direction: column; gap: 12px; }
      .devices-grid { grid-template-columns: 1fr; }
      .online-lead-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // ─── MOCK DATA ───────────────────────────────────────────────────────────────
    const INITIAL_DEVICES = [
      {
        id: 'qr-floor1', name: 'QR – Floor 1', type: 'qr', icon: '🔲',
        paused: false, extra_lead_time: 0, message: '', closed_until: null,
        base_lead_time: 15, today_open_time: '08:00', today_close_time: '22:00',
        orders_next_hour: 12, closing_soon_warning: false
      },
      {
        id: 'qr-floor2', name: 'QR – Floor 2', type: 'qr', icon: '🔲',
        paused: false, extra_lead_time: 0, message: '', closed_until: null,
        base_lead_time: 15, today_open_time: '08:00', today_close_time: '22:00',
        orders_next_hour: 8, closing_soon_warning: false
      },
      {
        id: 'kiosk-entrance', name: 'Kiosk – Entrance', type: 'selfService', icon: '🖥️',
        paused: false, extra_lead_time: 0, message: '', closed_until: null,
        base_lead_time: 10, today_open_time: '08:00', today_close_time: '21:00',
        orders_next_hour: 5, closing_soon_warning: false
      },
      {
        id: 'online-main', name: 'Online – Delivery/Pickup', type: 'online', icon: '🌐',
        paused: false, extra_pickup_lead_time: 0, extra_delivery_lead_time: 0, message: '',
        closed_until: null, base_lead_time: 20, today_open_time: '09:00', today_close_time: '23:00',
        orders_next_hour: 22, closing_soon_warning: false,
        enable_pickup: true, enable_delivery: true
      }
    ];

    const MOCK_PRODUCTS = [
      { id: 1, name: 'X-Burguer Clássico', sku: 'BRG-001', category: 'Burgers' },
      { id: 2, name: 'X-Bacon Duplo', sku: 'BRG-002', category: 'Burgers' },
      { id: 3, name: 'Fritas Grandes', sku: 'FRT-001', category: 'Sides' },
      { id: 4, name: 'Onion Rings', sku: 'FRT-002', category: 'Sides' },
      { id: 5, name: 'Coca-Cola 500ml', sku: 'DRK-001', category: 'Drinks' },
      { id: 6, name: 'Suco de Laranja', sku: 'DRK-002', category: 'Drinks' },
      { id: 7, name: 'Sundae Chocolate', sku: 'DSR-001', category: 'Desserts' },
      { id: 8, name: 'Torta de Limão', sku: 'DSR-002', category: 'Desserts' },
      { id: 9, name: 'Salada Caesar', sku: 'SLD-001', category: 'Salads' },
      { id: 10, name: 'Wrap de Frango', sku: 'WRP-001', category: 'Wraps' },
    ];

    // ─── HELPERS ─────────────────────────────────────────────────────────────────
    const getDeviceStatus = (device, pauseAll) => {
      if (pauseAll || device.paused) return 'closed';
      if (device.closed_until && new Date(device.closed_until) > new Date()) return 'closed';
      if (device.type === 'online') {
        if ((device.extra_pickup_lead_time || 0) > 10 || (device.extra_delivery_lead_time || 0) > 10) return 'busy';
      } else {
        if ((device.extra_lead_time || 0) > 10) return 'busy';
      }
      return 'open';
    };

    const getEffectiveLeadTime = (device) => {
      if (device.type === 'online') {
        return device.base_lead_time + Math.max(device.extra_pickup_lead_time || 0, device.extra_delivery_lead_time || 0);
      }
      return device.base_lead_time + (device.extra_lead_time || 0);
    };

    const getOverallStatus = (pauseAll, devices) => {
      if (pauseAll) return 'paused';
      if (devices.some(d => getDeviceStatus(d, false) === 'busy')) return 'busy';
      return 'normal';
    };

    const clampLeadTime = (val, type) => {
      const max = type === 'online' ? 240 : 120;
      return Math.min(Math.max(0, parseInt(val) || 0), max);
    };

    // ─── SUBCOMPONENTS ───────────────────────────────────────────────────────────
    function ToggleMini({ active, onToggle, className = '' }) {
      return (
        <div
          className={`toggle-mini ${active ? (className || 'active') : ''}`}
          onClick={onToggle}
        >
          <div className="toggle-mini-slider"></div>
        </div>
      );
    }

    function DeviceCard({ device, pauseAll, selected, onSelect, onUpdate, onOpenTempHours }) {
      const status = getDeviceStatus(device, pauseAll);
      const effectiveLead = getEffectiveLeadTime(device);
      const isOnline = device.type === 'online';

      const updateField = (field, value) => onUpdate(device.id, field, value);

      return (
        <div className={`device-card ${pauseAll ? 'disabled' : ''} ${selected ? 'selected' : ''}`}>
          <div className="device-card-header">
            <input
              type="checkbox"
              className="device-checkbox"
              checked={selected}
              onChange={() => onSelect(device.id)}
              disabled={pauseAll}
            />
            <div className="device-name">{device.icon} {device.name}</div>
            <span className="device-type-badge">{device.type}</span>
            {device.closing_soon_warning && <span className="closing-soon-badge">⚠️ Closes soon</span>}
            <span className={`device-status-badge ${status}`}>{status}</span>
          </div>

          {/* Pause toggle */}
          <div className="toggle-row" style={{marginBottom: '14px'}}>
            <span className="toggle-row-label" style={{fontWeight: 700}}>
              {device.paused ? '⏸ Paused' : '▶ Active'}
            </span>
            <ToggleMini
              active={device.paused}
              onToggle={() => updateField('paused', !device.paused)}
              className="paused-toggle"
            />
          </div>

          {/* Lead times */}
          {isOnline ? (
            <div className="online-lead-grid">
              {device.enable_pickup && (
                <div className="control-group">
                  <label className="control-label">Pickup +Lead (min)</label>
                  <input
                    type="number" min="0" max="240"
                    value={device.extra_pickup_lead_time || 0}
                    onChange={(e) => updateField('extra_pickup_lead_time', clampLeadTime(e.target.value, 'online'))}
                  />
                  <div style={{fontSize:'10px',color:'var(--text-secondary)',marginTop:'3px'}}>
                    Effective: {device.base_lead_time + (device.extra_pickup_lead_time || 0)} min
                  </div>
                </div>
              )}
              {device.enable_delivery && (
                <div className="control-group">
                  <label className="control-label">Delivery +Lead (min)</label>
                  <input
                    type="number" min="0" max="240"
                    value={device.extra_delivery_lead_time || 0}
                    onChange={(e) => updateField('extra_delivery_lead_time', clampLeadTime(e.target.value, 'online'))}
                  />
                  <div style={{fontSize:'10px',color:'var(--text-secondary)',marginTop:'3px'}}>
                    Effective: {device.base_lead_time + (device.extra_delivery_lead_time || 0)} min
                  </div>
                </div>
              )}
            </div>
          ) : (
            <div className="control-group">
              <label className="control-label">Extra Lead Time (min)</label>
              <input
                type="number" min="0" max="120"
                value={device.extra_lead_time || 0}
                onChange={(e) => updateField('extra_lead_time', clampLeadTime(e.target.value, device.type))}
              />
              <div style={{fontSize:'10px',color:'var(--text-secondary)',marginTop:'3px'}}>
                Effective: {effectiveLead} min
              </div>
            </div>
          )}

          {/* Online-specific toggles */}
          {isOnline && (
            <div style={{marginBottom: '14px'}}>
              <div className="toggle-row">
                <span className="toggle-row-label">Enable Pickup</span>
                <ToggleMini active={device.enable_pickup} onToggle={() => updateField('enable_pickup', !device.enable_pickup)} />
              </div>
              <div className="toggle-row">
                <span className="toggle-row-label">Enable Delivery</span>
                <ToggleMini active={device.enable_delivery} onToggle={() => updateField('enable_delivery', !device.enable_delivery)} />
              </div>
            </div>
          )}

          {/* Pause message */}
          <div className="control-group">
            <label className="control-label">Pause Message (max 140)</label>
            <textarea
              maxLength="140"
              value={device.message || ''}
              onChange={(e) => updateField('message', e.target.value)}
              placeholder="Message shown to customers..."
            />
            <div className={`char-count ${(device.message||'').length > 120 ? 'warning' : ''}`}>
              {(device.message||'').length}/140
            </div>
          </div>

          {/* Closed until */}
          {device.closed_until && new Date(device.closed_until) > new Date() && (
            <div className="closed-until-bar">
              <span>⏰ Closed until {new Date(device.closed_until).toLocaleString()}</span>
              <button className="btn-sm btn-secondary" onClick={() => updateField('closed_until', null)}>Clear</button>
            </div>
          )}
          <button className="temp-hours-btn" onClick={() => onOpenTempHours(device)}>
            ⏰ Temporary Hours...
          </button>
        </div>
      );
    }

    // ─── MAIN COMPONENT ──────────────────────────────────────────────────────────
    function OpsControlPage() {
      const [serverState, setServerState] = useState(null);
      const [draftState, setDraftState] = useState(null);
      const [version, setVersion] = useState(1);
      const [hasUnsavedChanges, setHasUnsavedChanges] = useState(false);
      const [networkState, setNetworkState] = useState('online');
      const [showConflictModal, setShowConflictModal] = useState(false);
      const [showResetModal, setShowResetModal] = useState(false);
      const [showChangePreview, setShowChangePreview] = useState(false);
      const [toast, setToast] = useState(null);
      const [auditLog, setAuditLog] = useState([]);
      const [isApplying, setIsApplying] = useState(false);
      const [previousState, setPreviousState] = useState(null);
      const [lastChange, setLastChange] = useState(null);
      const [conflictDiff, setConflictDiff] = useState(null);
      const [showEmergencyConfirm, setShowEmergencyConfirm] = useState(false);
      const emergencyHoldTimer = useRef(null);
      const [emergencyHoldProgress, setEmergencyHoldProgress] = useState(0);
      const [resetConfirmText, setResetConfirmText] = useState('');

      // Device selection
      const [selectedDeviceIds, setSelectedDeviceIds] = useState(new Set());

      // Temp hours modal
      const [tempHoursDevice, setTempHoursDevice] = useState(null);
      const [tempHoursValue, setTempHoursValue] = useState('');

      // Product availability
      const [productSearch, setProductSearch] = useState('');
      const [productCategory, setProductCategory] = useState('All');
      const [inactiveItems, setInactiveItems] = useState([]);
      const productSearchTimer = useRef(null);
      const [productSearchDebounced, setProductSearchDebounced] = useState('');

      useEffect(() => {
        clearTimeout(productSearchTimer.current);
        productSearchTimer.current = setTimeout(() => setProductSearchDebounced(productSearch), 250);
      }, [productSearch]);

      // Initial load
      useEffect(() => {
        const mockData = {
          location: 'Plorea Brasil – São Paulo Centro',
          pauseAll: false,
          devices: JSON.parse(JSON.stringify(INITIAL_DEVICES)),
          lastUpdated: new Date().toISOString(),
          lastUpdatedBy: { staffId: 'cashier_42', staffName: 'Ana Silva', deviceId: 'terminal_3' }
        };
        setServerState(mockData);
        setDraftState(JSON.parse(JSON.stringify(mockData)));
        addAuditEntryStatic('System initialized', 'System');
      }, []);

      const addAuditEntryStatic = (action, user = 'System') => {
        const entry = { time: new Date().toLocaleTimeString(), action, user };
        setAuditLog(prev => [entry, ...prev].slice(0, 20));
      };

      const addAuditEntry = (action) => {
        const user = draftState?.lastUpdatedBy?.staffName || 'System';
        addAuditEntryStatic(action, user);
      };

      // Update draft
      const updateDraft = (updater) => {
        setDraftState(prev => {
          const next = JSON.parse(JSON.stringify(prev));
          updater(next);
          return next;
        });
        setHasUnsavedChanges(true);
      };

      // Update device field
      const updateDeviceField = (deviceId, field, value) => {
        updateDraft(draft => {
          const dev = draft.devices.find(d => d.id === deviceId);
          if (dev) dev[field] = value;
        });
      };

      // Selection
      const toggleDeviceSelection = (id) => {
        setSelectedDeviceIds(prev => {
          const next = new Set(prev);
          if (next.has(id)) next.delete(id); else next.add(id);
          return next;
        });
      };

      const selectAll = () => {
        if (!draftState) return;
        setSelectedDeviceIds(new Set(draftState.devices.map(d => d.id)));
      };

      const clearSelection = () => setSelectedDeviceIds(new Set());

      // Bulk actions
      const bulkAddLeadTime = (minutes) => {
        if (selectedDeviceIds.size === 0) {
          showToast('Select at least one device', 'error');
          return;
        }
        updateDraft(draft => {
          draft.devices.forEach(d => {
            if (!selectedDeviceIds.has(d.id)) return;
            if (draft.pauseAll || d.closed_until) return; // safety
            if (d.type === 'online') {
              if (d.enable_pickup) d.extra_pickup_lead_time = clampLeadTime((d.extra_pickup_lead_time || 0) + minutes, 'online');
              if (d.enable_delivery) d.extra_delivery_lead_time = clampLeadTime((d.extra_delivery_lead_time || 0) + minutes, 'online');
            } else {
              d.extra_lead_time = clampLeadTime((d.extra_lead_time || 0) + minutes, d.type);
            }
          });
        });
        showToast(`+${minutes} min applied to ${selectedDeviceIds.size} device(s)`, 'success');
      };

      const bulkPause = () => {
        if (selectedDeviceIds.size === 0) { showToast('Select at least one device', 'error'); return; }
        updateDraft(draft => { draft.devices.forEach(d => { if (selectedDeviceIds.has(d.id)) d.paused = true; }); });
        showToast(`Paused ${selectedDeviceIds.size} device(s)`, 'success');
      };

      const bulkResume = () => {
        if (selectedDeviceIds.size === 0) { showToast('Select at least one device', 'error'); return; }
        updateDraft(draft => { draft.devices.forEach(d => { if (selectedDeviceIds.has(d.id)) d.paused = false; }); });
        showToast(`Resumed ${selectedDeviceIds.size} device(s)`, 'success');
      };

      // Get changes
      const getChanges = () => {
        if (!draftState || !serverState) return [];
        const changes = [];
        if (draftState.pauseAll !== serverState.pauseAll) {
          changes.push({ icon: draftState.pauseAll ? '🔴' : '🟢', text: draftState.pauseAll ? 'Pause ALL ordering' : 'Resume all ordering' });
        }
        draftState.devices.forEach(dev => {
          const srv = serverState.devices.find(d => d.id === dev.id);
          if (!srv) return;
          if (dev.paused !== srv.paused) changes.push({ icon: dev.paused ? '⏸️' : '▶️', text: `${dev.paused ? 'Pause' : 'Resume'} ${dev.name}` });
          if (dev.type === 'online') {
            if ((dev.extra_pickup_lead_time||0) !== (srv.extra_pickup_lead_time||0)) changes.push({ icon: '⏱️', text: `${dev.name} pickup lead: +${dev.extra_pickup_lead_time||0} min` });
            if ((dev.extra_delivery_lead_time||0) !== (srv.extra_delivery_lead_time||0)) changes.push({ icon: '⏱️', text: `${dev.name} delivery lead: +${dev.extra_delivery_lead_time||0} min` });
          } else {
            if ((dev.extra_lead_time||0) !== (srv.extra_lead_time||0)) changes.push({ icon: '⏱️', text: `${dev.name} lead: +${dev.extra_lead_time||0} min` });
          }
          if (dev.closed_until !== srv.closed_until) changes.push({ icon: '⏰', text: `${dev.name}: temporary hours changed` });
        });
        return changes;
      };

      const handleApplyWithPreview = () => {
        const changes = getChanges();
        if (changes.length === 0) { showToast('No changes to apply', 'info'); return; }
        setShowChangePreview(true);
      };

      const handleApply = () => {
        setShowChangePreview(false);
        setIsApplying(true);
        setPreviousState(JSON.parse(JSON.stringify(serverState)));
        const delay = networkState === 'slow' ? 2000 : 500;
        setTimeout(() => {
          if (Math.random() < 0.12) {
            setConflictDiff([
              { type: 'removed', text: 'QR Floor 1 lead time: +0 min' },
              { type: 'added', text: 'QR Floor 1 lead time: +5 min (Carlos Mendes)' }
            ]);
            setShowConflictModal(true);
          } else {
            const ts = new Date().toLocaleTimeString();
            const summary = getChanges().map(c => c.text)[0] || 'Settings updated';
            setLastChange(`${summary} at ${ts} by ${draftState.lastUpdatedBy.staffName}`);
            setServerState(JSON.parse(JSON.stringify(draftState)));
            setVersion(v => v + 1);
            setHasUnsavedChanges(false);
            addAuditEntryStatic(summary, draftState.lastUpdatedBy.staffName);
            showToast('Changes applied successfully', 'success');
          }
          setIsApplying(false);
        }, delay);
      };

      const handleUndo = () => {
        if (previousState) {
          setDraftState(JSON.parse(JSON.stringify(previousState)));
          setServerState(JSON.parse(JSON.stringify(previousState)));
          setVersion(v => v + 1);
          setHasUnsavedChanges(false);
          setLastChange(null);
          addAuditEntryStatic('Undid last change');
          showToast('Undid last change', 'success');
        }
      };

      const handleDiscard = () => {
        setDraftState(JSON.parse(JSON.stringify(serverState)));
        setHasUnsavedChanges(false);
        showToast('Changes discarded', 'error');
      };

      const handleReset = () => {
        const reset = JSON.parse(JSON.stringify(serverState));
        reset.pauseAll = false;
        reset.devices.forEach(d => {
          d.paused = false;
          d.extra_lead_time = 0;
          d.extra_pickup_lead_time = 0;
          d.extra_delivery_lead_time = 0;
          d.message = '';
          d.closed_until = null;
        });
        setDraftState(reset);
        setServerState(reset);
        setShowResetModal(false);
        setHasUnsavedChanges(false);
        addAuditEntryStatic('Reset all overrides');
        showToast('All overrides reset', 'success');
        setResetConfirmText('');
      };

      const quickAction = (action) => {
        if (action === 'emergency-pause') { setShowEmergencyConfirm(true); return; }
        if (action === 'emergency-pause-confirmed') {
          updateDraft(draft => { draft.pauseAll = true; });
          addAuditEntryStatic('🚨 EMERGENCY PAUSE activated');
          showToast('Emergency pause activated', 'error');
        }
        if (action === 'normal') {
          updateDraft(draft => {
            draft.pauseAll = false;
            draft.devices.forEach(d => { d.paused = false; d.extra_lead_time = 0; d.extra_pickup_lead_time = 0; d.extra_delivery_lead_time = 0; });
          });
          showToast('Reset to normal', 'success');
        }
      };

      const handleEmergencyMouseDown = () => {
        setEmergencyHoldProgress(0);
        let progress = 0;
        emergencyHoldTimer.current = setInterval(() => {
          progress += 5;
          setEmergencyHoldProgress(progress);
          if (progress >= 100) {
            clearInterval(emergencyHoldTimer.current);
            quickAction('emergency-pause-confirmed');
            setShowEmergencyConfirm(false);
            setEmergencyHoldProgress(0);
          }
        }, 100);
      };
      const handleEmergencyMouseUp = () => {
        if (emergencyHoldTimer.current) { clearInterval(emergencyHoldTimer.current); setEmergencyHoldProgress(0); }
      };

      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 3000);
      };

      // Product availability
      const categories = useMemo(() => ['All', ...Array.from(new Set(MOCK_PRODUCTS.map(p => p.category)))], []);
      const filteredProducts = useMemo(() => {
        return MOCK_PRODUCTS.filter(p => {
          const inInactive = inactiveItems.some(i => i.id === p.id);
          if (inInactive) return false;
          const matchSearch = p.name.toLowerCase().includes(productSearchDebounced.toLowerCase()) || p.sku.toLowerCase().includes(productSearchDebounced.toLowerCase());
          const matchCat = productCategory === 'All' || p.category === productCategory;
          return matchSearch && matchCat;
        });
      }, [productSearchDebounced, productCategory, inactiveItems]);

      const setInactive = (product) => {
        setInactiveItems(prev => prev.some(i => i.id === product.id) ? prev : [...prev, product]);
        setHasUnsavedChanges(true);
      };
      const setActive = (productId) => {
        setInactiveItems(prev => prev.filter(i => i.id !== productId));
        setHasUnsavedChanges(true);
      };

      // Temp hours modal
      const openTempHours = (device) => {
        setTempHoursDevice(device);
        const existing = device.closed_until ? device.closed_until.slice(0, 16) : '';
        setTempHoursValue(existing);
      };

      const saveTempHours = () => {
        if (!tempHoursDevice) return;
        if (tempHoursValue && new Date(tempHoursValue) <= new Date()) {
          showToast('Datetime must be in the future', 'error');
          return;
        }
        updateDeviceField(tempHoursDevice.id, 'closed_until', tempHoursValue || null);
        setTempHoursDevice(null);
        showToast('Temporary hours updated', 'success');
      };

      // Keyboard shortcuts
      useEffect(() => {
        const handler = (e) => {
          if ((e.ctrlKey || e.metaKey) && e.key === 's') {
            e.preventDefault();
            if (hasUnsavedChanges && networkState === 'online') handleApplyWithPreview();
          }
          if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
            e.preventDefault();
            if (version > 1 && previousState) handleUndo();
          }
          if (e.key === 'Escape' && hasUnsavedChanges && !showConflictModal && !showResetModal && !showChangePreview && !tempHoursDevice) {
            handleDiscard();
          }
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, [hasUnsavedChanges, networkState, version, previousState, showConflictModal, showResetModal, showChangePreview, tempHoursDevice]);

      if (!draftState) return <div style={{padding:'50px',textAlign:'center'}}>Loading...</div>;

      if (networkState === 'expired') {
        return (
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'100vh',padding:'30px',textAlign:'center'}}>
            <div style={{fontSize:'80px',marginBottom:'20px'}}>🔒</div>
            <h1 style={{fontSize:'32px',color:'var(--accent-red)',marginBottom:'15px',fontFamily:'JetBrains Mono'}}>ACCESS EXPIRED</h1>
            <p style={{fontSize:'16px',color:'var(--text-secondary)',marginBottom:'30px',maxWidth:'500px'}}>Your access token has expired. Please open from POS system.</p>
            <button className="btn-primary" onClick={() => setNetworkState('online')}>← Back to Demo</button>
          </div>
        );
      }

      const overallStatus = getOverallStatus(draftState.pauseAll, draftState.devices);
      const noneSelected = selectedDeviceIds.size === 0;

      return (
        <div className="container">
          {/* Network Simulator */}
          <div className="network-simulator">
            <div className="network-simulator-title">Network Simulator</div>
            <div className="network-buttons">
              {['online','offline','slow','expired'].map(s => (
                <button key={s} className={`network-btn ${s === 'offline' ? 'offline' : s === 'slow' ? 'slow' : s === 'expired' ? 'expired' : ''} ${networkState === s ? 'active' : ''}`} onClick={() => setNetworkState(s)}>{s}</button>
              ))}
            </div>
          </div>

          {/* Shortcuts hint */}
          <div className="shortcuts-hint">
            <strong>Ctrl+S</strong> Apply · <strong>Ctrl+Z</strong> Undo · <strong>Esc</strong> Discard
          </div>

          {/* ── STICKY HEADER ── */}
          <div className="header">
            <div className="header-left">
              <h1>
                Operational Controls
                {hasUnsavedChanges && <span className="unsaved-indicator" style={{marginLeft:'10px'}}></span>}
              </h1>
              <div className="location">
                {draftState.location}
                <span style={{marginLeft:'12px',fontSize:'10px',color:'var(--text-secondary)'}}>v{version}</span>
                <span className={`status-badge ${overallStatus}`}>{overallStatus === 'normal' ? '✓ Normal' : overallStatus === 'busy' ? '⚡ Busy' : '⛔ Paused'}</span>
              </div>
              {lastChange && (
                <div className="last-change-meta">Last change: <span>{lastChange}</span></div>
              )}
            </div>
            <div className="header-right">
              <div className="last-updated">
                {new Date(draftState.lastUpdated).toLocaleTimeString()}<br/>
                By: <strong>{draftState.lastUpdatedBy.staffName}</strong>
              </div>
              <button className="btn-secondary" onClick={handleDiscard} disabled={!hasUnsavedChanges}>Discard</button>
              <button className="btn-secondary" onClick={handleUndo} disabled={!previousState} title={lastChange || 'No changes to undo'}>↶ Undo</button>
              <button className="btn-secondary" onClick={() => setShowResetModal(true)}>Reset All</button>
              <button
                className={`btn-primary ${isApplying ? 'loading' : ''}`}
                onClick={handleApplyWithPreview}
                disabled={!hasUnsavedChanges || networkState !== 'online' || isApplying}
              >
                {isApplying ? <><span className="spinner"></span>Applying...</> : 'Apply Changes'}
              </button>
            </div>
          </div>

          {/* ── STICKY OPERATIONAL DASHBOARD ── */}
          <div className="ops-dashboard">
            <div className="ops-dashboard-title">📊 Operational Dashboard – Live Status</div>
            <div className="ops-dashboard-grid">
              {draftState.devices.map(device => {
                const status = getDeviceStatus(device, draftState.pauseAll);
                const effectiveLead = getEffectiveLeadTime(device);
                return (
                  <div key={device.id} className={`dash-device-card ${status}`}>
                    <div className="dash-device-name">
                      {device.icon} {device.name}
                      {device.closing_soon_warning && <span className="closing-soon-badge">soon</span>}
                    </div>
                    <div className={`dash-status ${status}`}>
                      {status === 'open' ? '🟢 Open' : status === 'busy' ? '🟡 Busy' : '🔴 Closed'}
                    </div>
                    <div className="dash-meta">
                      <span>⏱ {effectiveLead} min lead</span>
                      <span>🕐 {device.today_open_time}–{device.today_close_time}</span>
                      <span>📦 ~{device.orders_next_hour} orders/hr</span>
                      {device.type === 'online' && (
                        <span style={{display:'flex',gap:'4px',marginTop:'2px'}}>
                          {device.enable_pickup && <span className="dash-badge pickup">Pickup</span>}
                          {device.enable_delivery && <span className="dash-badge delivery">Delivery</span>}
                        </span>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          <div className="content">
            {/* Banners */}
            {networkState === 'offline' && (
              <div className="banner offline">
                <span className="banner-icon">⚠️</span>
                <div><strong>Connection lost</strong> – Changes cannot be saved. Showing cached data.</div>
              </div>
            )}
            {networkState === 'slow' && (
              <div className="banner">
                <span className="banner-icon">🐌</span>
                <div><strong>Slow connection</strong> – Operations may take longer.</div>
              </div>
            )}

            {/* Quick Actions */}
            <div className="quick-actions">
              <div className="quick-actions-title">⚡ Quick Actions</div>
              <div className="quick-actions-grid">
                <button className="quick-action-btn" onClick={() => quickAction('emergency-pause')}>
                  <span className="quick-action-icon">🔴</span>
                  <span>Emergency Pause All</span>
                </button>
                <button className="quick-action-btn" onClick={() => quickAction('normal')}>
                  <span className="quick-action-icon">✨</span>
                  <span>Back to Normal</span>
                </button>
              </div>
            </div>

            {/* Section: Global Pause */}
            <div className="section">
              <div className="section-title" style={{color:'var(--accent-red)'}}>Global Controls</div>
              <div className={`global-pause-bar ${draftState.pauseAll ? 'active' : ''}`} style={{padding:'22px'}}>
                <div
                  className={`toggle-switch large ${draftState.pauseAll ? 'active' : 'normal'}`}
                  onClick={() => updateDraft(draft => { draft.pauseAll = !draft.pauseAll; })}
                >
                  <div className="toggle-slider"></div>
                </div>
                <div style={{flex:1}}>
                  <div className="global-pause-label" style={{fontSize:'18px',marginBottom:'6px'}}>
                    {draftState.pauseAll ? '⛔ ALL ORDERING PAUSED' : '✓ All Systems Active'}
                  </div>
                  <div style={{fontSize:'12px',color:'var(--text-secondary)',fontWeight:400}}>
                    {draftState.pauseAll
                      ? 'All devices closed. No orders can be placed.'
                      : 'Toggle to immediately stop all incoming orders across all devices.'}
                  </div>
                </div>
              </div>
            </div>

            {/* Section: Device Controls */}
            <div className="section">
              <div className="section-title">Device Controls</div>

              {/* Bulk action bar */}
              <div className="bulk-bar">
                <span className="bulk-bar-label">
                  {selectedDeviceIds.size > 0 ? `${selectedDeviceIds.size} selected` : 'No devices selected'}
                </span>
                <div className="bulk-bar-actions">
                  <button className="select-all-btn" onClick={selectAll}>Select All</button>
                  {selectedDeviceIds.size > 0 && <button className="select-all-btn" onClick={clearSelection}>Clear</button>}
                  <button className="preset-btn" onClick={() => bulkAddLeadTime(5)} disabled={noneSelected}>+5 min</button>
                  <button className="preset-btn" onClick={() => bulkAddLeadTime(10)} disabled={noneSelected}>+10 min</button>
                  <button className="preset-btn" onClick={() => bulkAddLeadTime(15)} disabled={noneSelected}>+15 min</button>
                  <button className="preset-btn" onClick={() => bulkAddLeadTime(30)} disabled={noneSelected}>+30 min</button>
                  <button className="btn-sm btn-danger" onClick={bulkPause} disabled={noneSelected}>⏸ Pause</button>
                  <button className="btn-sm btn-secondary" onClick={bulkResume} disabled={noneSelected}>▶ Resume</button>
                </div>
              </div>

              <div className="devices-grid">
                {draftState.devices.map(device => (
                  <DeviceCard
                    key={device.id}
                    device={device}
                    pauseAll={draftState.pauseAll}
                    selected={selectedDeviceIds.has(device.id)}
                    onSelect={toggleDeviceSelection}
                    onUpdate={updateDeviceField}
                    onOpenTempHours={openTempHours}
                  />
                ))}
              </div>
            </div>

            {/* Section: Product Availability */}
            <div className="section">
              <div className="section-title">Product Availability</div>
              <div className="product-search-row">
                <input
                  type="text"
                  placeholder="Search products or SKU..."
                  value={productSearch}
                  onChange={(e) => setProductSearch(e.target.value)}
                />
                <select value={productCategory} onChange={(e) => setProductCategory(e.target.value)}>
                  {categories.map(c => <option key={c}>{c}</option>)}
                </select>
              </div>

              <div className="product-list">
                {filteredProducts.length === 0 && (
                  <div style={{textAlign:'center',color:'var(--text-secondary)',padding:'20px'}}>No products found</div>
                )}
                {filteredProducts.map(product => (
                  <div key={product.id} className="product-item">
                    <div>
                      <div className="product-name">{product.name}</div>
                      <div style={{display:'flex',gap:'8px',marginTop:'3px'}}>
                        <span className="product-sku">{product.sku}</span>
                        <span className="product-category">{product.category}</span>
                      </div>
                    </div>
                    <div className="product-actions">
                      <button className="btn-sm btn-danger" onClick={() => setInactive(product)}>Set Inactive</button>
                    </div>
                  </div>
                ))}
              </div>

              {inactiveItems.length > 0 && (
                <div className="inactive-section">
                  <div className="inactive-title">🚫 Inactive Items ({inactiveItems.length})</div>
                  {inactiveItems.map(item => (
                    <div key={item.id} className="inactive-item">
                      <div>
                        <div className="product-name" style={{color:'var(--accent-red)'}}>{item.name}</div>
                        <div className="product-sku">{item.sku} – {item.category}</div>
                      </div>
                      <button className="btn-sm btn-primary" onClick={() => setActive(item.id)}>Activate</button>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Danger Zone */}
            <div className="section" style={{borderColor:'var(--accent-red)',background:'rgba(255,51,102,0.02)'}}>
              <div className="section-title" style={{color:'var(--accent-red)'}}>⚠️ Danger Zone</div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px',background:'var(--bg-primary)',borderRadius:'8px',border:'1px solid var(--border)'}}>
                <div>
                  <div style={{fontSize:'15px',fontWeight:'bold',marginBottom:'5px'}}>Reset All Overrides</div>
                  <div style={{fontSize:'12px',color:'var(--text-secondary)'}}>Remove all runtime overrides and revert to Device Settings. Cannot be undone.</div>
                </div>
                <button className="btn-danger" onClick={() => setShowResetModal(true)} style={{minWidth:'130px'}}>Reset All...</button>
              </div>
            </div>

            {/* Recent Changes – bottom */}
            <div className="section" style={{marginBottom:0}}>
              <div className="section-title" style={{color:'var(--text-secondary)'}}>Recent Changes</div>
              <div className="audit-log">
                {auditLog.length === 0 && (
                  <div style={{textAlign:'center',color:'var(--text-secondary)',padding:'18px'}}>No recent changes</div>
                )}
                {auditLog.map((entry, i) => (
                  <div key={i} className="audit-entry">
                    <span className="audit-time">{entry.time}</span>
                    <span className="audit-action">{entry.action}</span>
                    <span className="audit-user">by {entry.user}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* ── MODALS ── */}

          {/* Emergency Pause */}
          {showEmergencyConfirm && (
            <div className="modal-overlay">
              <div className="modal" style={{borderColor:'var(--accent-red)'}}>
                <div className="modal-title">🚨 Emergency Pause All?</div>
                <div className="modal-body">
                  This will immediately stop all ordering across all devices.
                  <br/><br/>
                  <strong>Hold the button for 2 seconds to confirm.</strong>
                  <button
                    className="btn-danger"
                    onMouseDown={handleEmergencyMouseDown} onMouseUp={handleEmergencyMouseUp}
                    onMouseLeave={handleEmergencyMouseUp} onTouchStart={handleEmergencyMouseDown} onTouchEnd={handleEmergencyMouseUp}
                    style={{width:'100%',marginTop:'18px',padding:'18px',fontSize:'15px',position:'relative',overflow:'hidden'}}
                  >
                    <div style={{position:'absolute',left:0,top:0,bottom:0,width:`${emergencyHoldProgress}%`,background:'rgba(255,255,255,0.2)',transition:'width 0.1s linear'}}></div>
                    <span style={{position:'relative'}}>
                      {emergencyHoldProgress === 0 ? 'Hold to Pause All' : emergencyHoldProgress < 100 ? 'Holding...' : 'Pausing...'}
                    </span>
                  </button>
                </div>
                <div className="modal-buttons">
                  <button className="btn-secondary" onClick={() => { setShowEmergencyConfirm(false); handleEmergencyMouseUp(); }}>Cancel</button>
                </div>
              </div>
            </div>
          )}

          {/* Change Preview */}
          {showChangePreview && (
            <div className="modal-overlay">
              <div className="modal" style={{borderColor:'var(--accent-blue)'}}>
                <div className="modal-title" style={{color:'var(--accent-blue)'}}>📋 Review Changes</div>
                <div className="modal-body">
                  You are about to apply the following changes:
                  <div className="change-preview-list">
                    {getChanges().map((change, i) => (
                      <div key={i} className="change-preview-item">
                        <span>{change.icon}</span><span>{change.text}</span>
                      </div>
                    ))}
                  </div>
                  These changes will be visible to customers immediately.
                </div>
                <div className="modal-buttons">
                  <button className="btn-secondary" onClick={() => setShowChangePreview(false)}>Cancel</button>
                  <button className="btn-primary" onClick={handleApply}>Confirm & Apply</button>
                </div>
              </div>
            </div>
          )}

          {/* Conflict */}
          {showConflictModal && (
            <div className="modal-overlay">
              <div className="modal">
                <div className="modal-title">⚠️ Settings Updated by Someone Else</div>
                <div className="modal-body">
                  Another user changed operational settings while you were editing.
                  {conflictDiff && (
                    <div className="diff-view">
                      {conflictDiff.map((line, i) => (
                        <div key={i} className={`diff-line ${line.type}`}>{line.type === 'removed' ? '- ' : '+ '}{line.text}</div>
                      ))}
                    </div>
                  )}
                  Reload the latest or overwrite with your changes.
                </div>
                <div className="modal-buttons">
                  <button className="btn-secondary" onClick={() => { setDraftState(JSON.parse(JSON.stringify(serverState))); setShowConflictModal(false); setHasUnsavedChanges(false); showToast('Reloaded latest', 'success'); }}>Reload Latest</button>
                  <button className="btn-danger" onClick={() => { setServerState(JSON.parse(JSON.stringify(draftState))); setVersion(v => v+1); setShowConflictModal(false); setHasUnsavedChanges(false); showToast('Overwrote changes', 'success'); }}>Overwrite Anyway</button>
                </div>
              </div>
            </div>
          )}

          {/* Reset */}
          {showResetModal && (
            <div className="modal-overlay">
              <div className="modal">
                <div className="modal-title">⚠️ Reset All Overrides?</div>
                <div className="modal-body">
                  This will remove all runtime overrides and revert to Device Settings. <strong>Cannot be undone.</strong>
                  <br/><br/>
                  Type <strong style={{color:'var(--accent-red)'}}>RESET</strong> to confirm:
                  <input type="text" value={resetConfirmText} onChange={(e) => setResetConfirmText(e.target.value)} placeholder="Type RESET" style={{marginTop:'14px'}} autoFocus />
                </div>
                <div className="modal-buttons">
                  <button className="btn-secondary" onClick={() => { setShowResetModal(false); setResetConfirmText(''); }}>Cancel</button>
                  <button className="btn-danger" onClick={handleReset} disabled={resetConfirmText !== 'RESET'}>Reset All</button>
                </div>
              </div>
            </div>
          )}

          {/* Temporary Hours Modal */}
          {tempHoursDevice && (
            <div className="modal-overlay">
              <div className="modal" style={{borderColor:'var(--accent-yellow)'}}>
                <div className="modal-title" style={{color:'var(--accent-yellow)'}}>⏰ Temporary Hours – {tempHoursDevice.name}</div>
                <div className="modal-body">
                  Set a temporary close time. The device will show as Closed until then.
                  <div style={{marginTop:'16px'}}>
                    <label className="control-label">Closed Until</label>
                    <input
                      type="datetime-local"
                      value={tempHoursValue}
                      onChange={(e) => setTempHoursValue(e.target.value)}
                      min={new Date().toISOString().slice(0,16)}
                    />
                  </div>
                  {tempHoursValue && (
                    <div style={{marginTop:'12px',padding:'10px',background:'rgba(255,184,0,0.1)',borderRadius:'6px',border:'1px solid var(--accent-yellow)',fontSize:'12px',color:'var(--accent-yellow)'}}>
                      Preview: Customer will see: <strong>Closed until {new Date(tempHoursValue).toLocaleString()}</strong>
                    </div>
                  )}
                </div>
                <div className="modal-buttons">
                  <button className="btn-secondary" onClick={() => { updateDeviceField(tempHoursDevice.id, 'closed_until', null); setTempHoursDevice(null); }}>Clear Override</button>
                  <button className="btn-secondary" onClick={() => setTempHoursDevice(null)}>Cancel</button>
                  <button className="btn-primary" style={{background:'var(--accent-yellow)',color:'var(--bg-primary)'}} onClick={saveTempHours}>Set Temporary Hours</button>
                </div>
              </div>
            </div>
          )}

          {/* Toast */}
          {toast && (
            <div className={`toast ${toast.type}`}>
              {toast.type === 'success' ? '✓' : toast.type === 'error' ? '✗' : 'ℹ'} {toast.message}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.render(<OpsControlPage />, document.getElementById('root'));
  </script>
</body>
</html>
