<!DOCTYPE html>
<html lang="no" data-theme="dark">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ═══ DESIGN TOKENS — synced with Plorea Design System v2.7 ═══ */
/* Light */
:root,[data-theme="light"]{
  --bg-page:#F1F5F9; --bg-surface:#FFFFFF; --bg-hover:#F1F5F9; --bg-overlay:rgba(0,0,0,0.48);
  --text-primary:#1A1A1A; --text-secondary:#666666; --text-muted:#C4C4C4; --text-link:#2E6B87;
  --color-primary:#6BB8DA; --color-primary-hover:#4FA3C8; --color-primary-text:#FFFFFF; --color-accent:#2E6B87; --color-secondary:#468DAC;
  --color-border:#E9E9E9; --color-border-strong:#D9D9D9;
  --color-success:#6BDAB2; --color-success-bg:#E8F7F1; --color-warning:#DADA6B; --color-warning-bg:#F7F7E0; --color-error:#DA6B6B; --color-error-bg:#FAEAEA;
  --color-info:#6BB8DA; --color-info-bg:#EBF6FB;
  --color-selection:#EBF6FB; --color-selection-border:#99D2E8; --color-selection-text:#1D4A5F;
  --elevation-0:none; --elevation-1:0 1px 4px rgba(0,0,0,.07),0 0 0 1px rgba(0,0,0,.04); --elevation-2:0 4px 16px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.04); --elevation-3:0 12px 40px rgba(0,0,0,.12),0 0 0 1px rgba(0,0,0,.04);
  --r-sm:6px; --r:8px; --r-md:10px; --r-lg:14px; --r-xl:20px;
  --dur-micro:80ms; --dur-fast:100ms; --dur:160ms; --dur-slow:240ms; --dur-panel:320ms;
  --ease-out:cubic-bezier(0.16,1,0.3,1); --ease-in:cubic-bezier(0.4,0,1,1); --ease:cubic-bezier(0.4,0,0.2,1);
  --logo-accent:#6BB8DA;
  --pend-bg:#fffbeb; --pend-bg-a:#fefce8; --pend-tx:#92600a;
  --ok-tx:#166534; --err-tx:#991b1b;
}
/* Dark — warm palette, purple undertone */
[data-theme="dark"]{
  --bg-page:#16151A; --bg-surface:#1E1D24; --bg-hover:#26242E; --bg-overlay:rgba(0,0,0,0.72);
  --text-primary:#F0EEF5; --text-secondary:#9B98A8; --text-muted:#5C5970; --text-link:#7EC8E3;
  --color-primary:#6BB8DA; --color-primary-hover:#7EC8E8; --color-primary-text:#0D2A38; --color-accent:#7EC8E3; --color-secondary:#7EC8E3;
  --color-border:#2E2C38; --color-border-strong:#3D3A4A;
  --color-success:#4DB896; --color-success-bg:#132B22; --color-warning:#C4C44A; --color-warning-bg:#282810; --color-error:#D45858; --color-error-bg:#2E1212;
  --color-info:#6BB8DA; --color-info-bg:#0D2030;
  --color-selection:#0D2030; --color-selection-border:#2E6B87; --color-selection-text:#7EC8E3;
  --elevation-1:0 1px 4px rgba(0,0,0,.3),0 0 0 1px rgba(255,255,255,.03); --elevation-2:0 4px 16px rgba(0,0,0,.4),0 0 0 1px rgba(255,255,255,.03); --elevation-3:0 12px 40px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.03);
  --logo-accent:#7EC8E3;
  --pend-bg:#282810; --pend-bg-a:#1f1f0d; --pend-tx:#C4C44A;
  --ok-tx:#4DB896; --err-tx:#D45858;
}
/* Dark Dim — softer variant */
[data-theme="dark-dim"]{
  --bg-page:#1a1925; --bg-surface:#222130; --bg-hover:#2c2b3a; --bg-overlay:rgba(0,0,0,.65);
  --text-primary:#e8e6f0; --text-secondary:#918fa0; --text-muted:#5a5870; --text-link:#7EC8E3;
  --color-primary:#6BB8DA; --color-primary-hover:#7EC8E8; --color-primary-text:#0D2A38; --color-accent:#7EC8E3; --color-secondary:#7EC8E3;
  --color-border:#333140; --color-border-strong:#443f55;
  --color-success:#4DB896; --color-success-bg:#15261e; --color-warning:#b8b840; --color-warning-bg:#252515; --color-error:#D45858; --color-error-bg:#2a1414;
  --color-info:#6BB8DA; --color-info-bg:#0e1e30;
  --color-selection:#0e1e30; --color-selection-border:#2a5f78; --color-selection-text:#7EC8E3;
  --elevation-1:0 1px 4px rgba(0,0,0,.25),0 0 0 1px rgba(255,255,255,.02); --elevation-2:0 4px 16px rgba(0,0,0,.35),0 0 0 1px rgba(255,255,255,.02); --elevation-3:0 12px 40px rgba(0,0,0,.45),0 0 0 1px rgba(255,255,255,.02);
  --logo-accent:#7EC8E3;
  --pend-bg:#252515; --pend-bg-a:#1c1c10; --pend-tx:#b8b840;
  --ok-tx:#4DB896; --err-tx:#D45858;
}

/* ═══ BASE ═══ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Plus Jakarta Sans',-apple-system,sans-serif;font-size:15px;line-height:1.6;color:var(--text-primary);background:var(--bg-page);-webkit-font-smoothing:antialiased;transition:background var(--dur) var(--ease),color var(--dur) var(--ease)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(107,184,218,.2);border-radius:4px}
#app{width:100%;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ═══ ANIMATIONS (transform + opacity only per guidelines) ═══ */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes popIn{0%{transform:scale(.85);opacity:0}60%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
@keyframes checkPop{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
"use strict";
var $=document.getElementById("app");
var theme=document.documentElement.getAttribute("data-theme")||"dark";
function setTheme(t){theme=t;document.documentElement.setAttribute("data-theme",t)}

/* ═══ BAR PRODUCTS ═══ */
var CAT=[{id:"popular",n:"Popul\u00e6rt",ic:"\uD83D\uDD25"},{id:"beer",n:"\u00d8l",ic:"\uD83C\uDF7A"},{id:"wine",n:"Vin",ic:"\uD83C\uDF77"},{id:"spirits",n:"Sprit",ic:"\uD83E\uDD43"},{id:"cocktails",n:"Cocktails",ic:"\uD83C\uDF78"},{id:"soft",n:"Alkoholfritt",ic:"\uD83E\uDDC3"},{id:"snacks",n:"Snacks",ic:"\uD83C\uDF7F"}];
var PRD=[
{id:1,n:"Pils 0.4L",p:89,c:"beer",ic:"\uD83C\uDF7A"},{id:2,n:"Pils 0.6L",p:109,c:"beer",ic:"\uD83C\uDF7A"},
{id:3,n:"IPA 0.4L",p:99,c:"beer",ic:"\uD83C\uDF7A"},{id:4,n:"Hvete\u00f8l 0.4L",p:95,c:"beer",ic:"\uD83C\uDF7A"},
{id:5,n:"Alkfri \u00d8l",p:79,c:"beer",ic:"\uD83C\uDF7A"},
{id:6,n:"R\u00f8dvin",p:129,c:"wine",ic:"\uD83C\uDF77"},{id:7,n:"Hvitvin",p:119,c:"wine",ic:"\uD83E\uDD42"},
{id:8,n:"Ros\u00e9",p:119,c:"wine",ic:"\uD83C\uDF77"},{id:9,n:"Prosecco",p:129,c:"wine",ic:"\uD83E\uDD42"},
{id:10,n:"Gin & Tonic",p:149,c:"cocktails",ic:"\uD83C\uDF78"},{id:11,n:"Mojito",p:159,c:"cocktails",ic:"\uD83C\uDF79"},
{id:12,n:"Espresso Martini",p:169,c:"cocktails",ic:"\uD83C\uDF78"},{id:13,n:"Aperol Spritz",p:149,c:"cocktails",ic:"\uD83C\uDF79"},
{id:14,n:"Whisky",p:139,c:"spirits",ic:"\uD83E\uDD43"},{id:15,n:"Vodka shot",p:89,c:"spirits",ic:"\uD83E\uDD43"},
{id:16,n:"J\u00e4germeister",p:89,c:"spirits",ic:"\uD83E\uDD43"},{id:17,n:"Cognac",p:159,c:"spirits",ic:"\uD83E\uDD43"},
{id:18,n:"Cola",p:49,c:"soft",ic:"\uD83E\uDD64"},{id:19,n:"Fanta",p:49,c:"soft",ic:"\uD83C\uDF4A"},
{id:20,n:"Vann",p:39,c:"soft",ic:"\uD83D\uDCA7"},{id:21,n:"Juice",p:59,c:"soft",ic:"\uD83E\uDDC3"},
{id:22,n:"Red Bull",p:69,c:"soft",ic:"\u26A1"},
{id:23,n:"N\u00f8tter",p:59,c:"snacks",ic:"\uD83E\uDD5C"},{id:24,n:"Chips",p:49,c:"snacks",ic:"\uD83C\uDF5F"},
{id:25,n:"Oliven",p:69,c:"snacks",ic:"\uD83E\uDED2"},{id:26,n:"Nachos",p:89,c:"snacks",ic:"\uD83C\uDF2E"}
];
var POP=[1,3,6,10,11,14,18,22];
var STF=[{n:"Maria H.",pin:"1234"},{n:"Erik S.",pin:"5678"},{n:"Lina K.",pin:"9012"}];

/* ═══ STATE ═══ */
var staff=null,pin="",pinErr=false,aCat="popular";
var orders=[],activeOid=null,nextNum=1,autoNew=true;
var terms=[{id:1,n:"Term 1",status:"idle",oid:null},{id:2,n:"Term 2",status:"idle",oid:null}];

/* ═══ HELPERS ═══ */
function uid(){return Date.now()+Math.random()}
function now(){return new Date().toLocaleTimeString("no-NO",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}
function aO(){return orders.find(function(o){return o.id===activeOid})||null}
function newO(){var o={id:uid(),num:nextNum++,items:[],status:"active",term:null,sentAt:null};orders.push(o);activeOid=o.id;return o}
function oTot(o){var s=0;o.items.forEach(function(i){s+=i.p*i.qty});return s}
function oCnt(o){var s=0;o.items.forEach(function(i){s+=i.qty});return s}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;")}
function fmtT(ms){var s=Math.floor(ms/1000),m=Math.floor(s/60);s%=60;return(m<10?"0":"")+m+":"+(s<10?"0":"")+s}

/* DOM helpers */
function el(tag,css,html){var e=document.createElement(tag);if(css)Object.assign(e.style,css);if(html!==undefined)e.innerHTML=html;return e}
function btn(label,css,fn){var b=document.createElement("button");b.textContent=label;Object.assign(b.style,{border:"none",borderRadius:"var(--r-lg)",cursor:"pointer",fontFamily:"inherit",fontWeight:"700",fontSize:"13px",lineHeight:"1",transition:"all var(--dur-fast) var(--ease)"},css);b.addEventListener("click",fn);return b}
function logo(sz){return '<span style="font-family:Sora,sans-serif;font-size:'+sz+'px;font-weight:700;color:var(--text-primary);letter-spacing:-.02em">Pl<span style="color:var(--logo-accent)">or</span>ea</span>'}
function toast(m){var t=el("div",{position:"fixed",top:"24px",left:"50%",transform:"translateX(-50%)",background:"var(--text-primary)",color:"var(--bg-page)",padding:"12px 24px",borderRadius:"var(--r-md)",fontSize:"13px",fontWeight:"600",zIndex:"9999",animation:"toastIn var(--dur-slow) var(--ease-out)",whiteSpace:"nowrap",boxShadow:"var(--elevation-2)"},m);document.body.appendChild(t);setTimeout(function(){t.remove()},3000)}
function dot(st,sz){sz=sz||10;var c={idle:"var(--text-muted)",active:"var(--text-muted)",pending:"var(--color-warning)",approved:"var(--color-success)",failed:"var(--color-error)"}[st]||"var(--text-muted)";return'<div style="width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:'+c+';flex-shrink:0;'+(st==="pending"?"animation:pulse 1.2s infinite;":"")+'"></div>'}
function tdot(t){var c={idle:"var(--color-success)",busy:"var(--color-warning)",done:"var(--color-success)",failed:"var(--color-error)"}[t.status];return'<div style="width:10px;height:10px;border-radius:50%;background:'+c+';flex-shrink:0;'+(t.status==="busy"?"animation:pulse 1.2s infinite;":"")+'"></div>'}

/* Timer */
var _ti=null;
function startTi(){if(_ti)return;_ti=setInterval(function(){document.querySelectorAll("[data-t]").forEach(function(e){var o=orders.find(function(x){return String(x.id)===e.dataset.t});if(o&&o.sentAt)e.textContent=fmtT(Date.now()-o.sentAt)})},1000)}

/* ═══ PIN SCREEN ═══ */
function rPin(){
  $.innerHTML="";
  /* Center card — elevation-1, p-6 (24px), rounded-xl (14px) */
  var card=el("div",{maxWidth:"360px",margin:"auto",background:"var(--bg-surface)",borderRadius:"var(--r-lg)",padding:"48px 32px",boxShadow:"var(--elevation-1)",display:"flex",flexDirection:"column",alignItems:"center",position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)"});
  card.innerHTML=logo(26)+'<div style="font-family:Sora,sans-serif;font-size:12px;color:var(--text-secondary);margin-top:8px;margin-bottom:32px;text-transform:uppercase;letter-spacing:.1em;font-weight:600">Bar \u00b7 Multipay</div>';

  /* PIN dots */
  var dots=el("div",{display:"flex",gap:"12px",marginBottom:"12px"});
  for(var i=0;i<4;i++){var d=el("div",{width:"20px",height:"20px",borderRadius:"50%",border:"2px solid var(--color-border-strong)",transition:"all var(--dur) var(--ease-out)"});if(pin.length>i){d.style.background="var(--color-accent)";d.style.borderColor="var(--color-accent)"}if(pinErr){d.style.borderColor="var(--color-error)";d.style.animation="shake .4s";if(pin.length>i)d.style.background="var(--color-error)"}dots.appendChild(d)}
  card.appendChild(dots);
  card.appendChild(el("div",{fontSize:"13px",color:pinErr?"var(--color-error)":"var(--text-secondary)",height:"20px",marginBottom:"24px",fontWeight:"500"},pinErr?"Feil PIN-kode":"Tast inn 4-sifret PIN"));

  /* Numpad — 48px touch targets per guidelines */
  var pad=el("div",{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"8px",width:"100%"});
  [1,2,3,4,5,6,7,8,9,"C",0,"B"].forEach(function(v){
    var k=el("button",{height:"48px",borderRadius:"var(--r)",border:"1px solid var(--color-border)",background:"var(--bg-surface)",color:v==="C"||v==="B"?"var(--text-secondary)":"var(--text-primary)",fontSize:v==="C"||v==="B"?"12px":"20px",fontWeight:"600",cursor:"pointer",fontFamily:v==="C"||v==="B"?"inherit":"Sora,sans-serif",display:"flex",alignItems:"center",justifyContent:"center",transition:"background var(--dur-fast) var(--ease)"},v==="C"?"Slett":v==="B"?"\u232B":String(v));
    k.addEventListener("mousedown",function(){k.style.transform="scale(.97)"});
    k.addEventListener("mouseup",function(){k.style.transform=""});
    k.addEventListener("click",function(){
      if(String(v)==="C"){pin="";pinErr=false;rPin();return}
      if(String(v)==="B"){pin=pin.slice(0,-1);pinErr=false;rPin();return}
      pin+=v;if(pin.length===4){var f=STF.find(function(s){return s.pin===pin});if(f){staff=f;pin="";pinErr=false;newO();render()}else{pinErr=true;rPin();setTimeout(function(){pin="";pinErr=false;rPin()},800)}}else rPin()
    });pad.appendChild(k)});
  card.appendChild(pad);

  /* Theme switcher */
  var tw=el("div",{display:"flex",gap:"8px",marginTop:"24px"});
  ["light","dark","dark-dim"].forEach(function(t){
    var b=el("button",{padding:"8px 16px",borderRadius:"var(--r)",border:"1.5px solid "+(theme===t?"var(--color-accent)":"var(--color-border)"),background:theme===t?"var(--color-selection)":"var(--bg-surface)",color:theme===t?"var(--color-selection-text)":"var(--text-secondary)",fontSize:"12px",fontWeight:"600",cursor:"pointer",transition:"all var(--dur-fast) var(--ease)"},t==="light"?"\u2600\uFE0F Light":t==="dark"?"\uD83C\uDF19 Dark":"\u2B50 Dim");
    b.addEventListener("click",function(){setTheme(t);rPin()});tw.appendChild(b)});
  card.appendChild(tw);
  card.appendChild(el("div",{fontSize:"11px",color:"var(--text-muted)",marginTop:"16px"},"1234 \u00b7 5678 \u00b7 9012"));
  $.appendChild(card)
}

/* ═══ MAIN RENDER ═══ */
function render(){
  $.innerHTML="";
  var ao=aO();
  var prods=aCat==="popular"?PRD.filter(function(p){return POP.indexOf(p.id)>=0}):PRD.filter(function(p){return p.c===aCat});

  /* ── TOP BAR — 48px height, elevation-1 ── */
  var top=el("div",{display:"flex",alignItems:"center",padding:"0 24px",height:"48px",background:"var(--bg-surface)",borderBottom:"1px solid var(--color-border)",flexShrink:"0",gap:"8px",boxShadow:"var(--elevation-1)",zIndex:"20"});

  /* Logo + badge */
  top.innerHTML='<div style="display:flex;align-items:center;gap:8px;margin-right:16px;flex-shrink:0">'+logo(18)+'<span style="font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--color-selection-text);background:var(--color-selection);padding:2px 8px;border-radius:var(--r-sm);border:1px solid var(--color-selection-border)">BAR</span></div>';

  /* Order tabs — compact density (44px touch target) */
  var tabs=el("div",{display:"flex",gap:"4px",flex:"1",overflowX:"auto",alignItems:"center",minWidth:"0"});
  orders.forEach(function(o){
    var isA=o.id===activeOid;
    var bg={active:isA?"var(--color-selection)":"var(--bg-surface)",pending:isA?"var(--pend-bg-a)":"var(--pend-bg)",approved:isA?"var(--color-success-bg)":"var(--color-success-bg)",failed:isA?"var(--color-error-bg)":"var(--color-error-bg)"};
    var bc={active:isA?"var(--color-primary)":"var(--color-border)",pending:"var(--color-warning)",approved:"var(--color-success)",failed:"var(--color-error)"};
    var tc={active:isA?"var(--color-selection-text)":"var(--text-secondary)",pending:"var(--pend-tx)",approved:"var(--ok-tx)",failed:"var(--err-tx)"};
    var tab=el("button",{display:"flex",alignItems:"center",gap:"6px",padding:"6px 12px",height:"36px",borderRadius:"var(--r)",border:(isA?"2px":"1px")+" solid "+(bc[o.status]||"var(--color-border)"),background:bg[o.status]||"var(--bg-surface)",cursor:"pointer",fontSize:"12px",fontWeight:"600",color:tc[o.status]||"var(--text-secondary)",whiteSpace:"nowrap",transition:"all var(--dur-fast) var(--ease)",fontFamily:"inherit",flexShrink:"0"});
    var timer=o.status==="pending"&&o.sentAt?'<span data-t="'+o.id+'" style="font-size:10px;font-weight:700;color:var(--pend-tx);font-family:monospace">'+fmtT(Date.now()-o.sentAt)+"</span>":"";
    tab.innerHTML=dot(o.status,8)+'<span>#'+o.num+'</span><span style="font-weight:400">'+oCnt(o)+'</span><span style="font-weight:700">'+oTot(o)+'kr</span>'+timer;
    tab.addEventListener("click",function(){activeOid=o.id;render()});
    tabs.appendChild(tab)
  });
  /* New order — 36px consistent with tabs */
  var nt=el("button",{width:"36px",height:"36px",borderRadius:"var(--r)",border:"1.5px dashed var(--color-border)",background:"transparent",color:"var(--text-muted)",fontSize:"18px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:"0",transition:"all var(--dur-fast) var(--ease)"},"+");
  nt.addEventListener("click",function(){newO();render()});
  tabs.appendChild(nt);top.appendChild(tabs);

  /* Right controls — terminals + auto + theme + staff */
  var rc=el("div",{display:"flex",alignItems:"center",gap:"8px",flexShrink:"0",marginLeft:"12px"});
  /* Terminal dots */
  terms.forEach(function(t){
    var d=el("div",{display:"flex",alignItems:"center",gap:"4px",padding:"4px 10px",borderRadius:"var(--r-sm)",border:"1px solid var(--color-border)",background:"var(--bg-surface)",fontSize:"11px",fontWeight:"600",color:"var(--text-secondary)"});
    d.innerHTML=tdot(t)+'<span>'+t.n+'</span>';rc.appendChild(d)
  });
  /* Auto toggle */
  var atg=el("div",{display:"flex",alignItems:"center",gap:"4px",padding:"4px 8px",borderRadius:"var(--r-sm)",border:"1px solid var(--color-border)",background:autoNew?"var(--color-success-bg)":"var(--bg-surface)",cursor:"pointer",userSelect:"none",transition:"all var(--dur-fast) var(--ease)"});
  atg.innerHTML='<div style="width:28px;height:16px;border-radius:8px;background:'+(autoNew?"var(--color-success)":"var(--color-border-strong)")+';position:relative;transition:background var(--dur) var(--ease)"><div style="width:12px;height:12px;border-radius:50%;background:var(--bg-surface);position:absolute;top:2px;'+(autoNew?"right:2px":"left:2px")+';transition:all var(--dur) var(--ease-out);box-shadow:0 1px 2px rgba(0,0,0,.2)"></div></div><span style="font-size:10px;font-weight:600;color:'+(autoNew?"var(--ok-tx)":"var(--text-muted)")+';white-space:nowrap">Auto</span>';
  atg.addEventListener("click",function(){autoNew=!autoNew;render()});rc.appendChild(atg);
  /* Theme */
  var thg=el("div",{display:"flex",borderRadius:"var(--r-sm)",overflow:"hidden",border:"1px solid var(--color-border)"});
  [{k:"light",l:"\u2600"},{k:"dark",l:"\uD83C\uDF19"},{k:"dark-dim",l:"\u2B50"}].forEach(function(t){
    var b=el("button",{padding:"4px 8px",border:"none",background:theme===t.k?"var(--color-accent)":"var(--bg-surface)",color:theme===t.k?"var(--color-primary-text)":"var(--text-muted)",fontSize:"12px",cursor:"pointer",transition:"all var(--dur-fast) var(--ease)",lineHeight:"1"},t.l);
    b.addEventListener("click",function(){setTheme(t.k);render()});thg.appendChild(b)});
  rc.appendChild(thg);
  /* Staff */
  var stb=el("button",{fontSize:"11px",fontWeight:"600",color:"var(--color-selection-text)",background:"var(--color-selection)",padding:"4px 12px",borderRadius:"9999px",border:"1px solid var(--color-selection-border)",cursor:"pointer",transition:"all var(--dur-fast) var(--ease)"},staff.n+" \u2715");
  stb.addEventListener("click",function(){staff=null;orders=[];activeOid=null;rPin()});rc.appendChild(stb);
  top.appendChild(rc);$.appendChild(top);

  /* ── MAIN AREA — flex row ── */
  var main=el("div",{display:"flex",flex:"1",overflow:"hidden"});

  /* ── LEFT COL: categories + product grid ── */
  var left=el("div",{flex:"1",display:"flex",flexDirection:"column",minWidth:"0",borderRight:"1px solid var(--color-border)"});
  /* Categories — p-3 (12px) vertical padding */
  var catBar=el("div",{flexShrink:"0",padding:"12px 0",background:"var(--bg-surface)",borderBottom:"1px solid var(--color-border)"});
  var catScr=el("div",{display:"flex",gap:"8px",padding:"0 24px",overflowX:"auto"});
  CAT.forEach(function(c){
    var a=aCat===c.id;
    var cb2=el("button",{display:"flex",alignItems:"center",gap:"6px",padding:"8px 16px",borderRadius:"9999px",border:"1.5px solid "+(a?"var(--color-primary)":"var(--color-border)"),background:a?"var(--color-selection)":"var(--bg-surface)",color:a?"var(--color-selection-text)":"var(--text-secondary)",fontSize:"13px",fontWeight:"600",cursor:"pointer",whiteSpace:"nowrap",flexShrink:"0",transition:"all var(--dur-fast) var(--ease)"},c.ic+" "+c.n);
    cb2.addEventListener("click",function(){aCat=c.id;render()});catScr.appendChild(cb2)});
  catBar.appendChild(catScr);left.appendChild(catBar);

  /* Product grid — page p-6 (24px per POS exception) */
  var ga=el("div",{flex:"1",overflowY:"auto",padding:"24px"});
  var gr=el("div",{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"12px"});
  if(window.innerWidth<1200)gr.style.gridTemplateColumns="repeat(3,1fr)";
  if(window.innerWidth<900)gr.style.gridTemplateColumns="repeat(2,1fr)";
  var canAdd=ao&&ao.status==="active";

  prods.forEach(function(p){
    var ic=0;if(ao)ao.items.forEach(function(x){if(x.id===p.id)ic+=x.qty});
    /* Card — elevation-1, r-lg (14px), transition hover→elevation-2 */
    var cd=el("button",{position:"relative",background:"var(--bg-surface)",border:"1px solid var(--color-border)",borderRadius:"var(--r-lg)",cursor:canAdd?"pointer":"default",textAlign:"center",overflow:"hidden",display:"flex",flexDirection:"column",alignItems:"center",boxShadow:"var(--elevation-1)",transition:"transform var(--dur-fast) var(--ease), box-shadow var(--dur-fast) var(--ease)",fontFamily:"inherit",opacity:canAdd?"1":".4",padding:"20px 12px 16px"});
    cd.innerHTML=(ic?'<div style="position:absolute;top:8px;right:8px;min-width:24px;height:24px;border-radius:9999px;background:var(--color-accent);color:var(--color-primary-text);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;padding:0 6px">'+ic+'</div>':'')+'<div style="font-size:32px;margin-bottom:8px;line-height:1">'+p.ic+'</div><div style="font-size:13px;font-weight:700;line-height:1.3;color:var(--text-primary)">'+esc(p.n)+'</div><div style="font-size:15px;font-weight:700;color:var(--color-accent);margin-top:8px">'+p.p+' kr</div>';
    if(canAdd){
      cd.addEventListener("click",function(){
        var ex=ao.items.find(function(x){return x.id===p.id});
        if(ex)ex.qty++;else ao.items.push({id:p.id,n:p.n,p:p.p,ic:p.ic,qty:1,ck:uid()});
        render()
      });
      cd.addEventListener("mouseenter",function(){cd.style.transform="translateY(-2px)";cd.style.boxShadow="var(--elevation-2)"});
      cd.addEventListener("mouseleave",function(){cd.style.transform="";cd.style.boxShadow="var(--elevation-1)"});
    }
    gr.appendChild(cd)
  });
  ga.appendChild(gr);left.appendChild(ga);main.appendChild(left);

  /* ── RIGHT COL: cart — compact density ── */
  var right=el("div",{width:"400px",display:"flex",flexDirection:"column",background:"var(--bg-surface)",flexShrink:"0"});
  if(window.innerWidth>=1440)right.style.width="440px";

  if(!ao){right.innerHTML='<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:13px">Ingen aktiv ordre</div>'}
  else{
    /* Cart header */
    var ch=el("div",{padding:"16px 24px 12px",borderBottom:"1px solid var(--color-border)",display:"flex",alignItems:"center",justifyContent:"space-between"});
    var sLbl={active:"Aktiv",pending:"Sendt",approved:"Godkjent",failed:"Avvist"};
    var sClr={active:"var(--text-secondary)",pending:"var(--pend-tx)",approved:"var(--ok-tx)",failed:"var(--err-tx)"};
    ch.innerHTML='<div style="display:flex;align-items:center;gap:8px"><span style="font-family:Sora,sans-serif;font-size:17px;font-weight:700;letter-spacing:-.015em">Ordre #'+ao.num+'</span>'+dot(ao.status,10)+'</div><span style="font-size:12px;font-weight:600;color:'+sClr[ao.status]+'">'+sLbl[ao.status]+'</span>';
    right.appendChild(ch);

    if(ao.status==="active"){
      /* Items — compact density: 44px row, 12px gap */
      var scr=el("div",{flex:"1",overflowY:"auto",padding:"8px 24px"});
      if(!ao.items.length)scr.innerHTML='<div style="text-align:center;padding:48px 16px;color:var(--text-muted)"><div style="font-size:32px;margin-bottom:12px">\uD83C\uDF7A</div><div style="font-size:13px;font-weight:600">Tom bestilling</div><div style="font-size:12px;margin-top:4px">Velg produkter fra menyen</div></div>';
      else ao.items.forEach(function(it){
        /* Row — 44px min-height (compact density), border-bottom */
        var row=el("div",{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",minHeight:"44px",borderBottom:"1px solid var(--color-border)",gap:"12px"});
        row.innerHTML='<div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0"><span style="font-size:20px;flex-shrink:0">'+it.ic+'</span><span style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(it.n)+'</span></div>';
        var rr=el("div",{display:"flex",alignItems:"center",gap:"8px",flexShrink:"0"});
        /* Stepper — 32px buttons inside, r-sm (6px) */
        var stp=el("div",{display:"flex",alignItems:"center",background:"var(--bg-hover)",borderRadius:"var(--r-sm)",overflow:"hidden",border:"1px solid var(--color-border)"});
        var dc=el("button",{width:"32px",height:"32px",border:"none",background:"transparent",color:"var(--text-secondary)",fontSize:"15px",fontWeight:"600",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"background var(--dur-micro)"},"\u2212");
        dc.addEventListener("click",(function(item){return function(){item.qty--;if(item.qty<=0)ao.items=ao.items.filter(function(x){return x.ck!==item.ck});render()}})(it));
        var vl=el("span",{width:"24px",textAlign:"center",fontSize:"13px",fontWeight:"700"},String(it.qty));
        var inc=el("button",{width:"32px",height:"32px",border:"none",background:"transparent",color:"var(--text-secondary)",fontSize:"15px",fontWeight:"600",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"background var(--dur-micro)"},"+");
        inc.addEventListener("click",(function(item){return function(){item.qty++;render()}})(it));
        stp.appendChild(dc);stp.appendChild(vl);stp.appendChild(inc);rr.appendChild(stp);
        rr.appendChild(el("span",{fontSize:"13px",fontWeight:"700",color:"var(--color-accent)",minWidth:"52px",textAlign:"right"},it.p*it.qty+" kr"));
        row.appendChild(rr);scr.appendChild(row)
      });
      right.appendChild(scr);

      if(ao.items.length){
        /* Summary — p-6 (24px) */
        var sm=el("div",{padding:"16px 24px",borderTop:"1px solid var(--color-border)"});
        var tot=oTot(ao),vat=Math.round(tot*.25);
        sm.innerHTML='<div style="display:flex;justify-content:space-between;font-size:13px;color:var(--text-secondary);padding:2px 0"><span>Subtotal</span><span>'+tot+' kr</span></div><div style="display:flex;justify-content:space-between;font-size:13px;color:var(--text-secondary);padding:2px 0"><span>MVA (inkl.)</span><span>'+vat+' kr</span></div><div style="height:1px;background:var(--color-border);margin:8px 0"></div><div style="display:flex;justify-content:space-between;font-family:Sora,sans-serif;font-size:20px;font-weight:700;letter-spacing:-.015em"><span>Totalt</span><span>'+tot+' kr</span></div>';
        right.appendChild(sm);

        /* Terminal buttons — p-6 (24px), 48px touch targets */
        var pa=el("div",{padding:"16px 24px 24px",borderTop:"1px solid var(--color-border)"});
        pa.innerHTML='<div style="font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px">Send til terminal</div>';
        var tb=el("div",{display:"flex",gap:"12px",marginBottom:"12px"});
        terms.forEach(function(t){
          var ok=t.status==="idle"||t.status==="done";
          /* Button — 48px+ height, r-lg (14px), elevation-1→2 on hover */
          var b=el("button",{flex:"1",display:"flex",flexDirection:"column",alignItems:"center",gap:"4px",padding:"16px 8px",borderRadius:"var(--r-lg)",border:"1.5px solid "+(ok?"var(--color-primary)":"var(--color-border)"),background:ok?"var(--color-selection)":"var(--bg-hover)",cursor:ok?"pointer":"not-allowed",opacity:ok?"1":".4",transition:"all var(--dur-fast) var(--ease)",boxShadow:ok?"var(--elevation-1)":"none"});
          b.innerHTML=tdot(t)+'<span style="font-size:15px;font-weight:700;color:'+(ok?"var(--color-accent)":"var(--text-muted)")+'">'+t.n+'</span><span style="font-size:11px;color:var(--text-secondary)">'+(ok?"Ledig":"Opptatt")+'</span>';
          if(ok){
            b.addEventListener("click",function(){sendTerm(ao,t)});
            b.addEventListener("mouseenter",function(){b.style.boxShadow="var(--elevation-2)"});
            b.addEventListener("mouseleave",function(){b.style.boxShadow="var(--elevation-1)"})
          }
          tb.appendChild(b)});
        pa.appendChild(tb);
        /* Secondary actions — button pairing: outline + outline */
        var sa=el("div",{display:"flex",gap:"8px"});
        sa.appendChild(btn("Avbryt",{padding:"12px 16px",border:"1.5px solid var(--color-border)",background:"var(--bg-surface)",color:"var(--color-error)",fontSize:"12px",flex:"1"},function(){orders=orders.filter(function(x){return x.id!==ao.id});if(orders.length)activeOid=orders[orders.length-1].id;else newO();render()}));
        sa.appendChild(btn("Park\u00e9r",{padding:"12px 16px",border:"1.5px solid var(--color-border)",background:"var(--bg-surface)",color:"var(--text-secondary)",fontSize:"12px",flex:"1"},function(){toast("\uD83C\uDD7F\uFE0F #"+ao.num+" parkert");orders=orders.filter(function(x){return x.id!==ao.id});if(orders.length)activeOid=orders[orders.length-1].id;else newO();render()}));
        pa.appendChild(sa);right.appendChild(pa)
      }
    } else if(ao.status==="pending"){
      /* Pending state — centered, animated */
      var pd=el("div",{flex:"1",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px",gap:"12px"});
      var tn=terms.find(function(t){return t.id===ao.term});
      pd.innerHTML='<div style="width:72px;height:72px;border-radius:50%;background:var(--color-warning-bg);display:flex;align-items:center;justify-content:center;font-size:32px;animation:pulse 1.2s infinite">\uD83D\uDCB3</div><div style="font-family:Sora,sans-serif;font-size:20px;font-weight:700;letter-spacing:-.015em">Venter p\u00e5 betaling</div><div style="font-size:13px;color:var(--text-secondary)">'+oTot(ao)+' kr \u2192 '+(tn?tn.n:"?")+'</div><div data-t="'+ao.id+'" style="font-size:24px;font-weight:700;color:var(--pend-tx);font-family:monospace">'+(ao.sentAt?fmtT(Date.now()-ao.sentAt):"...")+'</div>';
      var sb=el("div",{display:"flex",gap:"12px",marginTop:"16px"});
      /* Button pairing: fill + outline */
      sb.appendChild(btn("\u2713 Simuler godkjent",{padding:"12px 24px",background:"var(--color-success)",color:"#fff",fontSize:"13px"},function(){compPay(ao,"approved")}));
      sb.appendChild(btn("\u2717 Simuler avvist",{padding:"12px 24px",border:"1.5px solid var(--color-border)",background:"var(--bg-surface)",color:"var(--color-error)",fontSize:"13px"},function(){compPay(ao,"failed")}));
      pd.appendChild(sb);right.appendChild(pd)

    } else if(ao.status==="approved"){
      var ad=el("div",{flex:"1",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px",gap:"12px"});
      ad.innerHTML='<div style="width:72px;height:72px;border-radius:50%;background:var(--color-success-bg);display:flex;align-items:center;justify-content:center;font-size:36px;animation:checkPop .4s var(--ease-out)">\u2705</div><div style="font-family:Sora,sans-serif;font-size:20px;font-weight:700">Godkjent!</div><div style="font-size:20px;font-weight:700;color:var(--color-success)">'+oTot(ao)+' kr</div>';
      var ab=el("div",{display:"flex",gap:"12px",marginTop:"12px"});
      ab.appendChild(btn("\uD83D\uDDA8\uFE0F Kvittering",{padding:"12px 24px",background:"var(--color-accent)",color:"var(--color-primary-text)",fontSize:"13px"},function(){toast("\uD83D\uDDA8\uFE0F Kvittering skrevet ut")}));
      ab.appendChild(btn("Lukk ordre",{padding:"12px 24px",border:"1.5px solid var(--color-border)",background:"var(--bg-surface)",color:"var(--text-secondary)",fontSize:"13px"},function(){orders=orders.filter(function(x){return x.id!==ao.id});if(orders.length)activeOid=orders[orders.length-1].id;else newO();render()}));
      ad.appendChild(ab);right.appendChild(ad)

    } else if(ao.status==="failed"){
      var fd=el("div",{flex:"1",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px",gap:"12px"});
      fd.innerHTML='<div style="width:72px;height:72px;border-radius:50%;background:var(--color-error-bg);display:flex;align-items:center;justify-content:center;font-size:36px">\u274C</div><div style="font-family:Sora,sans-serif;font-size:20px;font-weight:700">Avvist</div><div style="font-size:13px;color:var(--text-secondary)">'+oTot(ao)+' kr ble ikke belastet</div>';
      var fb=el("div",{display:"flex",gap:"12px",marginTop:"12px"});
      fb.appendChild(btn("Pr\u00f8v igjen",{padding:"12px 24px",background:"var(--color-accent)",color:"var(--color-primary-text)",fontSize:"13px"},function(){ao.status="active";ao.term=null;render()}));
      fb.appendChild(btn("Avbryt",{padding:"12px 24px",border:"1.5px solid var(--color-border)",background:"var(--bg-surface)",color:"var(--color-error)",fontSize:"13px"},function(){orders=orders.filter(function(x){return x.id!==ao.id});if(orders.length)activeOid=orders[orders.length-1].id;else newO();render()}));
      fd.appendChild(fb);right.appendChild(fd)
    }
  }
  main.appendChild(right);$.appendChild(main);

  /* ── TERMINAL STATUS BAR — bottom, 44px height ── */
  var bar=el("div",{display:"flex",alignItems:"stretch",flexShrink:"0",borderTop:"1px solid var(--color-border)",background:"var(--bg-surface)",height:"44px"});
  terms.forEach(function(t,i){
    var o=t.oid?orders.find(function(x){return x.id===t.oid}):null;
    var bgM={idle:"var(--bg-surface)",busy:"var(--pend-bg)",done:"var(--color-success-bg)",failed:"var(--color-error-bg)"};
    var p=el("div",{flex:"1",display:"flex",alignItems:"center",padding:"0 24px",gap:"8px",background:bgM[t.status]||"var(--bg-surface)",borderRight:i<terms.length-1?"1px solid var(--color-border)":"none"});
    var h=tdot(t)+'<span style="font-size:12px;font-weight:700">'+t.n+'</span>';
    if(t.status==="idle")h+='<span style="font-size:11px;color:var(--color-success);font-weight:600">Ledig</span>';
    else if(t.status==="busy"&&o)h+='<span style="font-size:11px;color:var(--pend-tx);font-weight:600">#'+o.num+' \u2013 '+oTot(o)+' kr</span><span data-t="'+o.id+'" style="font-size:11px;font-weight:700;color:var(--pend-tx);font-family:monospace">'+(o.sentAt?fmtT(Date.now()-o.sentAt):"")+'</span>';
    else if(t.status==="done")h+='<span style="font-size:11px;color:var(--ok-tx);font-weight:600">\u2713 Godkjent</span>';
    else if(t.status==="failed")h+='<span style="font-size:11px;color:var(--err-tx);font-weight:600">\u2717 Avvist</span>';
    h+='<span style="margin-left:auto;font-size:10px;color:var(--text-muted);font-weight:600;background:var(--bg-hover);padding:2px 6px;border-radius:4px;border:1px solid var(--color-border)">F'+(i+1)+'</span>';
    p.innerHTML=h;bar.appendChild(p)
  });
  /* Shortcut hints */
  var hn=el("div",{display:"flex",alignItems:"center",padding:"0 16px",gap:"6px",flexShrink:"0"});
  hn.innerHTML='<span style="font-size:10px;color:var(--text-muted);font-weight:600;background:var(--bg-hover);padding:2px 6px;border-radius:4px;border:1px solid var(--color-border)">Tab</span><span style="font-size:10px;color:var(--text-muted)">Bytt</span><span style="font-size:10px;color:var(--text-muted);font-weight:600;background:var(--bg-hover);padding:2px 6px;border-radius:4px;border:1px solid var(--color-border)">F5</span><span style="font-size:10px;color:var(--text-muted)">Ny</span>';
  bar.appendChild(hn);$.appendChild(bar)
}

/* ═══ TERMINAL ═══ */
function sendTerm(o,t){
  o.status="pending";o.term=t.id;o.sentAt=Date.now();
  t.status="busy";t.oid=o.id;startTi();
  if(autoNew){var ha=orders.some(function(x){return x.status==="active"&&x.id!==o.id});if(!ha)newO();toast("\uD83D\uDCB3 #"+o.num+" \u2192 "+t.n)}
  else toast("\uD83D\uDCB3 #"+o.num+" \u2192 "+t.n);
  render();
  setTimeout(function(){if(o.status==="pending"){compPay(o,"failed");toast("\u26A0\uFE0F #"+o.num+" timeout")}},60000)
}
function compPay(o,r){
  o.status=r;
  var t=terms.find(function(x){return x.id===o.term});
  if(t){t.status=r==="approved"?"done":"idle";if(r!=="approved")t.oid=null}
  if(r==="approved"&&t)setTimeout(function(){if(t.status==="done"){t.status="idle";t.oid=null;render()}},3000);
  render()
}

/* ═══ KEYBOARD ═══ */
document.addEventListener("keydown",function(e){
  if(!staff)return;var ao=aO();
  if(e.key==="F1"||e.key==="F2"){e.preventDefault();var ti=e.key==="F1"?0:1;var t=terms[ti];if(ao&&ao.status==="active"&&ao.items.length&&(t.status==="idle"||t.status==="done"))sendTerm(ao,t);return}
  if(e.key==="F5"){e.preventDefault();newO();render();return}
  if(e.key==="Tab"){e.preventDefault();if(orders.length<2)return;var ci=orders.findIndex(function(o){return o.id===activeOid});var ni=e.shiftKey?(ci-1+orders.length)%orders.length:(ci+1)%orders.length;activeOid=orders[ni].id;render()}
});

/* ═══ INIT ═══ */
rPin();
window.addEventListener("resize",function(){if(staff)render()});
})();
</script>
</body>
