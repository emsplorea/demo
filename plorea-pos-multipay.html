/* ═══ ADD ITEM ═══ */
function addItem(p){
  var ao=aO();if(!ao||ao.status!=="active")return;
  var ex=ao.items.find(function(x){return x.id===p.id});
  if(ex)ex.qty++;else ao.items.push({id:p.id,n:p.n,p:p.p,ic:p.ic,qty:1,ck:uid()})
}

/* ═══ REPEAT ROUND ═══ */
function repeatRound(o){
  var last=o.rounds[o.rounds.length-1];
  last.forEach(function(ri){
    var ex=o.items.find(function(x){return x.id===ri.id});
    if(ex)ex.qty+=ri.qty;else o.items.push({id:ri.id,n:ri.n,p:ri.p,ic:ri.ic,qty:ri.qty,ck:uid()})
  });
  toast("\u21BB Runde gjentatt: "+last.length+" varer")
}

  [10,15,20].forEach(function(pct){
    var amt=Math.round(tot*pct/100);
    var b=el("button",{padding:"12px 16px",borderRadius:"var(--r)",border:"1.5px solid var(--color-selection-border)",background:"var(--color-selection)",color:"var(--color-selection-text)",fontSize:"13px",fontWeight:"700",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:"2px",transition:"all var(--dur-fast)"});
    b.innerHTML='<span>'+pct+'%</span><span style="font-size:11px;font-weight:500">'+amt+' kr</span>';
    b.addEventListener("click",function(){o.tip=amt;bd.remove();render();toast("\uD83D\uDCB0 "+amt+" kr tips lagt til")});
    pre.appendChild(b)
  });
  m.appendChild(pre);
  var ir=el("div",{display:"flex",gap:"8px"});
  var inp=document.createElement("input");inp.type="number";inp.placeholder="Egendefinert";
  Object.assign(inp.style,{flex:"1",padding:"12px 16px",borderRadius:"var(--r)",border:"1.5px solid var(--color-border)",background:"var(--bg-surface)",fontSize:"15px",outline:"none"});
  ir.appendChild(inp);
  ir.appendChild(btn("Legg til",{padding:"12px 20px",background:"var(--color-accent)",color:"var(--color-primary-text)",fontSize:"13px"},function(){var v=parseInt(inp.value);if(v>0){o.tip=v;bd.remove();render();toast("\uD83D\uDCB0 "+v+" kr tips")}}));
  m.appendChild(ir);
  var bd=bdrop(m,true)
}

/* ═══ RECEIPTS ═══ */
function showReceipts(){
  var m=mkModal();m.style.maxWidth="460px";
  m.innerHTML='<div style="font-family:Sora,sans-serif;font-size:20px;font-weight:700;text-align:center;margin-bottom:16px">\uD83D\uDDA8 Kvitteringer</div>';
  var list=el("div",{maxHeight:"400px",overflowY:"auto"});
  if(!receipts.length)list.innerHTML='<div style="text-align:center;padding:24px;color:var(--text-muted);font-size:13px">Ingen kvitteringer enn\u00e5</div>';
  else receipts.slice().reverse().forEach(function(r){
    var row=el("div",{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px",borderBottom:"1px solid var(--color-border)",gap:"8px"});
    row.innerHTML='<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700;color:var(--text-primary)">'+(r.name?esc(r.name):"Ordre #"+r.num)+'</div><div style="font-size:11px;color:var(--text-secondary)">'+r.items.map(function(i){return i.qty+"x "+i.n}).join(", ")+'</div></div><div style="text-align:right;flex-shrink:0"><div style="font-size:14px;font-weight:700;color:var(--color-accent)">'+r.total+' kr</div><div style="font-size:10px;color:var(--text-muted)">'+r.time+'</div></div>';
    var pb=el("button",{padding:"6px 12px",borderRadius:"var(--r-sm)",border:"1px solid var(--color-border)",background:"var(--bg-surface)",color:"var(--text-secondary)",fontSize:"10px",fontWeight:"600",cursor:"pointer",flexShrink:"0",marginLeft:"8px"},"\uD83D\uDDA8");
    pb.addEventListener("click",function(){toast("\uD83D\uDDA8\uFE0F Kvittering #"+r.num+" skrevet ut")});
    row.appendChild(pb);list.appendChild(row)
  });
  m.appendChild(list);
  m.appendChild(btn("Lukk",{padding:"12px 20px",border:"1.5px solid var(--color-border)",background:"var(--bg-surface)",color:"var(--text-secondary)",fontSize:"13px",width:"100%",marginTop:"12px"},function(){bd.remove()}));
  var bd=bdrop(m,true)
}

/* ═══ SPILL / SVINN — payment type flow ═══ */
function showSpill(o){
  if(!o||!o.items.length)return;
  var selReason=null;
  var costTot=oCost(o);
  var saleTot=oTot(o);

  function rSpill(){
    if(window._spillBd)window._spillBd.remove();
    var m=mkModal();
    m.style.maxWidth="460px";
    m.innerHTML='<div style="font-family:Sora,sans-serif;font-size:20px;font-weight:700;text-align:center;margin-bottom:4px">\uD83D\uDCA7 Registrer svinn</div><div style="font-size:13px;color:var(--text-secondary);text-align:center;margin-bottom:20px">Ordren sluttf\u00f8res til kostpris</div>';

    /* Items at cost price */
    var itemsDiv=el("div",{marginBottom:"16px",borderRadius:"var(--r)",border:"1px solid var(--color-border)",overflow:"hidden"});
    var hdr=el("div",{display:"flex",justifyContent:"space-between",padding:"8px 12px",background:"var(--bg-hover)",fontSize:"10px",fontWeight:"700",color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:".08em"});
    hdr.innerHTML="<span>Produkt</span><div style='display:flex;gap:24px'><span>Salg</span><span>Kost</span></div>";
    itemsDiv.appendChild(hdr);
    o.items.forEach(function(it){
      var prod=PRD.find(function(x){return x.id===it.id});
      var cp=prod?prod.cp:0;
      var row=el("div",{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 12px",borderTop:"1px solid var(--color-border)",fontSize:"13px"});
      row.innerHTML='<div style="display:flex;align-items:center;gap:8px;flex:1"><span>'+it.ic+'</span><span style="font-weight:600">'+it.qty+'x '+esc(it.n)+'</span></div><div style="display:flex;gap:24px;flex-shrink:0"><span style="color:var(--text-muted);text-decoration:line-through;min-width:48px;text-align:right">'+it.p*it.qty+' kr</span><span style="font-weight:700;color:var(--color-error);min-width:48px;text-align:right">'+cp*it.qty+' kr</span></div>';
      itemsDiv.appendChild(row)
    });
    /* Totals row */
    var totRow=el("div",{display:"flex",justifyContent:"space-between",padding:"10px 12px",borderTop:"2px solid var(--color-border)",fontSize:"13px",fontWeight:"700"});
    totRow.innerHTML='<span>Totalt</span><div style="display:flex;gap:24px"><span style="color:var(--text-muted);text-decoration:line-through;min-width:48px;text-align:right">'+saleTot+' kr</span><span style="color:var(--color-error);min-width:48px;text-align:right">'+costTot+' kr</span></div>';
    itemsDiv.appendChild(totRow);
    m.appendChild(itemsDiv);

    /* Reason picker */
    m.appendChild(el("div",{fontSize:"10px",fontWeight:"700",color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:".1em",marginBottom:"8px"},"\u00c5rsak for svinn"));
    var rg=el("div",{display:"flex",flexWrap:"wrap",gap:"8px",marginBottom:"20px"});
    SPILL_REASONS.forEach(function(r){
      var sel=selReason===r;
      var b=el("button",{padding:"8px 16px",borderRadius:"var(--r)",border:"1.5px solid "+(sel?"var(--color-error)":"var(--color-border)"),background:sel?"var(--color-error-bg)":"var(--bg-surface)",color:sel?"var(--err-tx)":"var(--text-secondary)",fontSize:"12px",fontWeight:"600",cursor:"pointer",transition:"all var(--dur-fast)"},r);
      b.addEventListener("click",function(){selReason=r;rSpill()});
      rg.appendChild(b)
    });
    m.appendChild(rg);

    /* Actions */
    var acts=el("div",{display:"flex",gap:"8px"});
    acts.appendChild(btn("Avbryt",{padding:"12px 20px",border:"1.5px solid var(--color-border)",background:"var(--bg-surface)",color:"var(--text-secondary)",fontSize:"13px",flex:"1"},function(){window._spillBd.remove()}));
    var canConfirm=!!selReason;
    acts.appendChild(btn("Registrer svinn \u2013 "+costTot+" kr",{padding:"12px 20px",background:canConfirm?"var(--color-error)":"var(--color-border)",color:canConfirm?"#fff":"var(--text-muted)",fontSize:"13px",flex:"2",cursor:canConfirm?"pointer":"default"},function(){
      if(!selReason)return;
      /* Log spill */
      spillLog.push({items:o.items.map(function(i){var prod=PRD.find(function(x){return x.id===i.id});return{n:i.n,qty:i.qty,salePrice:i.p*i.qty,costPrice:(prod?prod.cp:0)*i.qty}}),reason:selReason,saleTot:saleTot,costTot:costTot,time:now(),staff:staff.n});
      /* Close order */
      o.status="spill";o.spillReason=selReason;o.spillCost=costTot;
      orders=orders.filter(function(x){return x.id!==o.id});
      if(orders.length)activeOid=orders[orders.length-1].id;else newO();
      window._spillBd.remove();render();
      toast("\uD83D\uDCA7 Svinn registrert: "+costTot+" kr ("+selReason+")")
    }));
    m.appendChild(acts);
    window._spillBd=bdrop(m,true)
  }
  rSpill()
}

/* ═══ TERMINAL ═══ */
function sendTerm(o,t){
  // Save current items as a "round" for repeater
  o.rounds.push(o.items.map(function(i){return{id:i.id,n:i.n,p:i.p,ic:i.ic,qty:i.qty}}));
  o.status="pending";o.term=t.id;o.sentAt=Date.now();
  t.status="busy";t.oid=o.id;startTi();
  if(autoNew){var ha=orders.some(function(x){return x.status==="active"&&x.id!==o.id});if(!ha)newO();toast("\uD83D\uDCB3 "+(o.name||"#"+o.num)+" \u2192 "+t.n)}
  else toast("\uD83D\uDCB3 "+(o.name||"#"+o.num)+" \u2192 "+t.n);
  render();
  setTimeout(function(){if(o.status==="pending"){compPay(o,"failed");toast("\u26A0\uFE0F "+(o.name||"#"+o.num)+" timeout")}},60000)
}
function compPay(o,r){
  var t=terms.find(function(x){return x.id===o.term});
  if(t){t.status=r==="approved"?"done":"idle";if(r!=="approved")t.oid=null}
  if(r==="approved"&&t)setTimeout(function(){if(t.status==="done"){t.status="idle";t.oid=null;render()}},3000);

  if(r==="approved"){
    /* Save receipt */
    receipts.push({id:uid(),num:o.num,name:o.name,items:o.items.map(function(i){return{n:i.n,p:i.p,qty:i.qty,ic:i.ic}}),total:oTot(o),tip:o.tip||0,time:now(),staff:staff.n});
    toast("\u2705 "+(o.name||"#"+o.num)+" \u2013 "+oTot(o)+" kr godkjent");

    if(o.name){
      /* Named tab: prefill with last round, ready for next */
      var lastR=o.rounds.length?o.rounds[o.rounds.length-1]:[];
      o.items=lastR.map(function(i){return{id:i.id,n:i.n,p:i.p,ic:i.ic,qty:i.qty,ck:uid()}});
      o.status="active";o.term=null;o.sentAt=null;o.tip=0;
    } else {
      /* Regular order: close and move on */
      orders=orders.filter(function(x){return x.id!==o.id});
      if(!orders.some(function(x){return x.status==="active"}))newO();
      if(!orders.find(function(x){return x.id===activeOid}))activeOid=orders[orders.length-1].id;
    }
  } else {
    o.status="failed";
  }
  render()
}

/* ═══ KEYBOARD ═══ */
document.addEventListener("keydown",function(e){
  if(!staff)return;var ao=aO();
  if(e.key==="F1"||e.key==="F2"){e.preventDefault();var ti=e.key==="F1"?0:1;var t=terms[ti];if(ao&&ao.status==="active"&&ao.items.length&&(t.status==="idle"||t.status==="done"))sendTerm(ao,t);return}
  if(e.key==="F5"){e.preventDefault();newO();render();return}
  if(e.key==="Tab"){e.preventDefault();if(orders.length<2)return;var ci=orders.findIndex(function(o){return o.id===activeOid});var ni=e.shiftKey?(ci-1+orders.length)%orders.length:(ci+1)%orders.length;activeOid=orders[ni].id;render()}
});

rPin();
window.addEventListener("resize",function(){if(staff)render()});
})();
</script>
