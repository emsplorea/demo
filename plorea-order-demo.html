];

const Z={_l:[],_s:{m:"qr",ac:1,cart:[],co:false,sp:null,ei:null,ld:false,af:[],sf:false,li:false,ls:false,u:{name:"",phone:"",email:""},cs:0,sv:"pickup",pt:"asap",cm:"",pm:"",dn:false,cmb:null,ff:null,idle:false,dineChoice:false,dineType:""},
g(k){return this._s[k]},a(){return{...this._s}},s(u){Object.assign(this._s,u);this._l.forEach(f=>f(this._s))},on(f){this._l.push(f)},
aC(p,q,sl){const ex=(sl||[]).reduce((a,o)=>a+(o.p||0),0);this.s({cart:[...this._s.cart,{uid:uid(),pr:p,qty:q,sl:sl||[],tp:(p.p+ex)*q}],cmb:null});if(CMB[p.id]){const c=CMB[p.id];this.s({cmb:{its:c.ids.map(id=>P.find(x=>x.id===id)).filter(Boolean),deal:c.deal,label:c.label,forName:p.n}})}},

ct(){return this._s.cart.reduce((s,i)=>s+i.tp,0)},cn(){return this._s.cart.reduce((s,i)=>s+i.qty,0)}};

let mS={},mQ=1,mI=false;

document.getElementById("mb").innerHTML=ms.map(x=>`<button class="${m===x.k?'on':''}" onclick="Z.s({m:'${x.k}',co:false,sp:null,ei:null,cs:0,dn:false,cmb:null})">${x.l}</button>`).join('');

d.style.width=ip?"375px":ik?"520px":"100%";d.style.maxWidth="100%";d.style.height="100%";d.style.maxHeight=ip?"720px":"100%";d.style.borderRadius=m.includes("landscape")?"8px":"16px";
