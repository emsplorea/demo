<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Plorea POS</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Plus Jakarta Sans',-apple-system,sans-serif;color:#1A1A1A;background:#e0e0e0;-webkit-font-smoothing:antialiased;display:flex;justify-content:center}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(107,184,218,.25);border-radius:3px}
input::placeholder{color:#C4C4C4}
#app{width:100%;max-width:480px;height:100vh;background:#FAFAFA;display:flex;flex-direction:column;position:relative;overflow:hidden}
@keyframes sU{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fI{from{opacity:0}to{opacity:1}}
@keyframes sI{from{transform:scale(.93);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes pI{0%{transform:scale(.85);opacity:.5}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes cP{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes pl{0%,100%{box-shadow:0 0 0 0 rgba(107,184,218,.3)}50%{box-shadow:0 0 0 10px rgba(107,184,218,0)}}
@keyframes tI{0%{transform:translateX(-50%) translateY(-20px);opacity:0}100%{transform:translateX(-50%) translateY(0);opacity:1}}
@keyframes sh{0%,100%{transform:translateX(0)}25%,75%{transform:translateX(-6px)}50%{transform:translateX(6px)}}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
"use strict";
var $=document.getElementById("app");

var CAT=[{id:"popular",n:"Popul\u00e6rt",ic:"\uD83D\uDD25"},{id:"burgers",n:"Burgere",ic:"\uD83C\uDF54"},{id:"chicken",n:"Kylling",ic:"\uD83C\uDF57"},{id:"sides",n:"Tilbeh\u00f8r",ic:"\uD83C\uDF5F"},{id:"drinks",n:"Drikke",ic:"\uD83E\uDD64"},{id:"desserts",n:"Dessert",ic:"\uD83C\uDF66"}];
var PRD=[
{id:1,n:"Classic Burger",d:"Angus biff, cheddar",p:139,c:"burgers",ic:"\uD83C\uDF54"},
{id:2,n:"Dobbel Cheese",d:"2x biff, 2x cheddar",p:169,c:"burgers",ic:"\uD83C\uDF54"},
{id:3,n:"BBQ Bacon",d:"Bacon, BBQ-saus",p:179,c:"burgers",ic:"\uD83C\uDF54"},
{id:4,n:"Veggie Burger",d:"Plantebasert, avokado",p:149,c:"burgers",ic:"\uD83E\uDD6C"},
{id:5,n:"Crispy Chicken",d:"Panert kyllingfilet",p:139,c:"chicken",ic:"\uD83C\uDF57"},
{id:6,n:"Spicy Chicken",d:"Chili-marinert",p:149,c:"chicken",ic:"\uD83C\uDF36\uFE0F"},
{id:7,n:"Chicken Wrap",d:"Grillet kylling",p:129,c:"chicken",ic:"\uD83C\uDF2F"},
{id:8,n:"Pommes Frites",d:"Spr\u00f8stekte",p:49,c:"sides",ic:"\uD83C\uDF5F"},
{id:9,n:"S\u00f8tpotetfries",d:"Crispy s\u00f8tpotet",p:59,c:"sides",ic:"\uD83C\uDF60"},
{id:10,n:"L\u00f8kringer",d:"Panerte, med dip",p:59,c:"sides",ic:"\uD83E\uDDC5"},
{id:11,n:"Cola",d:"0.5L",p:39,c:"drinks",ic:"\uD83E\uDD64"},
{id:12,n:"Fanta",d:"0.5L",p:39,c:"drinks",ic:"\uD83C\uDF4A"},
{id:13,n:"Milkshake",d:"Sjokolade/vanilje",p:69,c:"drinks",ic:"\uD83E\uDD5B"},
{id:14,n:"Sjokoladekake",d:"Varm, vaniljeis",p:79,c:"desserts",ic:"\uD83C\uDF6B"},
{id:15,n:"Softis",d:"Vanilje",p:49,c:"desserts",ic:"\uD83C\uDF66"},
{id:16,n:"Churros",d:"Sjokoladedip",p:59,c:"desserts",ic:"\uD83E\uDD56"}
];
var POP=[1,2,5,8,11,14];
var STF=[{n:"Maria H.",pin:"1234"},{n:"Erik S.",pin:"5678"},{n:"Lina K.",pin:"9012"}];
var DSC=[{l:"10%",t:"p",v:10},{l:"20%",t:"p",v:20},{l:"50%",t:"p",v:50},{l:"Ansatt",t:"p",v:30},{l:"50 kr",t:"f",v:50},{l:"100 kr",t:"f",v:100}];
var ATTRS={size:{l:"St\u00f8rrelse",o:["Liten","Medium","Stor"],pm:{Liten:-20,Medium:0,Stor:30}},extras:{l:"Ekstra",o:["Bacon","Ost","Jalape\u00f1o","Ekstra saus","Avokado","Egg"],pe:15},drink:{l:"Drikke",o:["Cola","Fanta","Sprite","Vann"]}};
var PA={burgers:["size","extras","drink"],chicken:["size","extras","drink"],sides:["size"],drinks:["size"],desserts:["size"]};

var staff=null,pin="",pinErr=false,aCat="popular",cart=[],disc=null,cashW=0,parked=[],drLog=[],sales=[],shift=null;

function uid(){return Date.now()+Math.random()}
function now(){return new Date().toLocaleTimeString("no-NO",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}
function tdy(){return new Date().toLocaleDateString("no-NO",{day:"2-digit",month:"2-digit",year:"numeric"})}
function defAt(c){var a={};(PA[c]||[]).forEach(function(k){a[k]=k==="extras"?{}:k==="size"?"Medium":null});return a}
function pmod(at){var m=0;if(at.size&&ATTRS.size.pm[at.size])m+=ATTRS.size.pm[at.size];if(at.extras)for(var k in at.extras)m+=at.extras[k]*15;return m}
function uprc(it){return it.p+pmod(it.at||{})}
function lprc(it){return uprc(it)*it.qty}
function csub(){var s=0;cart.forEach(function(i){s+=lprc(i)});return s}
function damt(){if(!disc)return 0;return disc.t==="p"?Math.round(csub()*disc.v/100):Math.min(disc.v,csub())}
function ctot(){return csub()-damt()}
function ccnt(){var s=0;cart.forEach(function(i){s+=i.qty});return s}
function fmtAt(at,c){var p=[];(PA[c]||[]).forEach(function(k){if(k==="size"&&at.size)p.push(at.size);if(k==="extras"&&at.extras){var x=[];for(var n in at.extras)if(at.extras[n]>0)x.push(at.extras[n]>1?at.extras[n]+"x "+n:n);if(x.length)p.push(x.join(", "))}if(k==="drink"&&at.drink)p.push(at.drink)});return p.join(" \u00b7 ")}
function logo(s){return '<span style="font-family:Sora,sans-serif;font-size:'+s+'px;font-weight:700;color:#1A1A1A;letter-spacing:-.01em">Pl<span style="color:#6BB8DA">or</span>ea</span>'}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function drBal(){var s=0;drLog.forEach(function(e){s+=e.a==="in"?e.v:-e.v});return s}

function el(tag,st,inner){var e=document.createElement(tag);if(st)Object.assign(e.style,st);if(inner!==undefined)e.innerHTML=inner;return e}
function toast(m){var t=el("div",{position:"absolute",top:"56px",left:"50%",transform:"translateX(-50%)",background:"#1A1A1A",color:"#fff",padding:"10px 20px",borderRadius:"10px",fontSize:"14px",fontWeight:"600",zIndex:"300",animation:"tI .3s",whiteSpace:"nowrap"},m);$.appendChild(t);setTimeout(function(){t.remove()},2800)}

function bdrop(content,center){
  var b=el("div",{position:"absolute",inset:"0",background:"rgba(0,0,0,.48)",backdropFilter:"blur(6px)",display:"flex",alignItems:center?"center":"flex-end",justifyContent:"center",zIndex:"200",animation:"fI .16s"});
  b.appendChild(content);
  b.addEventListener("click",function(e){if(e.target===b)b.remove()});
  $.appendChild(b);return b;
}
function mkSheet(){var s=el("div",{background:"#fff",borderRadius:"20px 20px 0 0",width:"100%",maxHeight:"90vh",display:"flex",flexDirection:"column",overflow:"hidden",animation:"sU .28s cubic-bezier(.16,1,.3,1)",boxShadow:"0 12px 40px rgba(0,0,0,.12)"});s.addEventListener("click",function(e){e.stopPropagation()});return s}
function mkModal(){var m=el("div",{background:"#fff",borderRadius:"20px",padding:"24px 22px",width:"calc(100% - 40px)",maxWidth:"380px",margin:"auto",animation:"sI .25s cubic-bezier(.16,1,.3,1)",boxShadow:"0 12px 40px rgba(0,0,0,.12)"});m.addEventListener("click",function(e){e.stopPropagation()});return m}

function mkBtn(label,style,onClick){var b=document.createElement("button");b.textContent=label;Object.assign(b.style,{borderRadius:"14px",cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:"700",border:"none"},style);b.addEventListener("click",onClick);return b}
function mkPayHead(title){return '<div style="padding:16px 18px 10px;border-bottom:1px solid #E9E9E9;display:flex;align-items:center;justify-content:space-between"><div style="width:36px"></div><div style="font-family:Sora,sans-serif;font-size:17px;font-weight:700;color:#1A1A1A;flex:1;text-align:center">'+title+'</div><div style="width:36px"></div></div>'}

/* ═══ PIN ═══ */
function rPin(){
  $.innerHTML="";
  var w=el("div",{position:"absolute",inset:"0",background:"#fff",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:"300",padding:"20px"});
  w.innerHTML=logo(28)+'<div style="font-family:Sora;font-size:12px;color:#666666;margin-top:10px;margin-bottom:32px;text-transform:uppercase;letter-spacing:.08em;font-weight:600">POS Terminal</div>';
  var dots=el("div",{display:"flex",gap:"12px",marginBottom:"10px"});
  for(var i=0;i<4;i++){var d=el("div",{width:"20px",height:"20px",borderRadius:"50%",border:"2.5px solid #E9E9E9",transition:"all .16s"});if(pin.length>i){d.style.background="#2E6B87";d.style.borderColor="#2E6B87"}if(pinErr){d.style.borderColor="#DA6B6B";d.style.animation="sh .4s";if(pin.length>i)d.style.background="#DA6B6B"}dots.appendChild(d)}
  w.appendChild(dots);
  var msg=el("div",{fontSize:"13px",color:pinErr?"#DA6B6B":"#666666",height:"22px",marginBottom:"16px",fontWeight:"500"},pinErr?"Feil PIN-kode":"Tast inn 4-sifret PIN");
  w.appendChild(msg);
  var pad=el("div",{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"10px",width:"250px"});
  [1,2,3,4,5,6,7,8,9,"C",0,"B"].forEach(function(v){
    var b=el("button",{height:"56px",borderRadius:"14px",border:"1px solid #E9E9E9",background:"#fff",color:v==="C"||v==="B"?"#666666":"#1A1A1A",fontSize:v==="C"||v==="B"?"13px":"22px",fontWeight:"600",cursor:"pointer",fontFamily:v==="C"||v==="B"?"inherit":"Sora,sans-serif",display:"flex",alignItems:"center",justifyContent:"center"},v==="C"?"Slett":v==="B"?"\u232B":String(v));
    b.addEventListener("click",function(){
      if(String(v)==="C"){pin="";pinErr=false;rPin();return}
      if(String(v)==="B"){pin=pin.slice(0,-1);pinErr=false;rPin();return}
      pin+=v;
      if(pin.length===4){var f=STF.find(function(s){return s.pin===pin});if(f){staff=f;pin="";pinErr=false;if(!shift)shift=now();rMain()}else{pinErr=true;rPin();setTimeout(function(){pin="";pinErr=false;rPin()},800)}}else rPin()
    });
    pad.appendChild(b)
  });
  w.appendChild(pad);
  w.appendChild(el("div",{fontSize:"11px",color:"#666666",marginTop:"20px",opacity:".6"},"Demo: 1234 (Manager) \u00b7 5678 \u00b7 9012"));
  $.appendChild(w)
}

/* ═══ MAIN ═══ */
function rMain(){
  $.innerHTML="";
  var prods=aCat==="popular"?PRD.filter(function(p){return POP.indexOf(p.id)>=0}):PRD.filter(function(p){return p.c===aCat});
  // Header
  var hdr=el("div",{padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:"0",background:"#fff",borderBottom:"1px solid #E9E9E9",boxShadow:"0 1px 4px rgba(0,0,0,.07)",zIndex:"10"});
  hdr.innerHTML='<div style="display:flex;align-items:center;gap:10px">'+logo(17)+'<span style="font-size:10px;font-weight:700;color:#2E6B87;background:#EBF6FB;padding:3px 10px;border-radius:20px;letter-spacing:.08em;border:1px solid rgba(107,184,218,.25)">POS</span></div>';
  var hr=el("div",{display:"flex",alignItems:"center",gap:"6px"});
  if(parked.length){var pk=el("button",{fontSize:"11px",fontWeight:"700",color:"#8a7a20",background:"rgba(218,218,107,.12)",border:"1px solid rgba(218,218,107,.35)",padding:"4px 10px",borderRadius:"20px",cursor:"pointer"},"\uD83C\uDD7F\uFE0F "+parked.length);pk.addEventListener("click",showParked);hr.appendChild(pk)}
  var db=el("button",{width:"34px",height:"34px",borderRadius:"10px",border:"1px solid #E9E9E9",background:"#F1F5F9",cursor:"pointer",fontSize:"14px",display:"flex",alignItems:"center",justifyContent:"center"},"\uD83D\uDCB0");db.addEventListener("click",showDrawer);hr.appendChild(db);
  var zb=el("button",{width:"34px",height:"34px",borderRadius:"10px",border:"1px solid #E9E9E9",background:"#F1F5F9",cursor:"pointer",fontSize:"14px",display:"flex",alignItems:"center",justifyContent:"center"},"\uD83D\uDCCA");zb.addEventListener("click",showZ);hr.appendChild(zb);
  var sb=el("button",{fontSize:"11px",fontWeight:"700",color:"#2E6B87",background:"#EBF6FB",padding:"5px 12px",borderRadius:"20px",border:"1px solid rgba(107,184,218,.25)",cursor:"pointer"},staff.n+" \u2715");sb.addEventListener("click",function(){staff=null;rPin()});hr.appendChild(sb);
  hdr.appendChild(hr);$.appendChild(hdr);
  // Cats
  var cb=el("div",{flexShrink:"0",padding:"8px 0",background:"#fff",borderBottom:"1px solid #E9E9E9"});
  var cs=el("div",{display:"flex",gap:"6px",padding:"0 14px",overflowX:"auto"});
  CAT.forEach(function(c){var a=aCat===c.id;var b=el("button",{display:"flex",alignItems:"center",gap:"5px",padding:"8px 14px",borderRadius:"9999px",border:"1.5px solid "+(a?"#6BB8DA":"#E9E9E9"),background:a?"#EBF6FB":"#fff",color:a?"#2E6B87":"#666666",fontSize:"13px",fontWeight:"600",cursor:"pointer",whiteSpace:"nowrap",flexShrink:"0"},c.ic+" "+c.n);b.addEventListener("click",function(){aCat=c.id;rMain()});cs.appendChild(b)});
  cb.appendChild(cs);$.appendChild(cb);
  // Grid
  var ga=el("div",{flex:"1",overflowY:"auto",padding:"12px",minHeight:"0"});
  var gr=el("div",{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"});
  prods.forEach(function(p){
    var ic=0;cart.forEach(function(x){if(x.id===p.id)ic+=x.qty});
    var cd=el("button",{position:"relative",background:"#fff",border:"1px solid #E9E9E9",borderRadius:"14px",cursor:"pointer",textAlign:"left",color:"#1A1A1A",overflow:"hidden",display:"flex",flexDirection:"column",boxShadow:"0 1px 4px rgba(0,0,0,.07)",fontFamily:"inherit"});
    cd.innerHTML=(ic?'<div style="position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:50%;background:#2E6B87;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;z-index:2">'+ic+"</div>":"")+'<div style="height:80px;display:flex;align-items:center;justify-content:center;background:#F1F5F9;font-size:44px">'+p.ic+'</div><div style="padding:10px 12px 12px;display:flex;flex-direction:column;gap:2px;flex:1"><div style="font-size:14px;font-weight:700;line-height:1.2">'+esc(p.n)+'</div><div style="font-size:11px;color:#666">'+esc(p.d)+'</div><div style="font-size:15px;font-weight:700;color:#2E6B87;margin-top:4px">'+p.p+" kr</div></div>";
    cd.addEventListener("click",function(){addProduct(p)});gr.appendChild(cd)
  });
  ga.appendChild(gr);$.appendChild(ga);
  // Bottom
  var cc=ccnt(),ct=ctot(),da=damt();
  if(cc){
    var bb=el("div",{flexShrink:"0",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",background:"#fff",borderTop:"1px solid rgba(107,184,218,.25)",cursor:"pointer",minHeight:"72px",gap:"10px",boxShadow:"0 -2px 8px rgba(0,0,0,.04)"});
    bb.innerHTML='<div style="display:flex;align-items:center;gap:8px"><div style="width:32px;height:32px;border-radius:50%;background:#2E6B87;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700">'+cc+'</div><span style="font-size:13px;font-weight:600;color:#3F3D45">'+cc+' varer</span></div><div style="display:flex;align-items:center;gap:10px">'+(disc?'<span style="font-size:11px;font-weight:700;color:#DA6B6B;background:rgba(218,107,107,.1);padding:2px 8px;border-radius:8px">-'+da+'kr</span>':"")+'<span style="font-size:16px;font-weight:700;color:#1A1A1A">'+ct+' kr</span><div style="padding:10px 16px;background:#2E6B87;border-radius:10px;color:#fff;font-size:12px;font-weight:700">Se bestilling \u2192</div></div>';
    bb.addEventListener("click",showCart);$.appendChild(bb)
  }else{$.appendChild(el("div",{flexShrink:"0",padding:"16px",textAlign:"center",fontSize:"13px",color:"#666666",borderTop:"1px solid #E9E9E9",background:"#fff",opacity:".5"},"Trykk p\u00e5 et produkt for \u00e5 starte"))}
}

/* ═══ ADD PRODUCT ═══ */
function addProduct(p){
  var keys=PA[p.c]||[];
  if(!keys.length){cart.push({id:p.id,n:p.n,d:p.d,p:p.p,c:p.c,ic:p.ic,qty:1,at:defAt(p.c),ck:uid()});rMain();return}
  var at=defAt(p.c),qty=1,bd;
  function render(){
    if(bd)bd.remove();
    var up=p.p+pmod(at),s=mkSheet();
    s.innerHTML='<div style="padding:20px 20px 12px;border-bottom:1px solid #E9E9E9;display:flex;align-items:center;gap:12px"><div style="width:48px;height:48px;border-radius:10px;background:#F1F5F9;display:flex;align-items:center;justify-content:center;font-size:26px">'+p.ic+'</div><div><div style="font-family:Sora;font-size:16px;font-weight:700;color:#1A1A1A">'+esc(p.n)+'</div><div style="font-size:12px;color:#666666">'+esc(p.d)+'</div></div></div>';
    var body=el("div",{flex:"1",overflowY:"auto",padding:"14px 20px"});
    keys.forEach(function(k){
      var def=ATTRS[k],grp=el("div",{marginBottom:"18px"});
      grp.innerHTML='<div style="font-size:10px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px">'+def.l+(k==="extras"?" \u2013 velg antall":"")+"</div>";
      var list=el("div",{display:"flex",flexDirection:"column",gap:"6px"});
      if(k==="extras"){
        def.o.forEach(function(o){
          var cnt=(at.extras&&at.extras[o])||0;
          var row=el("div",{display:"flex",alignItems:"center",gap:"8px",padding:"11px 12px",borderRadius:"10px",border:"1.5px solid "+(cnt?"#6BB8DA":"#E9E9E9"),background:cnt?"#EBF6FB":"#fff",color:cnt?"#2E6B87":"#3F3D45",fontSize:"14px",fontWeight:"500",justifyContent:"space-between"});
          row.innerHTML='<div style="flex:1;display:flex;align-items:center;gap:8px"><span>'+esc(o)+'</span><span style="font-size:12px;color:#666666">+'+def.pe+'kr</span></div>';
          var stp=el("div",{display:"flex",alignItems:"center",background:"#F1F5F9",borderRadius:"8px",overflow:"hidden",border:"1px solid #E9E9E9"});
          var dc=el("button",{width:"30px",height:"30px",border:"none",background:"transparent",color:"#3F3D45",fontSize:"14px",fontWeight:"600",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"},"\u2212");
          dc.addEventListener("click",function(e){e.stopPropagation();if(!at.extras)at.extras={};at.extras[o]=Math.max(0,(at.extras[o]||0)-1);if(!at.extras[o])delete at.extras[o];render()});
          var vl=el("span",{width:"18px",textAlign:"center",fontSize:"13px",fontWeight:"700",color:cnt?"#2E6B87":"#666666"},String(cnt));
          var ic=el("button",{width:"30px",height:"30px",border:"none",background:"transparent",color:"#3F3D45",fontSize:"14px",fontWeight:"600",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"},"+");
          ic.addEventListener("click",function(e){e.stopPropagation();if(!at.extras)at.extras={};at.extras[o]=(at.extras[o]||0)+1;render()});
          stp.appendChild(dc);stp.appendChild(vl);stp.appendChild(ic);row.appendChild(stp);list.appendChild(row)
        })
      }else{
        def.o.forEach(function(o){
          var sel=at[k]===o,pr=k==="size"&&ATTRS.size.pm[o]!==0?(ATTRS.size.pm[o]>0?"+"+ATTRS.size.pm[o]+"kr":ATTRS.size.pm[o]+"kr"):"";
          var btn=el("button",{display:"flex",alignItems:"center",gap:"8px",padding:"11px 12px",borderRadius:"10px",border:"1.5px solid "+(sel?"#6BB8DA":"#E9E9E9"),background:sel?"#EBF6FB":"#fff",color:sel?"#2E6B87":"#3F3D45",fontSize:"14px",fontWeight:"500",cursor:"pointer",width:"100%"});
          btn.innerHTML='<span style="flex:1">'+esc(o)+"</span>"+(pr?'<span style="font-size:12px;color:#666666">'+pr+"</span>":"")+(sel?'<span style="color:#2E6B87;font-weight:700">\u2713</span>':"");
          btn.addEventListener("click",function(){at[k]=o;render()});list.appendChild(btn)
        })
      }
      grp.appendChild(list);body.appendChild(grp)
    });
    s.appendChild(body);
    // Qty
    var qf=el("div",{padding:"12px 20px",borderTop:"1px solid #E9E9E9",background:"#F1F5F9"});
    var qr=el("div",{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"4px"});

function showCW(){var m=mkModal();m.innerHTML='<div style="font-size:36px;text-align:center;margin-bottom:8px">\uD83C\uDFE7</div><div style="font-family:Sora;font-size:20px;font-weight:700;text-align:center;margin-bottom:6px">Cash Withdraw</div><div style="font-size:13px;color:#666666;text-align:center;margin-bottom:14px">Legges til kundens betaling</div>';var pre=el("div",{display:"flex",gap:"8px",flexWrap:"wrap",justifyContent:"center",marginBottom:"14px"});[100,200,300,500,1000].forEach(function(v){var b=el("button",{padding:"10px 16px",borderRadius:"10px",border:"1.5px solid rgba(107,184,218,.25)",background:"#EBF6FB",color:"#2E6B87",fontSize:"14px",fontWeight:"700",cursor:"pointer"},v+" kr");b.addEventListener("click",function(){cashW=v;bd.remove();showPayFlow()});pre.appendChild(b)});m.appendChild(pre);var ir=el("div",{display:"flex",gap:"8px"});var inp=document.createElement("input");inp.type="number";inp.placeholder="Annet bel\u00f8p";Object.assign(inp.style,{flex:"1",padding:"14px 16px",borderRadius:"10px",border:"1.5px solid #E9E9E9",background:"#fff",fontSize:"16px",outline:"none"});ir.appendChild(inp);ir.appendChild(mkBtn("OK",{padding:"14px 20px",background:"#2E6B87",color:"#fff",fontSize:"14px"},function(){var v=parseInt(inp.value);if(v>0)cashW=v;bd.remove();showPayFlow()}));m.appendChild(ir);var bd=bdrop(m,true)}

function splitPersons(){var sp=2,bd;function r(){if(bd)bd.remove();var ct=ctot(),pp=Math.ceil(ct/sp),s=mkSheet();s.innerHTML=mkPayHead("Splitt p\u00e5 personer");var body=el("div",{padding:"14px 20px 20px"});var step=el("div",{display:"flex",alignItems:"center",justifyContent:"center",background:"#F1F5F9",borderRadius:"14px",overflow:"hidden",marginBottom:"16px",border:"1px solid #E9E9E9"});var dc=el("button",{width:"52px",height:"52px",border:"none",background:"transparent",color:"#3F3D45",fontSize:"22px",fontWeight:"700",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"},"\u2212");dc.addEventListener("click",function(){sp=Math.max(2,sp-1);r()});var vl=el("span",{width:"56px",textAlign:"center",fontFamily:"Sora",fontSize:"26px",fontWeight:"700",color:"#2E6B87"},String(sp));var ic=el("button",{width:"52px",height:"52px",border:"none",background:"transparent",color:"#3F3D45",fontSize:"22px",fontWeight:"700",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"},"+");ic.addEventListener("click",function(){sp=Math.min(10,sp+1);r()});step.appendChild(dc);step.appendChild(vl);step.appendChild(ic);body.appendChild(step);var summ=el("div",{background:"#EBF6FB",borderRadius:"14px",padding:"12px 16px",marginBottom:"16px",border:"1px solid rgba(107,184,218,.25)"});summ.innerHTML='<div style="display:flex;justify-content:space-between;font-size:14px;padding:3px 0"><span>Totalt</span><span>'+ct+' kr</span></div><div style="display:flex;justify-content:space-between;font-size:14px;padding:3px 0"><span>Per person</span><span style="font-weight:700;color:#2E6B87;font-size:20px">'+pp+" kr</span></div>";body.appendChild(summ);var btns=el("div",{display:"flex",gap:"10px"});["card","cash"].forEach(function(m){var b=el("button",{flex:"1",display:"flex",alignItems:"center",justifyContent:"center",gap:"6px",padding:"18px 14px",borderRadius:"14px",border:"1.5px solid #E9E9E9",background:"#fff",cursor:"pointer",fontSize:"15px",fontWeight:"600"});b.textContent=m==="card"?"\uD83D\uDCB3 Kort":"\uD83D\uDCB5 Kontant";b.addEventListener("click",function(){bd.remove();payTerm(m,pp+cashW,"persons")});btns.appendChild(b)});body.appendChild(btns);s.appendChild(body);bd=bdrop(s)}r()}

function splitItems(){var sel={},bd;function r(){if(bd)bd.remove();var tot=0;cart.forEach(function(it){tot+=uprc(it)*(sel[it.ck]||0)});var s=mkSheet();s.innerHTML=mkPayHead("Velg varer & antall");var body=el("div",{flex:"1",overflowY:"auto",padding:"10px 16px"});cart.forEach(function(it){var sq=sel[it.ck]||0,up=uprc(it),at=fmtAt(it.at||{},it.c);var cd=el("div",{padding:"14px",borderRadius:"14px",border:"1.5px solid "+(sq?"#6BB8DA":"#E9E9E9"),background:sq?"#EBF6FB":"#fff",marginBottom:"8px"});cd.innerHTML='<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px"><span style="font-size:22px">'+it.ic+'</span><div style="flex:1"><div style="font-size:14px;font-weight:600">'+esc(it.n)+"</div>"+(at?'<div style="font-size:11px;color:#468DAC">'+esc(at)+"</div>":"")+'</div><div style="text-align:right"><div style="font-size:12px;color:#666666">'+up+' kr/stk</div><div style="font-size:14px;font-weight:700;color:'+(sq?"#2E6B87":"#666666")+'">'+up*sq+" kr</div></div></div>";var row2=el("div",{display:"flex",alignItems:"center",justifyContent:"space-between"});row2.innerHTML='<span style="font-size:12px;color:#666666">Bestilt: '+it.qty+"</span>";var right=el("div",{display:"flex",alignItems:"center",gap:"4px"});right.innerHTML='<span style="font-size:12px;color:#666666;margin-right:4px">Betal:</span>';var stp=el("div",{display:"flex",alignItems:"center",background:"#F1F5F9",borderRadius:"10px",overflow:"hidden",border:"1px solid #E9E9E9"});var dc=el("button",{width:"36px",height:"36px",border:"none",background:"transparent",color:"#3F3D45",fontSize:"16px",fontWeight:"600",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"},"\u2212");(function(ck){dc.addEventListener("click",function(){sel[ck]=Math.max(0,(sel[ck]||0)-1);r()})})(it.ck);var vl=el("span",{width:"22px",textAlign:"center",fontSize:"14px",fontWeight:"700",color:sq?"#2E6B87":"#666666"},String(sq));var inc=el("button",{width:"36px",height:"36px",border:"none",background:"transparent",color:"#3F3D45",fontSize:"16px",fontWeight:"600",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"},"+");(function(ck,max){inc.addEventListener("click",function(){sel[ck]=Math.min(max,(sel[ck]||0)+1);r()})})(it.ck,it.qty);stp.appendChild(dc);stp.appendChild(vl);stp.appendChild(inc);right.appendChild(stp);row2.appendChild(right);cd.appendChild(row2);body.appendChild(cd)});s.appendChild(body);var foot=el("div",{display:"flex",gap:"10px",padding:"12px 20px 20px",alignItems:"center",borderTop:"1px solid #E9E9E9"});foot.innerHTML='<div style="flex:1"><div style="font-size:12px;color:#666666">Din del</div><div style="font-size:20px;font-weight:700;color:#2E6B87">'+tot+" kr</div></div>";if(tot>0){["card","cash"].forEach(function(m){var b=el("button",{padding:"12px 18px",borderRadius:"10px",border:"1.5px solid rgba(107,184,218,.25)",background:"#EBF6FB",color:"#2E6B87",fontSize:"18px",fontWeight:"600",cursor:"pointer"});b.textContent=m==="card"?"\uD83D\uDCB3":"\uD83D\uDCB5";b.addEventListener("click",function(){bd.remove();payTerm(m,tot+cashW,"items")});foot.appendChild(b)})}s.appendChild(foot);bd=bdrop(s)}r()}

,function(){alert("\uD83D\uDDA8\uFE0F Printer...")}));m.appendChild(btns);var bd=bdrop(m,true)}
