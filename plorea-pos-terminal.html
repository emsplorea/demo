<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Plorea POS</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FAFAFA;--sf:#FFFFFF;--sfH:#F1F5F9;--ov:rgba(0,0,0,.48);
  --tp:#1A1A1A;--ts:#666666;--tm:#C4C4C4;--tl:#2E6B87;
  --pri:#6BB8DA;--priH:#4FA3C8;--priT:#FFFFFF;--acc:#2E6B87;--sec:#468DAC;
  --brd:#E9E9E9;--brdS:#D9D9D9;
  --ok:#6BDAB2;--okBg:#E8F7F1;--wrn:#DADA6B;--wrnBg:#F7F7E0;--err:#DA6B6B;--errBg:#FAEAEA;
  --sel:#EBF6FB;--selB:#99D2E8;--selT:#1D4A5F;
  --sh1:0 1px 4px rgba(0,0,0,.07),0 0 0 1px rgba(0,0,0,.04);
  --sh3:0 12px 40px rgba(0,0,0,.12),0 0 0 1px rgba(0,0,0,.04);
  --ambTx:#8a7a20;--ambBg:rgba(218,218,107,.12);--ambBd:rgba(218,218,107,.35);
  --logoT:#1A1A1A;--logoA:#6BB8DA;--pinFill:#2E6B87;
  --bodyBg:#e0e0e0;
}
.dark{
  --bg:#16151A;--sf:#1E1D24;--sfH:#26242E;--ov:rgba(0,0,0,.72);
  --tp:#F0EEF5;--ts:#9B98A8;--tm:#5C5970;--tl:#7EC8E3;
  --pri:#6BB8DA;--priH:#7EC8E8;--priT:#0D2A38;--acc:#7EC8E3;--sec:#7EC8E3;
  --brd:#2E2C38;--brdS:#3D3A4A;
  --ok:#4DB896;--okBg:#132B22;--wrn:#C4C44A;--wrnBg:#282810;--err:#D45858;--errBg:#2E1212;
  --sel:rgba(107,184,218,.12);--selB:#468DAC;--selT:#7EC8E3;
  --sh1:0 1px 4px rgba(0,0,0,.40),0 0 0 1px rgba(255,255,255,.04);
  --sh3:0 12px 40px rgba(0,0,0,.60),0 0 0 1px rgba(255,255,255,.05);
  --ambTx:#C4C44A;--ambBg:rgba(196,196,74,.12);--ambBd:rgba(196,196,74,.25);
  --logoT:#F0EEF5;--logoA:#7EC8E3;--pinFill:#7EC8E3;
  --bodyBg:#0E0D12;
}
.dim{
  --bg:#1E1D24;--sf:#26242E;--sfH:#2E2C38;--ov:rgba(0,0,0,.60);
  --tp:#E0DEE8;--ts:#8A879A;--tm:#5C5970;--tl:#6BB8DA;
  --pri:#6BB8DA;--priH:#7EC8E8;--priT:#0D2A38;--acc:#6BB8DA;--sec:#468DAC;
  --brd:#3D3A4A;--brdS:#4A475A;
  --ok:#5CC8A4;--okBg:#1A3328;--wrn:#D0D050;--wrnBg:#2A2A14;--err:#D45858;--errBg:#2E1818;
  --sel:rgba(107,184,218,.15);--selB:#468DAC;--selT:#6BB8DA;
  --sh1:0 1px 4px rgba(0,0,0,.30),0 0 0 1px rgba(255,255,255,.03);
  --sh3:0 12px 40px rgba(0,0,0,.50),0 0 0 1px rgba(255,255,255,.04);
  --ambTx:#D0D050;--ambBg:rgba(196,196,74,.10);--ambBd:rgba(196,196,74,.20);
  --logoT:#E0DEE8;--logoA:#6BB8DA;--pinFill:#6BB8DA;
  --bodyBg:#141318;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Plus Jakarta Sans',-apple-system,sans-serif;color:var(--tp);background:var(--bodyBg);-webkit-font-smoothing:antialiased;display:flex;justify-content:center;transition:background .3s,color .3s}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(107,184,218,.25);border-radius:3px}
input::placeholder{color:var(--tm)}
input{color:var(--tp);background:var(--sf)}
#app{width:100%;max-width:480px;height:100vh;background:var(--bg);display:flex;flex-direction:column;position:relative;overflow:hidden;transition:background .3s}
@keyframes sU{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fI{from{opacity:0}to{opacity:1}}
@keyframes sI{from{transform:scale(.93);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes pI{0%{transform:scale(.85);opacity:.5}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes cP{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes pl{0%,100%{box-shadow:0 0 0 0 rgba(107,184,218,.3)}50%{box-shadow:0 0 0 10px rgba(107,184,218,0)}}
@keyframes tI{0%{transform:translateX(-50%) translateY(-20px);opacity:0}100%{transform:translateX(-50%) translateY(0);opacity:1}}
@keyframes sh{0%,100%{transform:translateX(0)}25%,75%{transform:translateX(-6px)}50%{transform:translateX(6px)}}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
"use strict";
var $=document.getElementById("app");

var CAT=[{id:"popular",n:"Popul\u00e6rt",ic:"\uD83D\uDD25"},{id:"burgers",n:"Burgere",ic:"\uD83C\uDF54"},{id:"chicken",n:"Kylling",ic:"\uD83C\uDF57"},{id:"sides",n:"Tilbeh\u00f8r",ic:"\uD83C\uDF5F"},{id:"drinks",n:"Drikke",ic:"\uD83E\uDD64"},{id:"desserts",n:"Dessert",ic:"\uD83C\uDF66"}];
var PRD=[
{id:1,n:"Classic Burger",d:"Angus biff, cheddar",p:139,c:"burgers",ic:"\uD83C\uDF54"},
{id:2,n:"Dobbel Cheese",d:"2x biff, 2x cheddar",p:169,c:"burgers",ic:"\uD83C\uDF54"},
{id:3,n:"BBQ Bacon",d:"Bacon, BBQ-saus",p:179,c:"burgers",ic:"\uD83C\uDF54"},
{id:4,n:"Veggie Burger",d:"Plantebasert, avokado",p:149,c:"burgers",ic:"\uD83E\uDD6C"},
{id:5,n:"Crispy Chicken",d:"Panert kyllingfilet",p:139,c:"chicken",ic:"\uD83C\uDF57"},
{id:6,n:"Spicy Chicken",d:"Chili-marinert",p:149,c:"chicken",ic:"\uD83C\uDF36\uFE0F"},
{id:7,n:"Chicken Wrap",d:"Grillet kylling",p:129,c:"chicken",ic:"\uD83C\uDF2F"},
{id:8,n:"Pommes Frites",d:"Spr\u00f8stekte",p:49,c:"sides",ic:"\uD83C\uDF5F"},
{id:9,n:"S\u00f8tpotetfries",d:"Crispy s\u00f8tpotet",p:59,c:"sides",ic:"\uD83C\uDF60"},
{id:10,n:"L\u00f8kringer",d:"Panerte, med dip",p:59,c:"sides",ic:"\uD83E\uDDC5"},
{id:11,n:"Cola",d:"0.5L",p:39,c:"drinks",ic:"\uD83E\uDD64"},
{id:12,n:"Fanta",d:"0.5L",p:39,c:"drinks",ic:"\uD83C\uDF4A"},
{id:13,n:"Milkshake",d:"Sjokolade/vanilje",p:69,c:"drinks",ic:"\uD83E\uDD5B"},
{id:14,n:"Sjokoladekake",d:"Varm, vaniljeis",p:79,c:"desserts",ic:"\uD83C\uDF6B"},
{id:15,n:"Softis",d:"Vanilje",p:49,c:"desserts",ic:"\uD83C\uDF66"},
{id:16,n:"Churros",d:"Sjokoladedip",p:59,c:"desserts",ic:"\uD83E\uDD56"}
];
var POP=[1,2,5,8,11,14];
var STF=[{n:"Maria H.",pin:"1234"},{n:"Erik S.",pin:"5678"},{n:"Lina K.",pin:"9012"}];
var DSC=[{l:"10%",t:"p",v:10},{l:"20%",t:"p",v:20},{l:"50%",t:"p",v:50},{l:"Ansatt",t:"p",v:30},{l:"50 kr",t:"f",v:50},{l:"100 kr",t:"f",v:100}];
var ATTRS={size:{l:"St\u00f8rrelse",o:["Liten","Medium","Stor"],pm:{Liten:-20,Medium:0,Stor:30}},extras:{l:"Ekstra",o:["Bacon","Ost","Jalape\u00f1o","Ekstra saus","Avokado","Egg"],pe:15},drink:{l:"Drikke",o:["Cola","Fanta","Sprite","Vann"]}};
var PA={burgers:["size","extras","drink"],chicken:["size","extras","drink"],sides:["size"],drinks:["size"],desserts:["size"]};

var staff=null,pin="",pinErr=false,aCat="popular",cart=[],disc=null,cashW=0,parked=[],drLog=[],sales=[],shift=null;
var theme="light";
function cycleTheme(){
  var h=document.documentElement;
  h.classList.remove("dark","dim");
  if(theme==="light"){theme="dark";h.classList.add("dark")}
  else if(theme==="dark"){theme="dim";h.classList.add("dim")}
  else{theme="light"}
}
function themeIcon(){return theme==="light"?"\u2600\uFE0F":theme==="dark"?"\uD83C\uDF19":"\uD83C\uDF17"}

function uid(){return Date.now()+Math.random()}
function now(){return new Date().toLocaleTimeString("no-NO",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}
function tdy(){return new Date().toLocaleDateString("no-NO",{day:"2-digit",month:"2-digit",year:"numeric"})}
function defAt(c){var a={};(PA[c]||[]).forEach(function(k){a[k]=k==="extras"?{}:k==="size"?"Medium":null});return a}
function pmod(at){var m=0;if(at.size&&ATTRS.size.pm[at.size])m+=ATTRS.size.pm[at.size];if(at.extras)for(var k in at.extras)m+=at.extras[k]*15;return m}
function uprc(it){return it.p+pmod(it.at||{})}
function lprc(it){return uprc(it)*it.qty}
function csub(){var s=0;cart.forEach(function(i){var lp=lprc(i);if(i.lineDisc){lp=i.lineDisc.t==="p"?lp-Math.round(lp*i.lineDisc.v/100):Math.max(0,lp-i.lineDisc.v)}s+=lp});return s}
function damt(){if(!disc)return 0;return disc.t==="p"?Math.round(csub()*disc.v/100):Math.min(disc.v,csub())}
function ctot(){return csub()-damt()}
function ccnt(){var s=0;cart.forEach(function(i){s+=i.qty});return s}
function fmtAt(at,c){var p=[];(PA[c]||[]).forEach(function(k){if(k==="size"&&at.size)p.push(at.size);if(k==="extras"&&at.extras){var x=[];for(var n in at.extras)if(at.extras[n]>0)x.push(at.extras[n]>1?at.extras[n]+"x "+n:n);if(x.length)p.push(x.join(", "))}if(k==="drink"&&at.drink)p.push(at.drink)});return p.join(" \u00b7 ")}
function logo(s){return '<span style="font-family:Sora,sans-serif;font-size:'+s+'px;font-weight:700;color:var(--logoT);letter-spacing:-.01em">Pl<span style="color:var(--logoA)">or</span>ea</span>'}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function drBal(){var s=0;drLog.forEach(function(e){s+=e.a==="in"?e.v:-e.v});return s}

function el(tag,st,inner){var e=document.createElement(tag);if(st)Object.assign(e.style,st);if(inner!==undefined)e.innerHTML=inner;return e}
function toast(m){var t=el("div",{position:"absolute",top:"56px",left:"50%",transform:"translateX(-50%)",background:"var(--tp)",color:"var(--sf)",padding:"10px 20px",borderRadius:"10px",fontSize:"14px",fontWeight:"600",zIndex:"300",animation:"tI .3s",whiteSpace:"nowrap"},m);$.appendChild(t);setTimeout(function(){t.remove()},2800)}

function bdrop(content,center){
  var b=el("div",{position:"absolute",inset:"0",background:"var(--ov)",backdropFilter:"blur(6px)",display:"flex",alignItems:center?"center":"flex-end",justifyContent:"center",zIndex:"200",animation:"fI .16s"});
  b.appendChild(content);
  b.addEventListener("click",function(e){if(e.target===b)b.remove()});
  $.appendChild(b);return b;
}
function mkSheet(){var s=el("div",{background:"var(--sf)",borderRadius:"20px 20px 0 0",width:"100%",maxHeight:"90vh",display:"flex",flexDirection:"column",overflow:"hidden",animation:"sU .28s cubic-bezier(.16,1,.3,1)",boxShadow:"var(--sh3)"});s.addEventListener("click",function(e){e.stopPropagation()});return s}
function mkModal(){var m=el("div",{background:"var(--sf)",borderRadius:"20px",padding:"24px 22px",width:"calc(100% - 40px)",maxWidth:"380px",margin:"auto",animation:"sI .25s cubic-bezier(.16,1,.3,1)",boxShadow:"var(--sh3)"});m.addEventListener("click",function(e){e.stopPropagation()});return m}

function mkBtn(label,style,onClick){var b=document.createElement("button");b.textContent=label;Object.assign(b.style,{borderRadius:"14px",cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:"700",border:"none"},style);b.addEventListener("click",onClick);return b}
function mkPayHead(title){return '<div style="padding:16px 18px 10px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between"><div style="width:36px"></div><div style="font-family:Sora,sans-serif;font-size:17px;font-weight:700;color:var(--tp);flex:1;text-align:center">'+title+'</div><div style="width:36px"></div></div>'}

/* ═══ PIN ═══ */
function rPin(){
  $.innerHTML="";
  var w=el("div",{position:"absolute",inset:"0",background:"var(--sf)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:"300",padding:"20px"});
  w.innerHTML=logo(28)+'<div style="font-family:Sora;font-size:12px;color:var(--ts);margin-top:10px;margin-bottom:32px;text-transform:uppercase;letter-spacing:.08em;font-weight:600">POS Terminal</div>';
  var dots=el("div",{display:"flex",gap:"12px",marginBottom:"10px"});
  for(var i=0;i<4;i++){var d=el("div",{width:"20px",height:"20px",borderRadius:"50%",border:"2.5px solid var(--brd)",transition:"all .16s"});if(pin.length>i){d.style.background="var(--pinFill)";d.style.borderColor="var(--pinFill)"}if(pinErr){d.style.borderColor="var(--err)";d.style.animation="sh .4s";if(pin.length>i)d.style.background="var(--err)"}dots.appendChild(d)}
  w.appendChild(dots);
  var msg=el("div",{fontSize:"13px",color:pinErr?"var(--err)":"var(--ts)",height:"22px",marginBottom:"16px",fontWeight:"500"},pinErr?"Feil PIN-kode":"Tast inn 4-sifret PIN");
  w.appendChild(msg);
  var pad=el("div",{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"10px",width:"250px"});
  [1,2,3,4,5,6,7,8,9,"C",0,"B"].forEach(function(v){
    var b=el("button",{height:"56px",borderRadius:"14px",border:"1px solid var(--brd)",background:"var(--sf)",color:v==="C"||v==="B"?"var(--ts)":"var(--tp)",fontSize:v==="C"||v==="B"?"13px":"22px",fontWeight:"600",cursor:"pointer",fontFamily:v==="C"||v==="B"?"inherit":"Sora,sans-serif",display:"flex",alignItems:"center",justifyContent:"center"},v==="C"?"Slett":v==="B"?"\u232B":String(v));
    b.addEventListener("click",function(){
      if(String(v)==="C"){pin="";pinErr=false;rPin();return}
      if(String(v)==="B"){pin=pin.slice(0,-1);pinErr=false;rPin();return}
      pin+=v;
      if(pin.length===4){var f=STF.find(function(s){return s.pin===pin});if(f){staff=f;pin="";pinErr=false;if(!shift)shift=now();rMain()}else{pinErr=true;rPin();setTimeout(function(){pin="";pinErr=false;rPin()},800)}}else rPin()
    });
    pad.appendChild(b)
  });
  w.appendChild(pad);
  w.appendChild(el("div",{fontSize:"11px",color:"var(--ts)",marginTop:"20px",opacity:".6"},"Demo: 1234 (Manager) \u00b7 5678 \u00b7 9012"));
  var tb=el("button",{marginTop:"16px",width:"40px",height:"40px",borderRadius:"10px",border:"1px solid var(--brd)",background:"var(--sf)",cursor:"pointer",fontSize:"18px",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .16s"},themeIcon());
  tb.addEventListener("click",function(){cycleTheme();rPin()});
  w.appendChild(tb);
  $.appendChild(w)
}

/* ═══ MAIN ═══ */
function rMain(){
  $.innerHTML="";
  var prods=aCat==="popular"?PRD.filter(function(p){return POP.indexOf(p.id)>=0}):PRD.filter(function(p){return p.c===aCat});
  // Header
  var hdr=el("div",{padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:"0",background:"var(--sf)",borderBottom:"1px solid var(--brd)",boxShadow:"var(--sh1)",zIndex:"10"});
  hdr.innerHTML='<div style="display:flex;align-items:center;gap:10px">'+logo(17)+'<span style="font-size:10px;font-weight:700;color:var(--acc);background:var(--sel);padding:3px 10px;border-radius:20px;letter-spacing:.08em;border:1px solid rgba(107,184,218,.25)">POS</span></div>';
  var hr=el("div",{display:"flex",alignItems:"center",gap:"6px"});
  if(parked.length){var pk=el("button",{fontSize:"11px",fontWeight:"700",color:"var(--ambTx)",background:"rgba(218,218,107,.12)",border:"1px solid rgba(218,218,107,.35)",padding:"4px 10px",borderRadius:"20px",cursor:"pointer"},"\uD83C\uDD7F\uFE0F "+parked.length);pk.addEventListener("click",showParked);hr.appendChild(pk)}
  var tb=el("button",{width:"34px",height:"34px",borderRadius:"10px",border:"1px solid var(--brd)",background:"var(--sfH)",cursor:"pointer",fontSize:"14px",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .16s"},themeIcon());tb.addEventListener("click",function(){cycleTheme();rMain()});hr.appendChild(tb);
  var db=el("button",{width:"34px",height:"34px",borderRadius:"10px",border:"1px solid var(--brd)",background:"var(--sfH)",cursor:"pointer",fontSize:"14px",display:"flex",alignItems:"center",justifyContent:"center"},"\uD83D\uDCB0");db.addEventListener("click",showDrawer);hr.appendChild(db);
  var zb=el("button",{width:"34px",height:"34px",borderRadius:"10px",border:"1px solid var(--brd)",background:"var(--sfH)",cursor:"pointer",fontSize:"14px",display:"flex",alignItems:"center",justifyContent:"center"},"\uD83D\uDCCA");zb.addEventListener("click",showZ);hr.appendChild(zb);
  var sb=el("button",{fontSize:"11px",fontWeight:"700",color:"var(--acc)",background:"var(--sel)",padding:"5px 12px",borderRadius:"20px",border:"1px solid rgba(107,184,218,.25)",cursor:"pointer"},staff.n+" \u2715");sb.addEventListener("click",function(){staff=null;rPin()});hr.appendChild(sb);
  hdr.appendChild(hr);$.appendChild(hdr);
  // Cats
  var cb=el("div",{flexShrink:"0",padding:"8px 0",background:"var(--sf)",borderBottom:"1px solid var(--brd)"});
  var cs=el("div",{display:"flex",gap:"6px",padding:"0 14px",overflowX:"auto"});
  CAT.forEach(function(c){var a=aCat===c.id;var b=el("button",{display:"flex",alignItems:"center",gap:"5px",padding:"8px 14px",borderRadius:"9999px",border:"1.5px solid "+(a?"var(--pri)":"var(--brd)"),background:a?"var(--sel)":"var(--sf)",color:a?"var(--acc)":"var(--ts)",fontSize:"13px",fontWeight:"600",cursor:"pointer",whiteSpace:"nowrap",flexShrink:"0"},c.ic+" "+c.n);b.addEventListener("click",function(){aCat=c.id;rMain()});cs.appendChild(b)});
  cb.appendChild(cs);$.appendChild(cb);
  // Grid
  var ga=el("div",{flex:"1",overflowY:"auto",padding:"12px",minHeight:"0"});
  var gr=el("div",{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"});
  prods.forEach(function(p){
    var ic=0;cart.forEach(function(x){if(x.id===p.id)ic+=x.qty});
    var cd=el("button",{position:"relative",background:"var(--sf)",border:"1px solid var(--brd)",borderRadius:"14px",cursor:"pointer",textAlign:"left",color:"var(--tp)",overflow:"hidden",display:"flex",flexDirection:"column",boxShadow:"var(--sh1)",fontFamily:"inherit"});
    cd.innerHTML=(ic?'<div style="position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:50%;background:#2E6B87;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;z-index:2">'+ic+"</div>":"")+'<div style="height:80px;display:flex;align-items:center;justify-content:center;background:var(--sfH);font-size:44px">'+p.ic+'</div><div style="padding:10px 12px 12px;display:flex;flex-direction:column;gap:2px;flex:1"><div style="font-size:14px;font-weight:700;line-height:1.2">'+esc(p.n)+'</div><div style="font-size:11px;color:var(--ts)">'+esc(p.d)+'</div><div style="font-size:15px;font-weight:700;color:var(--acc);margin-top:4px">'+p.p+" kr</div></div>";
    cd.addEventListener("click",function(){addProduct(p)});gr.appendChild(cd)
  });
  ga.appendChild(gr);$.appendChild(ga);
  // Bottom
  var cc=ccnt(),ct=ctot(),da=damt();
  if(cc){
    var bb=el("div",{flexShrink:"0",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",background:"var(--sf)",borderTop:"1px solid rgba(107,184,218,.25)",cursor:"pointer",minHeight:"72px",gap:"10px",boxShadow:"0 -2px 8px rgba(0,0,0,.04)"});
    bb.innerHTML='<div style="display:flex;align-items:center;gap:8px"><div style="width:32px;height:32px;border-radius:50%;background:#2E6B87;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700">'+cc+'</div><span style="font-size:13px;font-weight:600;color:#3F3D45">'+cc+' varer</span></div><div style="display:flex;align-items:center;gap:10px">'+(disc?'<span style="font-size:11px;font-weight:700;color:#DA6B6B;background:rgba(218,107,107,.1);padding:2px 8px;border-radius:8px">-'+da+'kr</span>':"")+'<span style="font-size:16px;font-weight:700;color:var(--tp)">'+ct+' kr</span><div style="padding:10px 16px;background:#2E6B87;border-radius:10px;color:#fff;font-size:12px;font-weight:700">Se bestilling \u2192</div></div>';
    bb.addEventListener("click",showCart);$.appendChild(bb)
  }else{$.appendChild(el("div",{flexShrink:"0",padding:"16px",textAlign:"center",fontSize:"13px",color:"var(--ts)",borderTop:"1px solid var(--brd)",background:"var(--sf)",opacity:".5"},"Trykk p\u00e5 et produkt for \u00e5 starte"))}
}

/* ═══ ADD PRODUCT ═══ */
function addProduct(p){
  var keys=PA[p.c]||[];
  if(!keys.length){cart.push({id:p.id,n:p.n,d:p.d,p:p.p,c:p.c,ic:p.ic,qty:1,at:defAt(p.c),ck:uid()});rMain();return}

function splitItems(){var sel={},bd;function r(){if(bd)bd.remove();var tot=0;cart.forEach(function(it){tot+=uprc(it)*(sel[it.ck]||0)});var s=mkSheet();s.innerHTML=mkPayHead("Velg varer & antall");var body=el("div",{flex:"1",overflowY:"auto",padding:"10px 16px"});cart.forEach(function(it){var sq=sel[it.ck]||0,up=uprc(it),at=fmtAt(it.at||{},it.c);var cd=el("div",{padding:"14px",borderRadius:"14px",border:"1.5px solid "+(sq?"var(--pri)":"var(--brd)"),background:sq?"var(--sel)":"var(--sf)",marginBottom:"8px"});cd.innerHTML='<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px"><span style="font-size:22px">'+it.ic+'</span><div style="flex:1"><div style="font-size:14px;font-weight:600">'+esc(it.n)+"</div>"+(at?'<div style="font-size:11px;color:#468DAC">'+esc(at)+"</div>":"")+'</div><div style="text-align:right"><div style="font-size:12px;color:var(--ts)">'+up+' kr/stk</div><div style="font-size:14px;font-weight:700;color:'+(sq?"var(--acc)":"var(--ts)")+'">'+up*sq+" kr</div></div></div>";var row2=el("div",{display:"flex",alignItems:"center",justifyContent:"space-between"});row2.innerHTML='<span style="font-size:12px;color:var(--ts)">Bestilt: '+it.qty+"</span>";var right=el("div",{display:"flex",alignItems:"center",gap:"4px"});right.innerHTML='<span style="font-size:12px;color:var(--ts);margin-right:4px">Betal:</span>';var stp=el("div",{display:"flex",alignItems:"center",background:"var(--sfH)",borderRadius:"10px",overflow:"hidden",border:"1px solid var(--brd)"});var dc=el("button",{width:"36px",height:"36px",border:"none",background:"transparent",color:"var(--ts)",fontSize:"16px",fontWeight:"600",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"},"\u2212");(function(ck){dc.addEventListener("click",function(){sel[ck]=Math.max(0,(sel[ck]||0)-1);r()})})(it.ck);var vl=el("span",{width:"22px",textAlign:"center",fontSize:"14px",fontWeight:"700",color:sq?"var(--acc)":"var(--ts)"},String(sq));var inc=el("button",{width:"36px",height:"36p s:staff.n});bd.remove();showDrawer()}}));body.appendChild(ir);drLog.slice().reverse().forEach(function(e){body.innerHTML+='<div style="display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid var(--brd)"><span style="color:'+(e.a==="in"?"var(--ok)":"var(--err)")+'">'+(e.a==="in"?"+":"\u2212")+e.v+' kr</span><span style="color:var(--ts)">'+e.t+"</span></div>"});s.appendChild(body);var bd=bdrop(s)}
