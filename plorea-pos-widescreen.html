<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Plorea POS Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Sora:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  /* ── Surface & background ── */
  --bg:#F7F8FA;--sf:#FFFFFF;--sfH:#F1F5F9;--ov:rgba(0,0,0,.48);

  /* ── Text ── */
  --tp:#1A1A1A;--ts:#666666;--tm:#C4C4C4;--tl:#2E6B87;

  /* ── Brand ── */
  --pri:#6BB8DA;--priH:#4FA3C8;--acc:#2E6B87;--sec:#468DAC;

  /* ── Borders ── */
  --brd:#E9E9E9;--brdS:#D9D9D9;

  /* ── Semantic ── */
  --ok:#6BDAB2;--okBg:#E8F7F1;
  --warn:#DADA6B;--warnBg:#F7F7E0;
  --err:#DA6B6B;--errBg:#FAEAEA;
  --info:#6BB8DA;--infoBg:#EBF6FB;

  /* ── Selection ── */
  --sel:#EBF6FB;--selB:#99D2E8;--selT:#1D4A5F;

  /* ── Amber text (parked) ── */
  --ambTx:#7a6a14;

  /* ── Elevation ── */
  --e1:0 1px 4px rgba(0,0,0,.07),0 0 0 1px rgba(0,0,0,.04);
  --e2:0 4px 16px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.04);
  --e3:0 12px 40px rgba(0,0,0,.12),0 0 0 1px rgba(0,0,0,.04);
  --eFocus:0 0 0 3px rgba(107,184,218,.30);

  /* ── Radii ── */
  --rs:6px;--r:8px;--rm:10px;--rl:14px;--rx:20px;--rfull:9999px;

  /* ── Header dark surface ── */
  --hdr-bg:#1A1825;
  --hdr-border:rgba(255,255,255,.07);
  --hdr-text:rgba(255,255,255,.88);
  --hdr-muted:rgba(255,255,255,.40);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Plus Jakarta Sans',-apple-system,sans-serif;color:var(--tp);background:#D8DBE3;-webkit-font-smoothing:antialiased;letter-spacing:-.01em}
/* ══════════════════════════════════════════
   DARK THEME
══════════════════════════════════════════ */
html.dark {
  --bg:#16151A; --sf:#1E1D24; --sfH:#26242E; --ov:rgba(0,0,0,.65);
  --tp:#F0EEF5; --ts:#9B98A8; --tm:#5C5970;
  --pri:#6BB8DA; --priH:#4FA3C8; --acc:#6BB8DA; --sec:#468DAC;
  --brd:#2E2C38; --brdS:#3D3A4A;
  --ok:#6BDAB2; --okBg:#132B22;
  --warn:#DADA6B; --warnBg:#282810;
  --err:#DA6B6B; --errBg:#2E1212;
  --sel:#0D2030; --selB:#2E6B87; --selT:#7EC8E3;
  --ambTx:#c9b832;
  --hdr-bg:#0E0D13; --hdr-border:rgba(255,255,255,.06);
  --e1:0 1px 4px rgba(0,0,0,.30),0 0 0 1px rgba(255,255,255,.03);
  --e2:0 4px 16px rgba(0,0,0,.40),0 0 0 1px rgba(255,255,255,.03);
  --e3:0 12px 40px rgba(0,0,0,.60),0 0 0 1px rgba(255,255,255,.03);
}

/* ══════════════════════════════════════════
   DARK DIM THEME
══════════════════════════════════════════ */
html.dark-dim {
  --bg:#1C1C21; --sf:#242428; --sfH:#2C2C32; --ov:rgba(0,0,0,.60);
  --tp:#E8E6F0; --ts:#9490A8; --tm:#56525E;
  --pri:#8BA0C4; --priH:#9FB4D8; --acc:#8BA0C4; --sec:#6E88A8;
  --brd:#303038; --brdS:#3E3E48;
  --ok:#5AAA8A; --okBg:#141E1A;
  --warn:#B0A84A; --warnBg:#201E08;
  --err:#C05050; --errBg:#220E0E;
  --sel:#141C28; --selB:#2A3A5A; --selT:#8BA0C4;
  --ambTx:#b0a040;
  --hdr-bg:#17171B; --hdr-border:rgba(255,255,255,.05);
  --e1:0 1px 4px rgba(0,0,0,.50); --e2:0 4px 16px rgba(0,0,0,.60);
  --e3:0 12px 40px rgba(0,0,0,.70);

/* ══════════════════════════════════════════
   DARK NEON THEME
══════════════════════════════════════════ */
html.dark-neon {
  --bg:#0E0E12; --sf:#14141A; --sfH:#1C1C24; --ov:rgba(0,0,0,.75);
  --tp:#F0EEFF; --ts:#A09AB8; --tm:#504A65;
  --pri:#9B6AFF; --priH:#B080FF; --acc:#B080FF; --sec:#7B50D4;
  --brd:#201E2C; --brdS:#302C44;
  --ok:#3ADBA8; --okBg:#081A14;
  --warn:#F0C040; --warnBg:#1A1400;
  --err:#FF5070; --errBg:#1E0008;
  --sel:#180C28; --selB:#4A2A8A; --selT:#B080FF;
  --ambTx:#d4b020;
  --hdr-bg:#0A0A10; --hdr-border:rgba(155,106,255,.12);
  --e1:0 1px 4px rgba(0,0,0,.60),0 0 0 1px rgba(155,106,255,.06);
  --e2:0 4px 16px rgba(0,0,0,.70),0 0 0 1px rgba(155,106,255,.06);
  --e3:0 12px 40px rgba(0,0,0,.85),0 0 0 1px rgba(155,106,255,.06);
  --eFocus:0 0 0 3px rgba(155,106,255,.40);
}
/* Neon glow effects */
html.dark-neon #app { box-shadow: 0 0 0 1px #201E2C, 0 0 80px rgba(155,106,255,.08); }

/* ── Theme picker ── */
#themePicker {
  display:flex; gap:3px; align-items:center;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.10);
  border-radius:var(--rfull);
  padding:3px 4px;
}
.tp-btn {
  width:24px; height:24px; border-radius:50%; border:1.5px solid transparent;
  background:transparent; cursor:pointer; font-size:11px;
  display:flex; align-items:center; justify-content:center;
  transition:all 120ms; flex-shrink:0;
}
.tp-btn:hover { background:rgba(255,255,255,.10); }
.tp-btn.tp-active { border-color:var(--pri); background:rgba(107,184,218,.15); }
::-webkit-scrollbar-thumb{background:rgba(107,184,218,.20);border-radius:99px}
::-webkit-scrollbar-track{background:transparent}
input::placeholder{color:var(--tm)}
input:focus{outline:none;border-color:var(--selB)!important;box-shadow:var(--eFocus)}

#app{
  width:100%;height:100vh;
  background:var(--bg);
  display:flex;flex-direction:column;
  position:relative;overflow:hidden;
  max-width:480px;margin:0 auto;
  border-radius:var(--rx);
  box-shadow:var(--e3);
}

/* ── Widescreen: side-by-side ── */
@media(min-width:768px){
  #app{max-width:100%;flex-direction:row;border-radius:0;box-shadow:none}
  #app>.main-col{flex:1;display:flex;flex-direction:column;min-width:0;border-right:1px solid var(--brd)}
  #app>.cart-col{width:380px;display:flex;flex-direction:column;background:var(--sf);flex-shrink:0}
}
@media(min-width:976px){
  #app>.cart-col{width:420px}
}
@media(min-width:1440px){
  #app>.cart-col{width:460px}
  #app>.main-col .grid-inner{grid-template-columns:repeat(4,1fr)!important}
}

@keyframes sU{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fI{from{opacity:0}to{opacity:1}}
@keyframes sI{from{transform:scale(.93);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes pI{0%{transform:scale(.85);opacity:.5}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes cP{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes pl{0%,100%{box-shadow:0 0 0 0 rgba(107,184,218,.3)}50%{box-shadow:0 0 0 10px rgba(107,184,218,0)}}
@keyframes tI{0%{transform:translateX(-50%) translateY(-20px);opacity:0}100%{transform:translateX(-50%) translateY(0);opacity:1}}
@keyframes sh{0%,100%{transform:translateX(0)}25%,75%{transform:translateX(-6px)}50%{transform:translateX(6px)}}
</style>
</head>
<body>

];

function pmod(at){var m=0;if(at.size&&ATTRS.size.pm[at.size])m+=ATTRS.size.pm[at.size];if(at.extras)for(var k in at.extras)m+=at.extras[k]*15;return m}
function uprc(it){return it.p+pmod(it.at||{})}
function lprc(it){return uprc(it)*it.qty}

  var wide=W();
  var cartCol=wide?document.querySelector(".cart-col"):null;
  var b=el("div",{position:wide?"absolute":"fixed",inset:"0",background:wide?"rgba(0,0,0,.25)":"var(--ov)",backdropFilter:wide?"blur(3px)":"blur(6px)",display:"flex",alignItems:center?"center":"flex-end",justifyContent:"center",zIndex:"500",animation:"fI .16s"});
  if(wide){

/* ═══ PIN ═══ */
function rPin(){
  $.innerHTML="";$.className="";

/* ═══ MAIN ═══ */
function rMain(){
  $.innerHTML="";
  var wide=W();
  var prods=aCat==="popular"?PRD.filter(function(p){return POP.indexOf(p.id)>=0}):PRD.filter(function(p){return p.c===aCat});

  if(wide){
    // ── WIDESCREEN: two columns ──

    if(window.innerWidth>=976)cartCol.style.width="420px";

/* ═══ THEME ═══ */
var THEMES=['light','dark','dark-dim','dark-neon'];
function setTheme(t){
  var html=document.documentElement;
  THEMES.forEach(function(x){html.classList.remove(x)});
  if(t!=='light')html.classList.add(t);
  try{localStorage.setItem('plorea-pos-theme',t)}catch(e){}
  // Update all pickers
  document.querySelectorAll('.tp-btn,[data-theme]').forEach(function(b){
    b.classList.toggle('tp-active',b.getAttribute('data-theme')===t||(t==='light'&&b.getAttribute('data-theme')==='light'));
  });
  if(staff)rMain();
}
// Restore saved theme
(function(){try{var s=localStorage.getItem('plorea-pos-theme');if(s&&s!=='light')setTheme(s)}catch(e){}})();
