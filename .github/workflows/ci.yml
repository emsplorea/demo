name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 'plorea-pkg/@plorea/components'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: 'plorea-pkg/@plorea/components/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  build-lib:
    name: Build library
    runs-on: ubuntu-latest
    needs: typecheck
    defaults:
      run:
        working-directory: 'plorea-pkg/@plorea/components'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: 'plorea-pkg/@plorea/components/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify dist output
        run: |
          test -f dist/index.esm.js || (echo "dist/index.esm.js missing" && exit 1)
          test -f dist/index.js     || (echo "dist/index.js missing"     && exit 1)
          test -f dist/index.d.ts   || (echo "dist/index.d.ts missing"   && exit 1)
          echo "✓ All dist files present"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: 'plorea-pkg/@plorea/components/dist'
          retention-days: 7

  build-storybook:
    name: Build Storybook
    runs-on: ubuntu-latest
    needs: typecheck
    defaults:
      run:
        working-directory: 'plorea-pkg/@plorea/components'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: 'plorea-pkg/@plorea/components/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build Storybook
        run: npm run build-storybook

      - name: Upload Storybook artifact
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: 'plorea-pkg/@plorea/components/storybook-static'
          retention-days: 7
