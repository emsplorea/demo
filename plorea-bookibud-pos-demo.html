<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plorea POS — Bookibud Integrasjon Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --p-blue: #6BB8DA;
    --p-blue-light: #8ECBE6;
    --p-blue-dark: #4A9EC4;
    --p-blue-glow: rgba(107, 184, 218, 0.15);
    --p-blue-glow-strong: rgba(107, 184, 218, 0.3);

    /* Dark Dim theme */
    --bg-primary: #1A1D23;
    --bg-secondary: #22262E;
    --bg-tertiary: #2A2F38;
    --bg-elevated: #313742;
    --bg-hover: #383E4A;
    --border-primary: #3A3F4A;
    --border-subtle: #2E333D;
    --text-primary: #F0F2F5;
    --text-secondary: #A0A8B8;
    --text-tertiary: #6B7280;
    --text-inverse: #1A1D23;

    --success: #34D399;
    --success-bg: rgba(52, 211, 153, 0.12);
    --warning: #FBBF24;
    --warning-bg: rgba(251, 191, 36, 0.12);
    --danger: #F87171;
    --danger-bg: rgba(248, 113, 113, 0.12);
    --orange: #FB923C;
    --orange-bg: rgba(251, 146, 60, 0.12);
    --purple: #A78BFA;
    --purple-bg: rgba(167, 139, 250, 0.12);

    /* Bookibud brand */
    --bb-coral: #FF6B6B;
    --bb-coral-bg: rgba(255, 107, 107, 0.1);
    --bb-coral-border: rgba(255, 107, 107, 0.25);

    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --radius-xl: 18px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.35);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.45);
    --shadow-glow: 0 0 20px rgba(107,184,218,0.15);

    --font-display: 'Sora', sans-serif;
    --font-body: 'Plus Jakarta Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-body);
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ─── TOP BAR ─── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 56px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border-primary);
    flex-shrink: 0;
  }
  .topbar-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 18px;
    color: var(--p-blue);
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--text-tertiary); font-weight: 400; font-size: 13px; margin-left: 8px; }
  .topbar-center {
    display: flex;
    gap: 4px;
    background: var(--bg-tertiary);
    border-radius: var(--radius-md);
    padding: 3px;
  }
  .tab-btn {
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    padding: 7px 16px;
    border: none;
    border-radius: 7px;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn.active {
    background: var(--p-blue);
    color: var(--text-inverse);
    box-shadow: var(--shadow-sm);
  }
  .tab-btn:not(.active):hover { color: var(--text-primary); background: var(--bg-hover); }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .bb-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: var(--radius-sm);
    background: var(--bb-coral-bg);
    border: 1px solid var(--bb-coral-border);
    font-size: 12px;
    font-weight: 600;
    color: var(--bb-coral);
  }
  .bb-badge .dot {
    width: 7px; height: 7px;
    background: var(--bb-coral);
    border-radius: 50%;
    animation: pulse-dot 2s infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .clock {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    font-variant-numeric: tabular-nums;
  }

  /* ─── MAIN LAYOUT ─── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ─── LEFT PANEL: FLOOR MAP ─── */
  .floor-panel {
    flex: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow-y: auto;
  }
  .floor-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .floor-header h2 {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 600;
  }
  .floor-stats {
    display: flex;
    gap: 16px;
  }
  .stat {
    font-size: 12px;
    color: var(--text-secondary);
  }
  .stat b { color: var(--text-primary); font-weight: 600; }

  /* Table grid */
  .floor-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    flex: 1;
  }
  .table-card {
    background: var(--bg-secondary);
    border: 1.5px solid var(--border-primary);
    border-radius: var(--radius-lg);
    padding: 16px;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }
  .table-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    transition: background 0.3s;
  }
  .table-card:hover {
    border-color: var(--p-blue);
    transform: translateY(-2px);
    box-shadow: var(--shadow-glow);
  }
  .table-card.selected {
    border-color: var(--p-blue);
    background: var(--bg-tertiary);
    box-shadow: var(--shadow-glow), 0 0 0 1px var(--p-blue);
  }

  /* Table states */
  .table-card[data-status="available"]::before { background: var(--success); }
  .table-card[data-status="occupied"]::before { background: var(--p-blue); }
  .table-card[data-status="reserved"]::before { background: var(--warning); }
  .table-card[data-status="finishing"]::before { background: var(--orange); }

  .table-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .table-number {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 700;
    line-height: 1;
  }
  .table-seats {
    font-size: 11px;
    color: var(--text-tertiary);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .status-pill {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 3px 8px;
    border-radius: 20px;
  }
  .status-pill.available { background: var(--success-bg); color: var(--success); }
  .status-pill.occupied { background: var(--p-blue-glow); color: var(--p-blue); }
  .status-pill.reserved { background: var(--warning-bg); color: var(--warning); }
  .status-pill.finishing { background: var(--orange-bg); color: var(--orange); }

  .table-info {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.5;
  }
  .table-info .guest-name {
    color: var(--text-primary);
    font-weight: 600;
  }

  /* Bookibud tag on reserved tables */
  .bb-source {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-weight: 600;
    color: var(--bb-coral);
    background: var(--bb-coral-bg);
    padding: 2px 7px;
    border-radius: 4px;
    margin-top: 2px;
  }
  .bb-source svg { width: 10px; height: 10px; }

  .table-timer {
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    color: var(--text-tertiary);
  }
  .table-amount {
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 600;
    color: var(--success);
  }

  /* ─── RIGHT PANEL ─── */
  .detail-panel {
    width: 400px;
    background: var(--bg-secondary);
    border-left: 1px solid var(--border-primary);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: all 0.3s;
  }
  .detail-header {
    padding: 20px;
    border-bottom: 1px solid var(--border-primary);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .detail-header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .detail-title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
  }
  .detail-actions {
    display: flex;
    gap: 8px;
  }

  .detail-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Section card */
  .section {
    background: var(--bg-tertiary);
    border-radius: var(--radius-md);
    overflow: hidden;
  }
  .section-header {
    padding: 12px 16px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-tertiary);
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-header .icon { font-size: 14px; }
  .section-body { padding: 14px 16px; }

  /* Booking info rows */
  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
  }
  .info-row:not(:last-child) { border-bottom: 1px solid var(--border-subtle); }
  .info-label {
    font-size: 12px;
    color: var(--text-tertiary);
  }
  .info-value {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
  }

  /* Guest notes */
  .guest-note {
    background: var(--warning-bg);
    border: 1px solid rgba(251, 191, 36, 0.2);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 12px;
    color: var(--warning);
    line-height: 1.5;
    display: flex;
    gap: 8px;
  }
  .guest-note .note-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }

  .allergy-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--danger-bg);
    border: 1px solid rgba(248,113,113,0.2);
    color: var(--danger);
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
  }

  /* Order items */
  .order-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
  }
  .order-item:not(:last-child) { border-bottom: 1px solid var(--border-subtle); }
  .order-item-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .order-qty {
    width: 24px;
    height: 24px;
    border-radius: var(--radius-sm);
    background: var(--bg-elevated);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--p-blue);
  }
  .order-name { font-size: 13px; font-weight: 500; }
  .order-price { font-size: 13px; font-weight: 600; color: var(--text-secondary); }
  .order-source-qr {
    font-size: 9px;
    font-weight: 600;
    color: var(--purple);
    background: var(--purple-bg);
    padding: 2px 5px;
    border-radius: 3px;
    margin-left: 6px;
  }

  .order-total {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 10px;
    margin-top: 4px;
    border-top: 2px solid var(--border-primary);
  }
  .order-total-label { font-size: 13px; font-weight: 600; color: var(--text-secondary); }
  .order-total-value {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 700;
    color: var(--success);
  }

  /* Buttons */
  .btn {
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    padding: 10px 18px;
    border: none;
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary {
    background: var(--p-blue);
    color: var(--text-inverse);
  }
  .btn-primary:hover { background: var(--p-blue-dark); box-shadow: var(--shadow-glow); }
  .btn-secondary {
    background: var(--bg-elevated);
    color: var(--text-primary);
    border: 1px solid var(--border-primary);
  }
  .btn-secondary:hover { background: var(--bg-hover); }
  .btn-success {
    background: var(--success);
    color: var(--text-inverse);
  }
  .btn-success:hover { filter: brightness(1.1); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-full { width: 100%; justify-content: center; }
  .btn-bb {
    background: var(--bb-coral);
    color: white;
  }
  .btn-bb:hover { filter: brightness(1.1); }

  /* Detail footer */
  .detail-footer {
    padding: 16px 20px;
    border-top: 1px solid var(--border-primary);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* ─── TOAST / NOTIFICATION ─── */
  .toast-container {
    position: fixed;
    top: 68px;
    right: 24px;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .toast {
    background: var(--bg-elevated);
    border: 1px solid var(--border-primary);
    border-radius: var(--radius-md);
    padding: 14px 18px;
    box-shadow: var(--shadow-lg);
    display: flex;
    align-items: flex-start;
    gap: 12px;
    min-width: 340px;
    animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    cursor: pointer;
    transition: all 0.2s;
  }
  .toast:hover { border-color: var(--p-blue); }
  .toast.bb-toast { border-left: 3px solid var(--bb-coral); }
  @keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  @keyframes slideOut {
    from { transform: translateX(0); opacity: 1; }
    to { transform: translateX(100%); opacity: 0; }
  }
  .toast-icon {
    width: 32px; height: 32px;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .toast-icon.bb { background: var(--bb-coral-bg); }
  .toast-content { flex: 1; }
  .toast-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 2px;
  }
  .toast-desc {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.4;
  }
  .toast-time {
    font-size: 10px;
    color: var(--text-tertiary);
    flex-shrink: 0;
    margin-top: 2px;
  }

  /* ─── INCOMING BOOKING MODAL ─── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    z-index: 2000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal-overlay.visible { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--bg-secondary);
    border: 1px solid var(--border-primary);
    border-radius: var(--radius-xl);
    width: 480px;
    box-shadow: var(--shadow-lg);
    transform: scale(0.95);
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    overflow: hidden;
  }
  .modal-overlay.visible .modal { transform: scale(1); }

  .modal-banner {
    background: linear-gradient(135deg, var(--bb-coral) 0%, #ff8e8e 100%);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .modal-banner-icon {
    width: 44px; height: 44px;
    background: rgba(255,255,255,0.2);
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
  }
  .modal-banner-text h3 {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 700;
    color: white;
  }
  .modal-banner-text p {
    font-size: 12px;
    color: rgba(255,255,255,0.8);
    margin-top: 2px;
  }
  .modal-body {
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .modal-guest-row {
    display: flex;
    gap: 12px;
  }
  .modal-guest-card {
    flex: 1;
    background: var(--bg-tertiary);
    border-radius: var(--radius-md);
    padding: 14px;
    text-align: center;
  }
  .modal-guest-card .val {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .modal-guest-card .lbl {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-top: 2px;
  }
  .modal-notes {
    background: var(--bg-tertiary);
    border-radius: var(--radius-md);
    padding: 14px;
  }
  .modal-notes h4 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-tertiary);
    margin-bottom: 8px;
  }
  .modal-notes p {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.5;
  }
  .modal-table-suggest {
    background: var(--p-blue-glow);
    border: 1px solid rgba(107,184,218,0.2);
    border-radius: var(--radius-md);
    padding: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .modal-table-suggest .icon {
    font-size: 20px;
  }
  .modal-table-suggest .text {
    font-size: 13px;
    color: var(--p-blue-light);
  }
  .modal-table-suggest .text b { color: var(--p-blue); }

  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border-primary);
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  /* Timeline */
  .timeline {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .timeline-item {
    display: flex;
    gap: 12px;
    padding: 8px 0;
    position: relative;
  }
  .timeline-item::before {
    content: '';
    position: absolute;
    left: 11px;
    top: 28px;
    bottom: -8px;
    width: 1.5px;
    background: var(--border-primary);
  }
  .timeline-item:last-child::before { display: none; }
  .timeline-dot {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    flex-shrink: 0;
  }
  .timeline-dot.bb { background: var(--bb-coral-bg); color: var(--bb-coral); }
  .timeline-dot.plorea { background: var(--p-blue-glow); color: var(--p-blue); }
  .timeline-dot.qr { background: var(--purple-bg); color: var(--purple); }
  .timeline-content {
    flex: 1;
  }
  .timeline-content .t-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-primary);
  }
  .timeline-content .t-desc {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-top: 1px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg-elevated); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--bg-hover); }

  /* Legend */
  .legend {
    display: flex;
    gap: 16px;
    padding: 12px 0;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-tertiary);
  }
  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 2px;
  }

  /* Scenario bar */
  .scenario-bar {
    background: var(--bg-tertiary);
    border-top: 1px solid var(--border-primary);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .scenario-bar p {
    font-size: 12px;
    color: var(--text-tertiary);
  }
  .scenario-bar p b { color: var(--text-secondary); }
  .scenario-btns {
    display: flex;
    gap: 8px;
  }

  /* QR preorder highlight */
  .preorder-banner {
    background: var(--purple-bg);
    border: 1px solid rgba(167,139,250,0.2);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--purple);

  .preorder-banner .icon { font-size: 16px; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo">Plorea<span>POS Terminal</span></div>
  </div>
  <div class="topbar-center">
    <button class="tab-btn active" onclick="setTab(this)">Bordoversikt</button>
    <button class="tab-btn" onclick="setTab(this)">Bestillinger</button>
    <button class="tab-btn" onclick="setTab(this)">Meny</button>
    <button class="tab-btn" onclick="setTab(this)">Rapporter</button>
  </div>
  <div class="topbar-right">
    <div class="bb-badge"><div class="dot"></div>Bookibud Koblet</div>
    <div class="clock" id="clock">19:42</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <!-- FLOOR PLAN -->
  <div class="floor-panel">
    <div class="floor-header">
      <h2>🍽️ Sal 1 — Hovedrestaurant</h2>
      <div class="floor-stats">
        <span class="stat"><b id="stat-occupied">5</b> / 12 bord aktive</span>
        <span class="stat"><b>32</b> gjester</span>
        <span class="stat"><b id="stat-reserved">3</b> reservert i kveld</span>
      </div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--success)"></div>Ledig</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--p-blue)"></div>Aktiv</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--warning)"></div>Reservert</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--orange)"></div>Nær ferdig</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--bb-coral)"></div>Bookibud</div>
    </div>
    <div class="floor-grid" id="floorGrid"></div>
  </div>

  <!-- DETAIL PANEL -->
  <div class="detail-panel" id="detailPanel">
    <div id="detailContent"></div>
  </div>
</div>

<!-- SCENARIO BAR -->
<div class="scenario-bar">
  <p><b>Demo-scenario:</b> Trykk knappene for å simulere ulike Bookibud-integrasjonshendelser i sanntid</p>
  <div class="scenario-btns">
    <button class="btn btn-bb btn-sm" onclick="triggerNewBooking()">📲 Ny Bookibud-reservasjon</button>
    <button class="btn btn-secondary btn-sm" onclick="triggerQROrder()">📱 QR-bestilling fra gjest</button>
    <button class="btn btn-secondary btn-sm" onclick="triggerEventCheckin()">🎫 Event-innsjekk</button>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toastContainer"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>
</div>

<script>
// ─── DATA ───
const tables = [
  { id: 1, seats: 2, status: 'occupied', guest: 'Maria L.', amount: 890, timer: '0:47', source: 'walk-in' },
  { id: 2, seats: 4, status: 'reserved', guest: 'Henrik Bakken', time: '20:00', pax: 4, source: 'bookibud', notes: 'Bursdagsfeiring. Ønsker vindu-bord.', allergies: ['Nøtter'], deposit: 500, bookingId: 'BB-4821' },
  { id: 3, seats: 6, status: 'occupied', guest: 'Bedrift (NTH)', amount: 3420, timer: '1:22', source: 'phone', pax: 6 },
  { id: 4, seats: 2, status: 'available' },
  { id: 5, seats: 4, status: 'occupied', guest: 'Sara & Knut', amount: 1560, timer: '0:35', source: 'bookibud', bookingId: 'BB-4819', preorder: true },
  { id: 6, seats: 2, status: 'finishing', guest: 'Anders M.', amount: 720, timer: '1:58', source: 'walk-in' },
  { id: 7, seats: 4, status: 'reserved', guest: 'Kristin Dahl', time: '20:30', pax: 3, source: 'bookibud', notes: 'Første date — diskret bord pls 😊', bookingId: 'BB-4823' },
  { id: 8, seats: 8, status: 'reserved', guest: 'Trondheim JK', time: '20:00', pax: 8, source: 'bookibud', notes: 'Lagslunsj etter kamp. Forhåndsbestilt 3-retters.', bookingId: 'BB-4825', eventLinked: true },
  { id: 9, seats: 2, status: 'available' },
  { id: 10, seats: 4, status: 'occupied', guest: 'Tone & Emil', amount: 1240, timer: '0:52', source: 'walk-in' },
  { id: 11, seats: 2, status: 'available' },
  { id: 12, seats: 6, status: 'occupied', guest: 'Johansen fam.', amount: 2180, timer: '1:05', source: 'phone', pax: 5 },
];

let selectedTable = 2;

// ─── RENDER ───
function renderFloor() {
  const grid = document.getElementById('floorGrid');
  grid.innerHTML = tables.map(t => `
    <div class="table-card ${t.id === selectedTable ? 'selected' : ''}" 
         data-status="${t.status}" 
         onclick="selectTable(${t.id})">
      <div class="table-top">
        <span class="table-number">${t.id}</span>
        <span class="table-seats">
          ${'👤'.repeat(Math.min(t.seats, 4))}${t.seats > 4 ? '+' + (t.seats-4) : ''}
          <span style="margin-left:2px">${t.seats} pl.</span>
        </span>
      </div>
      <span class="status-pill ${t.status}">
        ${t.status === 'available' ? 'Ledig' : t.status === 'occupied' ? 'Aktiv' : t.status === 'reserved' ? 'Reservert' : 'Nær ferdig'}
      </span>
      ${t.guest ? `
        <div class="table-info">
          <span class="guest-name">${t.guest}</span>
          ${t.source === 'bookibud' ? `<div class="bb-source"><svg viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="7"/></svg> Bookibud</div>` : ''}
          ${t.time ? `<div>🕒 ${t.time} · ${t.pax} gjester</div>` : ''}
          ${t.timer ? `<div class="table-timer">⏱ ${t.timer}</div>` : ''}
        </div>
      ` : '<div class="table-info" style="color:var(--success)">Klar for gjester</div>'}
      ${t.amount ? `<div class="table-amount">kr ${t.amount.toLocaleString('nb-NO')},-</div>` : ''}
    </div>
  `).join('');
}

function selectTable(id) {
  selectedTable = id;
  renderFloor();
  renderDetail();
}

function renderDetail() {
  const t = tables.find(x => x.id === selectedTable);
  const panel = document.getElementById('detailContent');
  
  if (t.status === 'reserved' && t.source === 'bookibud') {
    panel.innerHTML = renderBookibudReservation(t);
  } else if (t.status === 'occupied' && t.source === 'bookibud') {
    panel.innerHTML = renderBookibudActive(t);
  } else if (t.status === 'occupied') {
    panel.innerHTML = renderOccupied(t);
  } else if (t.status === 'available') {
    panel.innerHTML = renderAvailable(t);
  } else if (t.status === 'finishing') {
    panel.innerHTML = renderFinishing(t);
  } else {
    panel.innerHTML = renderOccupied(t);
  }
}

function renderBookibudReservation(t) {
  return `
    <div class="detail-header">
      <div class="detail-header-top">
        <div class="detail-title">Bord ${t.id}</div>
        <span class="bb-source" style="font-size:12px;padding:4px 10px">
          <svg viewBox="0 0 16 16" fill="currentColor" width="12" height="12"><circle cx="8" cy="8" r="7"/></svg>
          Bookibud ${t.bookingId}
        </span>
      </div>
      <span class="status-pill reserved" style="align-self:flex-start">⏳ Reservert kl. ${t.time}</span>
    </div>
    <div class="detail-body">
      <!-- Booking info from Bookibud -->
      <div class="section">
        <div class="section-header"><span class="icon">📋</span> Bookingdetaljer fra Bookibud</div>
        <div class="section-body">
          <div class="info-row">
            <span class="info-label">Gjest</span>
            <span class="info-value">${t.guest}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Tidspunkt</span>
            <span class="info-value">${t.time}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Antall</span>
            <span class="info-value">${t.pax} personer</span>
          </div>
          ${t.deposit ? `
          <div class="info-row">
            <span class="info-label">Depositum betalt</span>
            <span class="info-value" style="color:var(--success)">kr ${t.deposit},-</span>
          </div>` : ''}
          <div class="info-row">
            <span class="info-label">Booking-kilde</span>
            <span class="info-value" style="color:var(--bb-coral)">Bookibud</span>
          </div>
        </div>
      </div>

      ${t.notes ? `
      <div class="guest-note">
        <span class="note-icon">💬</span>
        <div>
          <div style="font-weight:600;margin-bottom:2px">Gjestemelding</div>
          ${t.notes}
        </div>
      </div>` : ''}

      ${t.allergies ? `
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${t.allergies.map(a => `<span class="allergy-tag">⚠️ ${a}</span>`).join('')}
      </div>` : ''}

      ${t.eventLinked ? `
      <div class="preorder-banner">
        <span class="icon">🎫</span>
        <div>
          <div style="font-weight:600;margin-bottom:1px">Event-kobling aktiv</div>
          Forhåndsbestilt meny via Bookibud event-billett
        </div>
      </div>` : ''}

      <!-- Timeline -->
      <div class="section">
        <div class="section-header"><span class="icon">🔄</span> Integrasjonslogg</div>
        <div class="section-body">
          <div class="timeline">
            <div class="timeline-item">
              <div class="timeline-dot bb">📲</div>
              <div class="timeline-content">
                <div class="t-title">Booking opprettet via Bookibud</div>
                <div class="t-desc">I dag kl. 14:23 · ${t.bookingId}</div>
              </div>
            </div>
            <div class="timeline-item">
              <div class="timeline-dot plorea">🔗</div>
              <div class="timeline-content">
                <div class="t-title">Sesjon opprettet i Plorea POS</div>
                <div class="t-desc">Webhook mottatt · Bord ${t.id} tildelt auto</div>
              </div>
            </div>
            ${t.deposit ? `
            <div class="timeline-item">
              <div class="timeline-dot plorea">💳</div>
              <div class="timeline-content">
                <div class="t-title">Depositum registrert</div>
                <div class="t-desc">kr ${t.deposit},- via Bookibud Checkout</div>
              </div>
            </div>` : ''}
            <div class="timeline-item">
              <div class="timeline-dot bb">📩</div>
              <div class="timeline-content">
                <div class="t-title">SMS-påminnelse sendt</div>
                <div class="t-desc">Automatisk via Bookibud · kl. 18:00</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="detail-footer">
      <button class="btn btn-primary btn-full" onclick="seatGuest(${t.id})">
        ✅ Sett gjest — Start sesjon
      </button>
      <button class="btn btn-secondary btn-full btn-sm" onclick="showToast('info', 'Flyttet', 'Bord ${t.id} frigjort, velg nytt bord')">
        🔄 Flytt til annet bord
      </button>
    </div>
  `;
}

function renderBookibudActive(t) {
  return `
    <div class="detail-header">
      <div class="detail-header-top">
        <div class="detail-title">Bord ${t.id}</div>
        <span class="bb-source" style="font-size:12px;padding:4px 10px">
          <svg viewBox="0 0 16 16" fill="currentColor" width="12" height="12"><circle cx="8" cy="8" r="7"/></svg>
          ${t.bookingId}
        </span>
      </div>
      <span class="status-pill occupied" style="align-self:flex-start">⏱ ${t.timer} aktiv</span>
    </div>
    <div class="detail-body">
      <div class="section">
        <div class="section-header"><span class="icon">👤</span> Gjest · ${t.guest}</div>
        <div class="section-body">
          <div class="info-row">
            <span class="info-label">Booket via</span>
            <span class="info-value" style="color:var(--bb-coral)">Bookibud</span>
          </div>
          <div class="info-row">
            <span class="info-label">Booking-ID</span>
            <span class="info-value">${t.bookingId}</span>
          </div>
        </div>
      </div>

      ${t.preorder ? `
      <div class="preorder-banner">
        <span class="icon">📱</span>
        <div>
          <div style="font-weight:600;margin-bottom:1px">QR forhåndsbestilling aktiv</div>
          Gjest bestilte via Bookibud-bekreftelseslink
        </div>
      </div>` : ''}

      <div class="section">
        <div class="section-header"><span class="icon">🛒</span> Bestillinger</div>
        <div class="section-body">
          <div class="order-item">
            <div class="order-item-left">
              <span class="order-qty">2</span>
              <span class="order-name">Husets aperitif</span>
            </div>
            <span class="order-price">kr 198,-</span>
          </div>
          <div class="order-item">
            <div class="order-item-left">
              <span class="order-qty">1</span>
              <span class="order-name">Tartar av reinsdyr</span>
              ${t.preorder ? '<span class="order-source-qr">QR</span>' : ''}
            </div>
            <span class="order-price">kr 189,-</span>
          </div>
          <div class="order-item">
            <div class="order-item-left">
              <span class="order-qty">1</span>
              <span class="order-name">Blåskjell i hvitvin</span>
              ${t.preorder ? '<span class="order-source-qr">QR</span>' : ''}
            </div>
            <span class="order-price">kr 175,-</span>
          </div>
          <div class="order-item">
            <div class="order-item-left">
              <span class="order-qty">1</span>
              <span class="order-name">Flaske Sancerre 2023</span>
            </div>
            <span class="order-price">kr 598,-</span>
          </div>
          <div class="order-total">
            <span class="order-total-label">Foreløpig total</span>
            <span class="order-total-value">kr ${t.amount.toLocaleString('nb-NO')},-</span>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-header"><span class="icon">🔄</span> Integrasjonslogg</div>
        <div class="section-body">
          <div class="timeline">
            <div class="timeline-item">
              <div class="timeline-dot bb">📲</div>
              <div class="timeline-content">
                <div class="t-title">Booket via Bookibud</div>
                <div class="t-desc">${t.bookingId} · kl. 16:10</div>
              </div>
            </div>
            ${t.preorder ? `
            <div class="timeline-item">
              <div class="timeline-dot qr">📱</div>
              <div class="timeline-content">
                <div class="t-title">Forhåndsbestilling via QR</div>
                <div class="t-desc">2 forretter lagt til · kl. 18:45</div>
              </div>
            </div>` : ''}
            <div class="timeline-item">
              <div class="timeline-dot plorea">✅</div>
              <div class="timeline-content">
                <div class="t-title">Gjest satt — sesjon startet</div>
                <div class="t-desc">Servitør: Line K. · kl. 19:07</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="detail-footer">
      <button class="btn btn-primary btn-full">➕ Legg til bestilling</button>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary" style="flex:1">🧾 Splitt</button>
        <button class="btn btn-success" style="flex:1">💳 Betal</button>
      </div>
    </div>
  `;
}

function renderOccupied(t) {
  return `
    <div class="detail-header">
      <div class="detail-header-top">
        <div class="detail-title">Bord ${t.id}</div>
        <span class="status-pill occupied">⏱ ${t.timer} aktiv</span>
      </div>
    </div>
    <div class="detail-body">
      <div class="section">
        <div class="section-header"><span class="icon">👤</span> ${t.guest} · ${t.source}</div>
        <div class="section-body">
          <div class="info-row">
            <span class="info-label">Kilde</span>
            <span class="info-value" style="text-transform:capitalize">${t.source}</span>
          </div>
          ${t.pax ? `<div class="info-row"><span class="info-label">Gjester</span><span class="info-value">${t.pax}</span></div>` : ''}
        </div>
      </div>
      <div class="section">
        <div class="section-header"><span class="icon">🛒</span> Bestilling</div>
        <div class="section-body">
          <div class="order-total">
            <span class="order-total-label">Foreløpig total</span>
            <span class="order-total-value">kr ${t.amount?.toLocaleString('nb-NO') || 0},-</span>
          </div>
        </div>
      </div>
    </div>
    <div class="detail-footer">
      <button class="btn btn-primary btn-full">➕ Legg til bestilling</button>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary" style="flex:1">🧾 Splitt</button>
        <button class="btn btn-success" style="flex:1">💳 Betal</button>
      </div>
    </div>
  `;
}

function renderAvailable(t) {
  return `
    <div class="detail-header">
      <div class="detail-header-top">
        <div class="detail-title">Bord ${t.id}</div>
        <span class="status-pill available">Ledig</span>
      </div>
    </div>
    <div class="detail-body">
      <div style="text-align:center;padding:40px 20px;color:var(--text-tertiary)">
        <div style="font-size:40px;margin-bottom:12px">🪑</div>
        <div style="font-size:14px;font-weight:500">${t.seats} plasser · Klar for gjester</div>
        <div style="font-size:12px;margin-top:8px">Ingen kommende reservasjoner på dette bordet</div>
      </div>
    </div>
    <div class="detail-footer">
      <button class="btn btn-primary btn-full" onclick="showToast('success','Sesjon startet','Walk-in registrert på bord ${t.id}')">
        👤 Walk-in — Start sesjon
      </button>
    </div>
  `;
}

function renderFinishing(t) {
  return `
    <div class="detail-header">
      <div class="detail-header-top">
        <div class="detail-title">Bord ${t.id}</div>
        <span class="status-pill finishing">Nær ferdig</span>
      </div>
    </div>
    <div class="detail-body">
      <div class="section">
        <div class="section-header"><span class="icon">👤</span> ${t.guest}</div>
        <div class="section-body">
          <div class="order-total">
            <span class="order-total-label">Total</span>
            <span class="order-total-value">kr ${t.amount?.toLocaleString('nb-NO') || 0},-</span>
          </div>
        </div>
      </div>
      <div class="preorder-banner" style="background:var(--orange-bg);border-color:rgba(251,146,60,0.2);color:var(--orange)">
        <span class="icon">⏰</span>
        <div>
          <div style="font-weight:600">Bookibud-reservasjon kl. 20:00</div>
          Bord 7 (Kristin Dahl) venter — frigjør snart
        </div>
      </div>
    </div>
    <div class="detail-footer">
      <button class="btn btn-success btn-full">💳 Avslutt & Betal</button>
    </div>
  `;
}

// ─── INTERACTIONS ───
function seatGuest(id) {
  const t = tables.find(x => x.id === id);
  t.status = 'occupied';
  t.amount = t.deposit || 0;
  t.timer = '0:00';
  renderFloor();
  renderDetail();
  showToast('success', `Bord ${id} aktivert`, `${t.guest} er satt — sesjon startet med Bookibud-kontekst`);
}

function setTab(el) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

// ─── SCENARIO TRIGGERS ───
function triggerNewBooking() {
  const modal = document.getElementById('modalOverlay');
  document.getElementById('modalContent').innerHTML = `
    <div class="modal-banner">
      <div class="modal-banner-icon">📲</div>
      <div class="modal-banner-text">
        <h3>Ny reservasjon fra Bookibud</h3>
        <p>Mottatt akkurat nå via webhook · BB-4830</p>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-guest-row">
        <div class="modal-guest-card">
          <div class="val">Ola Nordmann</div>
          <div class="lbl">Gjest</div>
        </div>
        <div class="modal-guest-card">
          <div class="val">2</div>
          <div class="lbl">Gjester</div>
        </div>
        <div class="modal-guest-card">
          <div class="val">21:00</div>
          <div class="lbl">Tidspunkt</div>
        </div>
      </div>
      <div class="modal-notes">
        <h4>Gjestemelding</h4>
        <p>Vi feirer forlovelse! Kan dere ha noe spesielt klart? 🥂</p>
      </div>
      <div class="modal-table-suggest">
        <span class="icon">🪑</span>
        <div class="text">Anbefalt: <b>Bord 4</b> (2 pl., ledig) eller <b>Bord 9</b> (2 pl., ledig)</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Avslå</button>
      <button class="btn btn-bb" onclick="acceptBooking()">✅ Godta → Bord 4</button>
    </div>
  `;
  modal.classList.add('visible');
}

function acceptBooking() {
  closeModal();
  const t = tables.find(x => x.id === 4);
  t.status = 'reserved';
  t.guest = 'Ola Nordmann';
  t.time = '21:00';
  t.pax = 2;
  t.source = 'bookibud';
  t.notes = 'Vi feirer forlovelse! Kan dere ha noe spesielt klart? 🥂';
  t.bookingId = 'BB-4830';
  selectedTable = 4;
  renderFloor();
  renderDetail();
  showToast('bb', 'Reservasjon bekreftet', 'Bord 4 → Ola Nordmann kl. 21:00 via Bookibud');
}

function triggerQROrder() {
  showToast('qr', 'QR-bestilling mottatt', 'Bord 5 (Sara & Knut) · 2x Crème brûlée, 1x Espresso via Bookibud QR-link');
  const t = tables.find(x => x.id === 5);
  t.amount += 378;
}

function triggerEventCheckin() {
  showToast('bb', 'Event-innsjekk', 'Bord 8 · Trondheim JK · 8 gjester · Event-billett validert ✓ · 3-retters meny forhåndslastet');
}

// ─── TOAST ───
function showToast(type, title, desc) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type === 'bb' || type === 'qr' ? 'bb-toast' : ''}`;
  toast.innerHTML = `
    <div class="toast-icon ${type === 'bb' ? 'bb' : type === 'qr' ? 'bb' : ''}" style="${type === 'success' ? 'background:var(--success-bg)' : type === 'info' ? 'background:var(--p-blue-glow)' : ''}">
      ${type === 'bb' ? '📲' : type === 'qr' ? '📱' : type === 'success' ? '✅' : 'ℹ️'}
    </div>
    <div class="toast-content">
      <div class="toast-title">${title}</div>
      <div class="toast-desc">${desc}</div>
    </div>
    <div class="toast-time">nå</div>
  `;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.animation = 'slideOut 0.3s forwards';
    setTimeout(() => toast.remove(), 300);
  }, 5000);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('visible');
}

// ─── CLOCK ───
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = 
    now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
}
setInterval(updateClock, 1000);
updateClock();

// ─── INIT ───
renderFloor();
renderDetail();

// Auto-toast after 2s to show the integration is "live"
setTimeout(() => {
  showToast('bb', 'Bookibud sync aktiv', '3 reservasjoner synkronisert · Neste: Henrik Bakken kl. 20:00');
}, 2000);
</script>
