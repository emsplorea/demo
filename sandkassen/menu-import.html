<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plorea – Menyimport</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap');
  :root{--bp:#16151A;--bs:#1E1D24;--bh:#26242E;--bo:#2E2C38;--t1:#F0EEF5;--t2:#9B98A8;--t3:#5C5970;--pri:#6BB8DA;--prd:#468DAC;--acc:#2E6B87;--bd:#2E2C38;--bdl:#3A3848;--ok:#4DB896;--wn:#C4C44A;--er:#D45858;--sel:rgba(107,184,218,.12);--foc:rgba(107,184,218,.3);--alc:#C084FC;--alcb:rgba(192,132,252,.1);--ai:#F59E0B;--aib:rgba(245,158,11,.08);--rs:4px;--rm:6px;--rl:8px;--rxl:14px;--r2:20px;--rf:9999px;--e1:0 1px 3px rgba(0,0,0,.3);--e2:0 4px 12px rgba(0,0,0,.35);--e3:0 8px 32px rgba(0,0,0,.45);--dm:80ms;--df:100ms;--dd:160ms;--ds:240ms;--dp:320ms;--eo:cubic-bezier(.16,1,.3,1);--ei:cubic-bezier(.4,0,1,1);--ee:cubic-bezier(.4,0,.2,1)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bp);color:var(--t1);min-height:100vh;font-size:13px;line-height:1.6;-webkit-font-smoothing:antialiased}
  h1,h2,h3,.sora{font-family:'Sora',sans-serif;letter-spacing:-.02em}
  .mono{font-family:'JetBrains Mono',monospace}

  /* TOP */
  .top{height:48px;background:var(--bs);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:100;box-shadow:var(--e1)}
  .logo{font-family:'Sora';font-weight:700;font-size:17px;letter-spacing:-.03em}.logo span{color:var(--pri)}
  .sep{width:1px;height:20px;background:var(--bd)}
  .ai-badge{font-family:'Sora';font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:3px 10px;border-radius:var(--rf);background:var(--aib);color:var(--ai);border:1px solid rgba(245,158,11,.15);margin-left:auto}

  .lay{max-width:1100px;margin:0 auto;padding:28px 24px 120px}

  /* CARD */
  .card{background:var(--bs);border:1px solid var(--bd);border-radius:var(--rxl);padding:24px;margin-bottom:16px;box-shadow:var(--e1)}

  /* INPUTS */
  input[type="url"],input[type="text"],input[type="number"]{width:100%;height:44px;background:var(--bh);border:1px solid var(--bd);border-radius:var(--rl);padding:0 14px;font-family:inherit;font-size:13px;color:var(--t1);outline:none;transition:border-color var(--df) var(--ee),box-shadow var(--df) var(--ee)}
  input:focus{border-color:var(--pri);box-shadow:0 0 0 3px var(--foc)}input::placeholder{color:var(--t3)}
  select{height:34px;background:var(--bh);border:1px solid var(--bd);border-radius:var(--rm);padding:0 10px;font-family:inherit;font-size:12px;color:var(--t1);outline:none;cursor:pointer}

  /* BUTTONS */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;height:44px;padding:0 20px;border-radius:var(--rl);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all var(--df) var(--ee);white-space:nowrap}
  .bp{background:var(--pri);color:#fff}.bp:hover{background:var(--prd)}
  .bs{background:var(--bh);color:var(--t1);border:1px solid var(--bd)}.bs:hover{background:var(--bo)}
  .bok{background:var(--ok);color:#fff}.bok:hover{background:#3ca882}
  .bsm{height:32px;padding:0 14px;font-size:12px;border-radius:var(--rm)}
  .bxs{height:26px;padding:0 9px;font-size:11px;border-radius:var(--rs)}
  .bai{background:var(--aib);color:var(--ai);border:1px solid rgba(245,158,11,.2)}.bai:hover{background:rgba(245,158,11,.15)}
  .bg-btn{background:transparent;color:var(--t2);height:30px;padding:0 10px;font-size:11px;border:none;cursor:pointer;font-family:inherit;border-radius:var(--rm)}.bg-btn:hover{color:var(--t1);background:var(--bh)}

  /* CHIPS */
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .chip{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:var(--rf);font-size:12px;font-weight:500;background:var(--bh);border:1px solid var(--bd);color:var(--t2);cursor:pointer;transition:all var(--df) var(--ee)}.chip:hover{border-color:var(--pri);color:var(--pri);background:var(--sel)}

  /* SCAN - FAST */
  .scan-wrap{display:none;flex-direction:column;align-items:center;padding:48px 0;text-align:center}.scan-wrap.on{display:flex}
  .scan-spinner{width:48px;height:48px;border:3px solid var(--bd);border-top-color:var(--ai);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:20px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .scan-found{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:16px;max-width:500px}
  .scan-tag{font-size:10px;padding:3px 8px;border-radius:var(--rf);background:var(--bh);border:1px solid var(--bd);color:var(--t2);animation:tagIn .3s var(--eo) both}
  @keyframes tagIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}

  /* AI BAR - compact */
  .ai-bar{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--bs);border:1px solid rgba(245,158,11,.12);border-radius:var(--rl);margin-bottom:12px;box-shadow:var(--e1);flex-wrap:wrap}
  .ai-bar-icon{font-size:16px;flex-shrink:0}
  .ai-bar-text{font-size:12px;color:var(--t2);flex:1;min-width:200px}.ai-bar-text strong{color:var(--ai)}
  .ai-bar-stat{font-family:'Sora';font-size:16px;font-weight:700;color:var(--ai);min-width:30px;text-align:center}
  .ai-bar-label{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em}
  .ai-bar-sep{width:1px;height:24px;background:var(--bd)}

  /* REVIEW PROGRESS */
  .review-prog{display:flex;align-items:center;gap:10px;padding:8px 16px;background:var(--bs);border:1px solid var(--bd);border-radius:var(--rl);margin-bottom:12px;box-shadow:var(--e1)}
  .rp-bar{flex:1;height:6px;background:var(--bo);border-radius:3px;overflow:hidden}.rp-fill{height:100%;border-radius:3px;background:var(--ok);transition:width .4s var(--eo)}
  .rp-text{font-size:12px;font-weight:600;white-space:nowrap}.rp-sub{font-size:10px;color:var(--t3)}

  /* TOOLBAR */
  .tb{display:flex;align-items:center;gap:8px;padding:8px 0;flex-wrap:wrap}
  .srch{position:relative;width:220px}.srch svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none}
  .srch input{width:100%;height:32px;padding:0 10px 0 32px;background:var(--bh);border:1px solid var(--bd);border-radius:var(--rm);font-size:11px}.srch input:focus{border-color:var(--pri)}
  .fg{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap}
  .fb{height:28px;padding:0 10px;border-radius:var(--rf);font-size:10px;font-weight:600;border:1px solid var(--bd);background:transparent;color:var(--t2);cursor:pointer;transition:all var(--df) var(--ee);font-family:inherit;display:inline-flex;align-items:center;gap:4px}
  .fb:hover,.fb.on{background:var(--sel);border-color:var(--pri);color:var(--pri)}
  .fb .fc{background:var(--bo);padding:1px 5px;border-radius:var(--rf);font-size:8px;font-weight:700}.fb.on .fc{background:var(--pri);color:#fff}

  /* TABLE */
  .mt{width:100%;border-collapse:collapse;font-size:12px;background:var(--bs);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;box-shadow:var(--e1);margin-bottom:16px}
  .mt th{text-align:left;padding:8px 10px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);background:var(--bp);border-bottom:1px solid var(--bd);white-space:nowrap;position:sticky;top:48px;z-index:10}
  .mt td{padding:10px;border-bottom:1px solid rgba(46,44,56,.4);vertical-align:middle}
  .mt tr:last-child td{border-bottom:none}
  .mt tbody tr{cursor:pointer;transition:background var(--df) var(--ee)}.mt tbody tr:hover td{background:var(--bh)}
  .mt tr.confirmed td{opacity:.55}.mt tr.confirmed:hover td{opacity:.8}
  .mt tr.confirmed td:first-child{opacity:1}
  .mt .cat-row td{background:var(--bp);padding:6px 10px;font-family:'Sora';font-size:11px;font-weight:600;color:var(--t3);cursor:default;border-bottom:1px solid var(--bd)}

  .chk{width:16px;height:16px;border-radius:var(--rs);border:2px solid var(--bd);background:var(--bh);cursor:pointer;appearance:none;-webkit-appearance:none;position:relative;transition:all var(--dm) var(--ee)}
  .chk:checked{background:var(--pri);border-color:var(--pri)}.chk:checked::after{content:'✓';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:9px;color:#fff;font-weight:700}
  .chk-ok{border-color:var(--ok);background:rgba(77,184,150,.15)}.chk-ok::after{content:'✓';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:9px;color:var(--ok);font-weight:700}

  /* IMAGE THUMB */
  .img-th{width:44px;height:44px;border-radius:var(--rm);background:var(--bh);border:1px solid var(--bd);overflow:hidden;flex-shrink:0;position:relative;display:flex;align-items:center;justify-content:center}
  .img-th img{width:100%;height:100%;object-fit:cover}
  .img-th .img-empty{font-size:18px;opacity:.5}
  .img-th .img-fail{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(212,88,88,.08);font-size:10px;color:var(--er)}
  .img-status-dot{position:absolute;bottom:-1px;right:-1px;width:12px;height:12px;border-radius:50%;border:2px solid var(--bs);font-size:6px;display:flex;align-items:center;justify-content:center;font-weight:700}
  .img-status-dot.ok{background:var(--ok);color:#fff}.img-status-dot.fail{background:var(--er);color:#fff}.img-status-dot.none{background:var(--t3);color:#fff}
  /* Image section in drawer */
  .dr-img-wrap{display:flex;gap:14px;align-items:flex-start;margin-bottom:12px}
  .dr-img-preview{width:120px;height:90px;border-radius:var(--rl);background:var(--bh);border:1px solid var(--bd);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center}
  .dr-img-preview img{width:100%;height:100%;object-fit:cover}
  .dr-img-info{flex:1;display:flex;flex-direction:column;gap:6px}
  .dr-img-status{font-size:11px;font-weight:600;display:flex;align-items:center;gap:5px}
  .dr-img-actions{display:flex;gap:4px;flex-wrap:wrap}

  /* BADGES */
  .badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:var(--rs);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap}
  .b-alc{background:var(--alcb);color:var(--alc);border:1px solid rgba(192,132,252,.15)}
  .b-ai{background:var(--aib);color:var(--ai);border:1px solid rgba(245,158,11,.15)}

  /* ALLERGEN TAGS */
  .al-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:var(--rs);background:rgba(255,255,255,.06);color:var(--t3);display:inline-flex;align-items:center;gap:3px}
  .al-tag.ai{border-left:2px solid var(--ai)}
  .al-src{font-size:7px;font-weight:700;padding:0 3px;border-radius:2px;text-transform:uppercase}.al-src.t{background:var(--aib);color:var(--ai)}.al-src.m{background:var(--sel);color:var(--pri)}

  /* HL DESC */
  .hl-desc{font-size:11px;line-height:1.6;color:var(--t2);padding:6px 10px;background:var(--bp);border-radius:var(--rm);border:1px solid var(--bd)}
  .hl-w{padding:1px 3px;border-radius:2px;font-weight:600;cursor:help;position:relative;background:rgba(212,88,88,.12);color:var(--er);border-bottom:1.5px solid var(--er)}
  .hl-w .hl-tip{position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:var(--bo);border:1px solid var(--bd);border-radius:var(--rs);padding:2px 7px;font-size:8px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity var(--df);z-index:10;color:var(--t1);font-weight:500}.hl-w:hover .hl-tip{opacity:1}

  /* HG PILL */
  .hg-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:var(--rm);font-size:10px;font-weight:600;background:var(--bo);border:1px solid var(--bd)}
  .hg-conf{font-family:'JetBrains Mono';font-size:9px;font-weight:700}

  /* PRICE */
  .pvt{font-size:7px;font-weight:700;text-transform:uppercase;padding:0px 3px;border-radius:2px}.pv-in{background:rgba(107,184,218,.12);color:var(--pri)}.pv-ta{background:rgba(77,184,150,.12);color:var(--ok)}
  .inline-pr{background:transparent;border:none;font-family:inherit;font-size:12px;font-weight:600;color:var(--t1);width:52px;padding:2px 4px;border-radius:var(--rs);outline:none;cursor:text}.inline-pr:hover{background:var(--bo)}.inline-pr:focus{background:var(--bo);box-shadow:0 0 0 2px var(--foc)}

  /* CONFIRMED CHECK */
  .conf-icon{width:18px;height:18px;border-radius:50%;background:rgba(77,184,150,.15);color:var(--ok);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}

  /* TABS */
  .tabs{display:flex;gap:0;border-bottom:2px solid var(--bd);margin-bottom:16px}
  .tab{padding:10px 20px;font-size:13px;font-weight:600;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all var(--df) var(--ee)}.tab:hover{color:var(--t2)}.tab.on{color:var(--pri);border-bottom-color:var(--pri)}
  .tab .tc{font-size:10px;background:var(--bo);padding:1px 6px;border-radius:var(--rf);margin-left:4px}.tab.on .tc{background:var(--sel);color:var(--pri)}

  /* HG CARDS */
  .hg-card{background:var(--bs);border:1px solid var(--bd);border-radius:var(--rxl);overflow:hidden;margin-bottom:8px;box-shadow:var(--e1)}
  .hg-top{display:flex;align-items:center;gap:14px;padding:14px 20px}
  .hg-ico{width:40px;height:40px;border-radius:var(--rl);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .hg-nm{font-family:'Sora';font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px}
  .hg-meta{font-size:10px;color:var(--t2);margin-top:2px;display:flex;gap:6px;flex-wrap:wrap}
  .hg-tag{display:inline-flex;align-items:center;gap:2px;font-size:9px;font-weight:600;padding:2px 7px;border-radius:var(--rs)}.hg-vat{background:var(--sel);color:var(--pri)}.hg-saft{background:rgba(255,255,255,.05);color:var(--t3);font-family:'JetBrains Mono';font-size:8px}
  .hg-cnt{font-family:'Sora';font-size:13px;font-weight:700;color:var(--pri);min-width:26px;text-align:center}
  .hg-edit-btn{height:28px;padding:0 12px;border-radius:var(--rm);font-size:11px;font-weight:600;background:var(--bh);border:1px solid var(--bd);color:var(--t2);cursor:pointer;font-family:inherit;transition:all var(--df) var(--ee)}.hg-edit-btn:hover{background:var(--bo);color:var(--t1);border-color:var(--bdl)}
  .hg-edit{display:none;padding:14px 20px;background:var(--bp);border-top:1px solid var(--bd);gap:10px;flex-wrap:wrap;align-items:flex-end}.hg-card.editing .hg-edit{display:flex}
  .hg-ef{display:flex;flex-direction:column;gap:3px}.hg-el{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3)}.hg-ei{height:32px;background:var(--bh);border:1px solid var(--bd);border-radius:var(--rm);padding:0 9px;font-family:inherit;font-size:12px;color:var(--t1);outline:none;transition:border-color var(--df)}.hg-ei:focus{border-color:var(--pri);box-shadow:0 0 0 2px var(--foc)}.hg-ei.w{width:180px}.hg-ei.n{width:70px}.hg-ei.c{width:90px;font-family:'JetBrains Mono'}
  .hg-items{padding:10px 20px;display:none;flex-direction:column;gap:3px;max-height:180px;overflow-y:auto;border-top:1px solid var(--bd);background:var(--bp)}.hg-card.expanded .hg-items{display:flex}
  .hg-item{display:flex;align-items:center;gap:8px;padding:5px 10px;background:var(--bs);border:1px solid rgba(46,44,56,.3);border-radius:var(--rm);font-size:11px}.hg-inm{flex:1;font-weight:500}.hg-ipr{font-family:'JetBrains Mono';font-size:10px;color:var(--t2);display:flex;gap:6px}

  /* STICKY */
  .sticky{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--bs);border-top:1px solid var(--bd);padding:10px 24px;display:none;backdrop-filter:blur(12px);box-shadow:0 -4px 16px rgba(0,0,0,.3)}.sticky.on{display:flex}
  .sticky-in{max-width:1100px;margin:0 auto;display:flex;align-items:center;width:100%;gap:12px}
  .sticky-l{display:flex;align-items:center;gap:10px;font-size:13px;flex:1;flex-wrap:wrap}
  .sticky-prog{width:80px;height:6px;background:var(--bo);border-radius:3px;overflow:hidden}.sticky-prog-fill{height:100%;border-radius:3px;background:var(--ok);transition:width .3s var(--eo)}
  .sticky-r{display:flex;gap:8px;align-items:center}

  /* DRAWER */
  .dov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;opacity:0;pointer-events:none;transition:opacity var(--dp) var(--ee)}.dov.on{opacity:1;pointer-events:auto}
  .drw{position:fixed;top:0;right:0;bottom:0;width:520px;max-width:96vw;background:var(--bs);border-left:1px solid var(--bd);z-index:210;transform:translateX(100%);transition:transform var(--dp) var(--eo);display:flex;flex-direction:column;box-shadow:var(--e3)}.drw.on{transform:translateX(0)}
  .drh{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--bd);flex-shrink:0}
  .drcl{width:30px;height:30px;border-radius:var(--rm);border:1px solid var(--bd);background:transparent;color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all var(--df) var(--ee)}.drcl:hover{background:var(--bh);color:var(--t1)}
  .drt{flex:1;font-family:'Sora';font-size:15px;font-weight:600}.drt small{font-size:11px;font-weight:400;color:var(--t3);margin-left:5px}
  .drn{display:flex;gap:3px}.drn button{width:26px;height:26px;border-radius:var(--rs);border:1px solid var(--bd);background:transparent;color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all var(--df)}.drn button:hover:not(:disabled){background:var(--bh);color:var(--t1)}.drn button:disabled{opacity:.3;cursor:not-allowed}
  .drb{flex:1;overflow-y:auto;padding:18px}
  .drs{margin-bottom:16px}.drst{font-family:'Sora';font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin-bottom:7px;display:flex;align-items:center;gap:6px}
  .drf{margin-bottom:10px}.drl{font-size:10px;font-weight:700;color:var(--t2);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
  .dri{width:100%;height:36px;background:var(--bh);border:1px solid var(--bd);border-radius:var(--rm);padding:0 10px;font-family:inherit;font-size:12px;color:var(--t1);outline:none}.dri:focus{border-color:var(--pri);box-shadow:0 0 0 2px var(--foc)}
  .drta{width:100%;min-height:44px;background:var(--bh);border:1px solid var(--bd);border-radius:var(--rm);padding:8px 10px;font-family:inherit;font-size:12px;color:var(--t1);outline:none;resize:vertical}.drta:focus{border-color:var(--pri)}
  .drat{display:flex;flex-wrap:wrap;gap:3px}.dra{font-size:10px;font-weight:500;padding:4px 9px;border-radius:var(--rs);background:var(--bh);border:1px solid var(--bd);color:var(--t2);cursor:pointer;transition:all var(--df) var(--ee)}.dra:hover{border-color:var(--pri);color:var(--pri)}.dra.sel{background:var(--pri);border-color:var(--pri);color:#fff}.dra.sug{border-color:rgba(245,158,11,.4);background:var(--aib)}.dra.sug::before{content:'🤖 ';font-size:8px}
  .drac{display:flex;gap:6px;padding:14px 18px;border-top:1px solid var(--bd);flex-shrink:0;align-items:center}

  /* AI reasoning - COLLAPSIBLE */
  .ai-toggle{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--ai);cursor:pointer;padding:6px 10px;background:var(--aib);border:1px solid rgba(245,158,11,.12);border-radius:var(--rm);margin-bottom:8px;transition:all var(--df) var(--ee)}.ai-toggle:hover{background:rgba(245,158,11,.12)}
  .ai-toggle .arr{transition:transform var(--dd) var(--ee)}.ai-toggle.open .arr{transform:rotate(90deg)}
  .ai-detail{display:none;padding:10px 12px;background:var(--bp);border:1px solid rgba(245,158,11,.1);border-radius:var(--rm);margin-bottom:8px}.ai-detail.open{display:block}

// S1
function rS1(){$('step1').innerHTML=`<div class="card"><h2 class="sora" style="font-size:20px;font-weight:700;margin-bottom:6px">Importer meny med AI</h2><p style="font-size:13px;color:var(--t2);line-height:1.6;margin-bottom:20px">Lim inn URL. AI detekterer allergener fra ingredienstekst og klassifiserer hovedgrupper med MVA og SAF-T automatisk.</p><div style="display:flex;gap:8px;margin-bottom:12px"><div style="flex:1;position:relative"><svg style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg><input type="url" id="urlIn" placeholder="https://restaurant.no/meny" style="padding-left:38px" autocomplete="off" /></div><button class="btn bp" onclick="scan()">✨ Skann</button></div><div class="chips"><div class="chip" onclick="$('urlIn').value='https://havet-restaurant.no/meny'">🐟 Havet</div><div class="chip" onclick="$('urlIn').value='https://pizzeria-napoli.no/menu.pdf'">🍕 Napoli</div><div class="chip" onclick="$('urlIn').value='https://thai-garden.no/var-meny'">🍜 Thai Garden</div></div></div>`;setTimeout(()=>$('urlIn')?.addEventListener('keydown',e=>{if(e.key==='Enter')scan();}),50);}

  // Review progress

  h+=`<div class="review-prog"><div class="rp-text">${cn}/${tot} gjennomgått</div><div class="rp-bar"><div class="rp-fill" style="width:${pct}%"></div></div><div class="rp-sub">${pn?`⚠ ${pn} trenger oppmerksomhet`:'✓ Alt klart'}</div></div>`;

  // TABS
  h+=`<div class="tabs"><div class="tab ${S.tab==='review'?'on':''}" onclick="S.tab='review';rS3()">Produkter<span class="tc">${tot}</span></div><div class="tab ${S.tab==='hg'?'on':''}" onclick="S.tab='hg';rS3()">Hovedgrupper<span class="tc">${new Set(a.filter(i=>i.chk).map(i=>i.hg)).size}</span></div></div>`;

  if(S.tab==='review'){
    // Toolbar
    h+=`<div class="tb"><div class="srch"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" placeholder="Søk…" value="${S.sr}" oninput="S.sr=this.value;rS3()" /></div><div class="fg"><button class="fb ${S.af==='all'?'on':''}" onclick="S.af='all';rS3()">Alle <span class="fc">${tot}</span></button><button class="fb ${S.af==='ai'?'on':''}" onclick="S.af='ai';rS3()">🤖 AI-funn <span class="fc">${a.filter(i=>i.miss.length).length}</span></button><button class="fb ${S.af==='noimg'?'on':''}" onclick="S.af='noimg';rS3()">📷 Uten bilde <span class="fc">${a.filter(i=>i.imgSt!=='found').length}</span></button><button class="fb ${S.af==='uc'?'on':''}" onclick="S.af='uc';rS3()">Ubekreftet <span class="fc">${tot-cn}</span></button><button class="fb ${S.af==='alc'?'on':''}" onclick="S.af='alc';rS3()">Alkohol <span class="fc">${alcN}</span></button></div></div>`;

    // FLAT TABLE (categories as inline rows)
    const imgN=a.filter(i=>i.imgSt==='found').length;
    h+=`<table class="mt"><thead><tr><th style="width:24px"></th><th style="width:50px">Bilde</th><th>Produkt & allergener</th><th style="width:100px">Pris</th><th style="width:130px">Hovedgruppe</th></tr></thead><tbody>`;
    S.m.cats.forEach((cat,ci)=>{
      const fi=cat.its.filter(filt);if(!fi.length)return;
      h+=`<tr class="cat-row"><td colspan="5">${cat.nm} · ${fi.length} retter</td></tr>`;
      fi.forEach(it=>{const ri=cat.its.indexOf(it);const hg=HGD.find(g=>g.id===it.hg)||HGD[0];
        h+=`<tr class="${it.conf?'confirmed':''}" onclick="openDr(${ci},${ri})"><td onclick="event.stopPropagation()">${it.conf?'<div class="conf-icon">✓</div>':`<input type="checkbox" class="chk" ${it.chk?'checked':''} onchange="S.m.cats[${ci}].its[${ri}].chk=this.checked;updS()" />`}</td>`;
        // Image thumbnail
        h+=`<td><div class="img-th">${it.imgSt==='found'?`<img src="${it.img}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<span class=img-empty>📷</span><div class=img-status-dot style=background:var(--er)>!</div>';S.m.cats[${ci}].its[${ri}].imgSt='failed'">`:`<span class="img-empty">📷</span>`}<div class="img-status-dot ${it.imgSt==='found'?'ok':it.imgSt==='failed'?'fail':'none'}">${it.imgSt==='found'?'✓':it.imgSt==='failed'?'!':'–'}</div></div></td>`;
        h+=`<td><div style="display:flex;align-items:center;gap:6px;margin-bottom:3px"><span class="sora" style="font-size:12px;font-weight:600">${it.n}</span>${it.al?'<span class="badge b-alc">🍷</span>':''}${it.miss.length?`<span class="badge b-ai">+${it.miss.length} AI</span>`:''}</div>`;
        h+=`<div class="hl-desc">${hl(it.d,it.aiAl)}</div>`;
        h+=`<div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:4px">${it.det.map(d=>`<span class="al-tag ${d.s==='t'?'ai':''}">${d.a} <span class="al-src ${d.s}">${d.s==='t'?'🤖':'📋'}</span></span>`).join('')}</div></td>`;
        h+=`<td>${it.pi!==null?`<div><span class="pvt pv-in">S</span> <input class="inline-pr" value="${it.pi},-" onclick="event.stopPropagation()" onchange="iPr(${ci},${ri},'pi',this.value)" /></div>`:''} ${it.pt!==null?`<div><span class="pvt pv-ta">T</span> <input class="inline-pr" value="${it.pt},-" onclick="event.stopPropagation()" onchange="iPr(${ci},${ri},'pt',this.value)" /></div>`:''}${it.pi===null&&it.pt===null?'<span style="color:var(--er);font-size:10px">✕</span>':''}</td>`;
        h+=`<td><div class="hg-pill">${hg.ic} ${hg.nm} <span class="hg-conf" style="color:var(--${cc(it.hgC)==='ok'?'ok':cc(it.hgC)==='wn'?'wn':'er'})">${it.hgC}%</span></div></td></tr>`;
      });
    });
    h+=`</tbody></table>`;
  } else {
    // HG TAB
    const sel=its().filter(i=>i.chk),grp={};sel.forEach(i=>{if(!grp[i.hg])grp[i.hg]=[];grp[i.hg].push(i);});
    const used=HGD.filter(t=>grp[t.id]?.length);
    h+=`<div style="font-size:12px;color:var(--t2);margin-bottom:12px">${sel.length} produkter i ${used.length} grupper. Klikk <strong>Rediger</strong> for å endre navn, MVA og SAF-T konto.</div>`;
    used.forEach(t=>{const its2=grp[t.id];
      h+=`<div class="hg-card" id="hg-${t.id}"><div class="hg-top"><div class="hg-ico" style="background:${t.bg}">${t.ic}</div><div style="flex:1"><div class="hg-nm">${t.nm}${t.al?' <span class="badge b-alc" style="font-size:8px">🍷 25% · 🚫</span>':''}</div><div class="hg-meta"><span class="hg-tag hg-vat">S: ${t.vi}%</span><span class="hg-tag hg-vat">T: ${t.vt}%</span><span class="hg-tag hg-saft">SAF-T ${t.sf} – ${t.sfn}</span></div></div><div class="hg-cnt">${its2.length}</div><button class="hg-edit-btn" onclick="event.stopPropagation();$('hg-${t.id}').classList.toggle('editing')">✏ Rediger</button><button class="bg-btn" onclick="$('hg-${t.id}').classList.toggle('expanded')" style="font-size:13px">▾</button></div>`;
      h+=`<div class="hg-edit"><div class="hg-ef"><div class="hg-el">Gruppenavn</div><input class="hg-ei w" value="${t.nm}" onchange="eHG('${t.id}','nm',this.value)" /></div><div class="hg-ef"><div class="hg-el">MVA Serv.</div><input class="hg-ei n" type="number" value="${t.vi}" onchange="eHG('${t.id}','vi',+this.value)" /><span style="font-size:11px;color:var(--t3)">%</span></div><div class="hg-ef"><div class="hg-el">MVA Take.</div><input class="hg-ei n" type="number" value="${t.vt}" onchange="eHG('${t.id}','vt',+this.value)" /><span style="font-size:11px;color:var(--t3)">%</span></div><div class="hg-ef"><div class="hg-el">SAF-T Konto</div><input class="hg-ei c" value="${t.sf}" onchange="eHG('${t.id}','sf',this.value)" /></div><div class="hg-ef"><div class="hg-el">SAF-T Navn</div><input class="hg-ei w" value="${t.sfn}" onchange="eHG('${t.id}','sfn',this.value)" /></div></div>`;
      h+=`<div class="hg-items">${its2.map(i=>`<div class="hg-item"><div class="hg-inm">${i.n}</div><div class="hg-ipr">${i.pi!==null?`<span style="color:var(--pri)">S:${i.pi}</span>`:''}${i.pt!==null?`<span style="color:var(--ok)">T:${i.pt}</span>`:''}</div>${i.al?'<span class="badge b-alc" style="font-size:7px">🍷</span>':''}</div>`).join('')}</div></div>`;
    });
  }

  $('step3').innerHTML=h;updS();
  $('stickyR').innerHTML=`<button class="btn bok bsm" onclick="doImport()">✓ Importer ${selN()}</button>`;
}

function filt(i){if(S.sr&&!i.n.toLowerCase().includes(S.sr.toLowerCase())&&!i.d.toLowerCase().includes(S.sr.toLowerCase()))return false;if(S.af==='ai')return i.miss.length>0;if(S.af==='uc')return!i.conf;if(S.af==='alc')return i.al;if(S.af==='noimg')return i.imgSt!=='found';return true;}
function iPr(ci,ri,f,v){const n=parseFloat(v.replace(/[^0-9.,]/g,'').replace(',','.'));S.m.cats[ci].its[ri][f]=isNaN(n)?null:n;S.ec++;}
function bulkAcceptAI(){its().forEach(i=>{if(i.miss.length){i.miss.forEach(d=>{if(!i.als.includes(d.a)){i.als.push(d.a);i.det.push(d);}});i.miss=[];i.iss=i.iss.filter(x=>x.f!=='al');i.st=i.iss.length?'ch':'ok';}});S.ec++;rS3();}
function eHG(id,f,v){const h=HGD.find(g=>g.id===id);if(h)h[f]=v;S.ec++;rS3();}
function updS(){const cn=confN(),tot=its().length,pct=tot?Math.round(cn/tot*100):0;$('stickyL').innerHTML=`<span style="font-weight:600">${selN()} valgt</span><div class="sticky-prog"><div class="sticky-prog-fill" style="width:${pct}%"></div></div><span style="font-size:11px;color:var(--t2)">${cn}/${tot}</span>${probN()?`<span style="font-size:10px;color:var(--wn)">⚠ ${probN()}</span>`:''}`;}

// DRAWER
function openDr(ci,ri){S.di={ci,ri};$('dov').classList.add('on');$('drw').classList.add('on');renDr();}
function closeDr(){$('dov').classList.remove('on');$('drw').classList.remove('on');S.di=null;rS3();}
function navDr(d){const a=its(),cur=S.m.cats[S.di.ci].its[S.di.ri],idx=a.indexOf(cur);const list=d===1?[...a.slice(idx+1),...a.slice(0,idx)]:[...a.slice(0,idx).reverse(),...a.slice(idx+1).reverse()];for(const t of list){for(let ci=0;ci<S.m.cats.length;ci++){const ri=S.m.cats[ci].its.indexOf(t);if(ri>=0){S.di={ci,ri};renDr();return;}}}}

function renDr(){
  const it=S.m.cats[S.di.ci].its[S.di.ri],cat=S.m.cats[S.di.ci];
  const hg=HGD.find(g=>g.id===it.hg)||HGD[0];
  $('drt').innerHTML=`${it.n}<small>${cat.nm}</small>`;
  const dl=((it.d||'')+' '+it.n).toLowerCase();const sugs=[];AR.forEach(r=>{if(dl.includes(r.k)&&!it.als.includes(r.a)&&!sugs.includes(r.a))sugs.push(r.a);});

  let h='';
  // IMAGE SECTION
  h+=`<div class="drs"><div class="drst">🖼️ Produktbilde</div><div class="dr-img-wrap">`;
  h+=`<div class="dr-img-preview">${it.imgSt==='found'?`<img src="${it.img}" alt="${it.n}">`:`<span style="font-size:28px;opacity:.3">📷</span>`}</div>`;
  h+=`<div class="dr-img-info">`;
  if(it.imgSt==='found'){
    h+=`<div class="dr-img-status" style="color:var(--ok)">✓ Bilde hentet fra nettside</div>`;
    h+=`<div style="font-size:10px;color:var(--t3);margin-top:2px">Automatisk lastet ned under skanning</div>`;
    h+=`<div class="dr-img-actions"><button class="btn bxs bs" onclick="drImgClear()" style="margin-top:4px">✕ Fjern bilde</button></div>`;
  } else if(it.imgSt==='failed'){
    h+=`<div class="dr-img-status" style="color:var(--er)">✕ Kunne ikke hente bilde</div>`;
    h+=`<div style="font-size:10px;color:var(--t3);margin-top:2px">Bildet var ikke tilgjengelig eller formatet støttes ikke</div>`;
    h+=`<div class="dr-img-actions" style="margin-top:6px"><button class="btn bxs bp" onclick="drImgUpload()">📤 Last opp manuelt</button><button class="btn bxs bs" onclick="drImgSkip()">Legg til senere</button></div>`;
  } else {
    h+=`<div class="dr-img-status" style="color:var(--t3)">Ingen bilde funnet på nettsiden</div>`;
    h+=`<div style="font-size:10px;color:var(--t3);margin-top:2px">Du kan laste opp et bilde nå eller gjøre det etter import</div>`;
    h+=`<div class="dr-img-actions" style="margin-top:6px"><button class="btn bxs bp" onclick="drImgUpload()">📤 Last opp bilde</button><button class="btn bxs bs" onclick="drImgSkip()">Ta dette senere</button></div>`;
  }
  h+=`</div></div></div>`;

  // FIELDS - compact
  h+=`<div class="drs"><div class="drst">📦 Produkt</div><div class="drf"><div class="drl">Navn</div><input class="dri" value="${it.n}" onchange="drE('n',this.value)" /></div><div class="drf"><div class="drl">Beskrivelse</div><textarea class="drta" onchange="drE('d',this.value)">${it.d}</textarea></div><div style="display:flex;gap:8px"><div class="drf" style="flex:1"><div class="drl">Servering</div><input class="dri" value="${it.pi!==null?it.pi+',-':''}" placeholder="—" onchange="drEP('pi',this.value)" /></div><div class="drf" style="flex:1"><div class="drl">Takeaway</div><input class="dri" value="${it.pt!==null?it.pt+',-':''}" placeholder="—" onchange="drEP('pt',this.value)" /></div></div></div>`;

  // ALLERGENS - with collapsible AI reasoning
  h+=`<div class="drs"><div class="drst">⚠ Allergener</div><div class="hl-desc" style="margin-bottom:8px">${hl(it.d,it.aiAl)}</div>`;
  if(it.aiAl.length){
    h+=`<div class="ai-toggle" id="aiAlToggle" onclick="this.classList.toggle('open');$('aiAlDetail').classList.toggle('open')"><span class="arr">▸</span> 🤖 ${it.aiAl.length} AI-deteksjon${it.aiAl.length>1?'er':''} – vis resonnering</div>`;
    h+=`<div class="ai-detail" id="aiAlDetail">${it.aiAl.map(d=>`<div class="ai-step"><span class="ai-step-i">→</span><span class="ai-step-t">«<strong>${d.tr}</strong>» → <em>${d.a}</em> (${d.c}%) ${it.det.find(x=>x.a===d.a&&x.s==='m')?'✓ metadata':'⚠ kun AI'}</span></div>`).join('')}</div>`;
  }
  h+=`<div class="drat" style="margin-top:4px">${AL.map(a=>{const sel=it.als.includes(a);const sug=sugs.includes(a)&&!sel;return`<div class="dra ${sel?'sel':''} ${sug?'sug':''}" onclick="drTgAl('${a}')">${a}</div>`;}).join('')}</div>`;
  if(it.miss.length)h+=`<div style="margin-top:6px"><button class="btn bai bxs" onclick="drAccAl()">🤖 Godta ${it.miss.length} AI-forslag</button></div>`;
  h+=`</div>`;

  // HOVEDGRUPPE - with collapsible reasoning
  h+=`<div class="drs"><div class="drst">🏷️ Hovedgruppe</div><div class="hg-pill" style="margin-bottom:8px">${hg.ic} ${hg.nm} <span class="hg-conf" style="color:var(--${cc(it.hgC)==='ok'?'ok':cc(it.hgC)==='wn'?'wn':'er'})">${it.hgC}%</span></div>`;
  h+=`<div class="ai-toggle" id="aiHgToggle" onclick="this.classList.toggle('open');$('aiHgDetail').classList.toggle('open')"><span class="arr">▸</span> 🤖 Vis AI-resonnering</div>`;
  h+=`<div class="ai-detail" id="aiHgDetail">${it.hgS.map(s=>`<div class="ai-step"><span class="ai-step-i">${s.ok?'✓':'✗'}</span><span class="ai-step-t" style="${s.ok?'':'opacity:.5'}">${s.r}${s.ok?' → <em>'+HGD.find(g=>g.id===s.h)?.ic+' '+HGD.find(g=>g.id===s.h)?.nm+'</em>':''}</span></div>`).join('')}</div>`;
  h+=`<div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:6px">${HGD.map(g=>`<button class="btn bxs ${it.hg===g.id?'bp':'bs'}" onclick="drHG('${g.id}')">${g.ic} ${g.nm}</button>`).join('')}</div>`;
  h+=`<div style="font-size:9px;color:var(--t3);margin-top:4px;font-family:'JetBrains Mono'">SAF-T: ${hg.sf} – ${hg.sfn} · MVA: ${hg.al?'25%':it.pt!==null?'S:'+hg.vi+'%/T:'+hg.vt+'%':hg.vi+'%'}${hg.al?' · 🚫 Rabattsperre':''}</div></div>`;

  // ALKOHOL
  h+=`<div class="drs"><div class="drst">🍷 Alkohol</div><div style="display:flex;gap:4px"><button class="btn bxs ${it.al?'bp':'bs'}" onclick="drE('al',true)" style="${it.al?'background:var(--alc);border-color:var(--alc)':''}">Ja</button><button class="btn bxs ${!it.al?'bp':'bs'}" onclick="drE('al',false)">Nei</button></div>${it.al?'<div style="font-size:9px;color:var(--alc);margin-top:3px">25% MVA · Rabattsperre aktiv</div>':''}</div>`;

  $('drb').innerHTML=h;
  $('drac').innerHTML=`<button class="btn bok bsm" onclick="drConf()">✓ ${it.conf?'Allerede bekreftet':'Bekreft & neste'}</button><button class="btn bs bsm" style="margin-left:auto" onclick="navDr(1)">Neste →</button>`;
}

function drE(f,v){const it=S.m.cats[S.di.ci].its[S.di.ri];it[f]=v;S.ec++;if(f==='al'||f==='d'){const r=aiHG({n:it.n,d:it.d,tp:it.tp,al:it.al,cn:it.cn});it.hg=r.res.h;it.hgC=r.res.c;it.hgS=r.s;if(f==='d'){it.aiAl=aiAl(it.n,v);it.miss=it.aiAl.filter(x=>!it.det.some(d=>d.a===x.a&&d.s==='m'));}}renDr();}
function drEP(f,v){const n=parseFloat((v||'').replace(/[^0-9.,]/g,'').replace(',','.'));S.m.cats[S.di.ci].its[S.di.ri][f]=isNaN(n)?null:n;S.ec++;renDr();}
function drTgAl(a){const it=S.m.cats[S.di.ci].its[S.di.ri];const x=it.als.indexOf(a);if(x>=0){it.als.splice(x,1);it.det=it.det.filter(d=>d.a!==a);}else{it.als.push(a);it.det.push({a,s:'manual',tr:null,c:100});}S.ec++;renDr();}
function drAccAl(){const it=S.m.cats[S.di.ci].its[S.di.ri];it.miss.forEach(d=>{if(!it.als.includes(d.a)){it.als.push(d.a);it.det.push(d);}});it.miss=[];it.iss=it.iss.filter(x=>x.f!=='al');it.st=it.iss.length?'ch':'ok';S.ec++;renDr();}
function drHG(id){const it=S.m.cats[S.di.ci].its[S.di.ri];it.hg=id;it.hgC=100;it.hgS=[{r:'Manuelt valgt',ok:true,h:id,c:100}];S.ec++;renDr();}
function drImgClear(){const it=S.m.cats[S.di.ci].its[S.di.ri];it.img=null;it.imgSt='none';S.ec++;renDr();}
function drImgUpload(){const it=S.m.cats[S.di.ci].its[S.di.ri];
  // Simulate file picker with a placeholder
  const fakeUrl='https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=200&h=200&fit=crop';
  it.img=fakeUrl;it.imgSt='found';S.ec++;renDr();}
function drImgSkip(){const it=S.m.cats[S.di.ci].its[S.di.ri];it.imgSt='none';S.ec++;renDr();}
function drConf(){const it=S.m.cats[S.di.ci].its[S.di.ri];it.conf=true;it.iss=[];it.st='ok';S.ec++;
  // Auto-navigate to next unconfirmed
  const a=its(),idx=a.indexOf(it);const next=[...a.slice(idx+1),...a.slice(0,idx)].find(i=>!i.conf);
  if(next){for(let ci=0;ci<S.m.cats.length;ci++){const ri=S.m.cats[ci].its.indexOf(next);if(ri>=0){S.di={ci,ri};renDr();return;}}}
  closeDr();}

// IMPORT FLOW
function doImport(){
  const sel=its().filter(i=>i.chk),tot=sel.length;
  if(!tot)return;
  // Show overlay
  $('impOv').classList.add('on');
  $('impFill').style.width='0%';
  let step=0;
  const steps=[
    {t:'Oppretter kategorier…',s:`${S.m.cats.length} kategorier`,p:12},
    {t:'Importerer produkter…',s:`0 av ${tot}`,p:25},
    {t:'Importerer produkter…',s:`${Math.floor(tot*.5)} av ${tot}`,p:42},
    {t:'Setter allergener…',s:`${sel.reduce((s,i)=>s+i.als.length,0)} allergener`,p:55},
    {t:'Overfører bilder…',s:`${sel.filter(i=>i.imgSt==='found').length} bilder`,p:68},
    {t:'Tilordner hovedgrupper…',s:`MVA og SAF-T koder`,p:78},
    {t:'Setter priser…',s:`Servering og takeaway`,p:88},
    {t:'Validerer…',s:`Kontrollerer data`,p:95},
    {t:'Ferdig!',s:`${tot} produkter importert`,p:100},
  ];
  (function nx(){
    if(step>=steps.length){
      setTimeout(()=>{$('impOv').classList.remove('on');showSuccess();},400);
      return;
    }
    const s=steps[step];
    $('impTxt').textContent=s.t;
    $('impSub').textContent=s.s;
    $('impFill').style.width=s.p+'%';
    step++;
    setTimeout(nx,250+Math.random()*200);
  })();
}

function showSuccess(){
  $('step3').classList.add('hidden');
  $('step4').classList.remove('hidden');
  $('sticky').classList.remove('on');
  
  const sel=its().filter(i=>i.chk);
  const tot=sel.length;
  const alcN=sel.filter(i=>i.al).length;
  const aiD=sel.reduce((s,i)=>s+i.aiAl.length,0);
  const imgOk=sel.filter(i=>i.imgSt==='found').length;
  const imgMiss=tot-imgOk;
  const grps={};sel.forEach(i=>{if(!grps[i.hg])grps[i.hg]=0;grps[i.hg]++;});
  const hgN=Object.keys(grps).length;
  const catN=new Set(sel.map(i=>i.cn)).size;
  const alN=sel.reduce((s,i)=>s+i.als.length,0);

  $('step4').innerHTML=`<div class="suc">
    <div class="suc-check"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--ok)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="30"><polyline points="20 6 9 17 4 12"/></svg></div>
    <h2 class="suc-t">Meny importert!</h2>
    <p class="suc-d">${tot} produkter fra <strong>${S.m.nm}</strong> er opprettet i Plorea med ${hgN} hovedgrupper, ${alN} allergenmerking og ${imgOk} produktbilder.${imgMiss?` ${imgMiss} produkt${imgMiss>1?'er':''} mangler bilde – du kan legge disse til senere.`:''}${alcN?` ${alcN} alkohol-produkter er flagget med rabattsperre.`:''}</p>
    
    <div class="suc-stats">
      <div class="suc-st"><div class="suc-sv" style="color:var(--ok)">${tot}</div><div class="suc-sl">Produkter</div></div>
      <div class="suc-st"><div class="suc-sv" style="color:var(--pri)">${imgOk}</div><div class="suc-sl">Med bilde</div></div>
      <div class="suc-st"><div class="suc-sv" style="color:${imgMiss?'var(--wn)':'var(--ok)'}">${imgMiss}</div><div class="suc-sl">Uten bilde</div></div>
      <div class="suc-st"><div class="suc-sv" style="color:var(--pri)">${hgN}</div><div class="suc-sl">Hovedgrupper</div></div>
      ${alcN?`<div class="suc-st"><div class="suc-sv" style="color:var(--alc)">${alcN}</div><div class="suc-sl">Alkohol</div></div>`:''}
    </div>

    <div class="suc-next">
      <h4>Neste steg</h4>
      <div class="suc-ni" onclick="alert('Navigerer til Menyoversikt…')">
        <div class="suc-ni-ico bl">📋</div>
        <div class="suc-ni-txt"><strong>Gå til menyoversikt</strong><span>Se og finjuster alle importerte produkter</span></div>
        <span class="suc-ni-arr">→</span>
      </div>
      <div class="suc-ni" onclick="alert('Navigerer til Bilder…')">
        <div class="suc-ni-ico or">📷</div>
        <div class="suc-ni-txt"><strong>Legg til produktbilder</strong><span>${imgMiss} produkt${imgMiss>1?'er':''} mangler bilde</span></div>
        <span class="suc-ni-arr">→</span>
      </div>
      <div class="suc-ni" onclick="alert('Navigerer til Tilgjengelighet…')">
        <div class="suc-ni-ico gn">🕐</div>
        <div class="suc-ni-txt"><strong>Sett tilgjengelighet</strong><span>Servering, takeaway, lunsj/middag, kanaler</span></div>
        <span class="suc-ni-arr">→</span>
      </div>
      <div class="suc-ni" onclick="alert('Navigerer til Publiser…')">
        <div class="suc-ni-ico gn">🚀</div>
        <div class="suc-ni-txt"><strong>Publiser meny</strong><span>Gjør produktene live på POS, kiosk og nettbestilling</span></div>
        <span class="suc-ni-arr">→</span>
      </div>
    </div>

    <div style="display:flex;gap:10px">
      <button class="btn bs" onclick="resetAll()">Importer flere</button>
      <button class="btn bp" onclick="alert('Navigerer til Menyoversikt…')">Gå til menyoversikt</button>
    </div>

    <div style="margin-top:24px;padding:16px 20px;background:var(--bs);border:1px solid var(--bd);border-radius:var(--rl);max-width:500px;width:100%;text-align:left;box-shadow:var(--e1)">
      <div style="font-family:Sora;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin-bottom:10px">Importert oversikt</div>
      ${Object.entries(grps).map(([hid,cnt])=>{const hg=HGD.find(g=>g.id===hid)||HGD[0];return`<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid rgba(46,44,56,.3);font-size:12px"><span style="font-size:16px">${hg.ic}</span><span style="flex:1;font-weight:500">${hg.nm}</span><span style="font-family:'JetBrains Mono';font-size:10px;color:var(--t3)">SAF-T ${hg.sf}</span><span style="font-family:'JetBrains Mono';font-size:10px;color:var(--pri)">MVA ${hg.vi}%${hg.vt!==hg.vi?'/'+hg.vt+'%':''}</span><span style="font-weight:700;min-width:24px;text-align:right">${cnt}</span></div>`;}).join('')}
    </div>
  </div>`;
}

function resetAll(){
  S={mk:null,m:null,ec:0,sr:'',af:'all',di:null,tab:'review'};
  $('step4').classList.add('hidden');
  $('step1').classList.remove('hidden');
  rS1();
}

rS1();
</script>
</body>
</html>
