// ═══════════════════════════════════════════════════════
// ANALYTICS STORE — the learning loop
// ═══════════════════════════════════════════════════════

class AnalyticsStore{
  constructor(){
    this.events=[];        // raw event log
    this.productStats={};  // aggregated per product
    this.sessionStats={impressions:0,clicks:0,ignores:0,revenue:0,orders:0};
    this.listeners=new Set();
  }

  subscribe(fn){this.listeners.add(fn);return()=>this.listeners.delete(fn);}
  notify(){this.listeners.forEach(fn=>fn());}

  _ensureProduct(id,name){
    if(!this.productStats[id]){
      this.productStats[id]={id,name,impressions:0,clicks:0,ignores:0,dwellMs:[],ctr:0,avgDwellSec:0,revenue:0,lastSeen:null,trend:0};
    }
  }

  // Track: spotlight showed this product
  trackImpression(productId,productName,context){
    this._ensureProduct(productId,productName);
    const ps=this.productStats[productId];
    ps.impressions++;
    ps.lastSeen=Date.now();
    this.sessionStats.impressions++;
    this.events.push({type:"impression",productId,productName,context,ts:Date.now()});
    this._recalc(productId);
    this.notify();
  }

  // Track: customer tapped "add"
  trackClick(productId,productName,dwellMs,context){
    this._ensureProduct(productId,productName);
    const ps=this.productStats[productId];
    ps.clicks++;
    ps.dwellMs.push(dwellMs);
    this.sessionStats.clicks++;
    this.events.push({type:"click",productId,productName,dwellMs,context,ts:Date.now()});
    this._recalc(productId);
    this.notify();
  }

  // Track: customer swiped past (ignored)
  trackIgnore(productId,productName,dwellMs,context){
    this._ensureProduct(productId,productName);
    const ps=this.productStats[productId];
    ps.ignores++;
    ps.dwellMs.push(dwellMs);
    this.sessionStats.ignores++;
    this.events.push({type:"ignore",productId,productName,dwellMs,context,ts:Date.now()});
    this._recalc(productId);
    this.notify();
  }

  // Track: item was approved and added to order
  trackConversion(productId,productName,price){
    this._ensureProduct(productId,productName);
    const ps=this.productStats[productId];
    ps.revenue+=price;
    this.sessionStats.revenue+=price;
    this.events.push({type:"conversion",productId,productName,price,ts:Date.now()});
    this.notify();
  }

  trackOrderComplete(){
    this.sessionStats.orders++;
    this.events.push({type:"order_complete",ts:Date.now()});
    this.notify();
  }

  _recalc(id){
    const ps=this.productStats[id];
    ps.ctr=ps.impressions>0?ps.clicks/ps.impressions:0;
    ps.avgDwellSec=ps.dwellMs.length>0?(ps.dwellMs.reduce((a,b)=>a+b,0)/ps.dwellMs.length/1000):0;
    // Trend: recent CTR vs overall — positive = improving
    const recent=this.events.filter(e=>e.productId===id&&Date.now()-e.ts<60000);
    const recentImps=recent.filter(e=>e.type==="impression").length;
    const recentClicks=recent.filter(e=>e.type==="click").length;
    const recentCTR=recentImps>0?recentClicks/recentImps:0;
    ps.trend=recentCTR-ps.ctr;
  }

  // AI uses this to boost/penalize products
  getLearningMultiplier(productId){
    const ps=this.productStats[productId];
    if(!ps||ps.impressions<2) return 1.0; // not enough data
    // High CTR → boost, low CTR → penalize
    let mult=1.0;
    if(ps.ctr>0.4) mult=1.6;       // very high performer
    else if(ps.ctr>0.25) mult=1.3;  // good performer
    else if(ps.ctr>0.1) mult=1.0;   // average
    else if(ps.ctr>0) mult=0.7;     // below average
    else mult=0.5;                    // never clicked
    // Short dwell = quick decision → boost
    if(ps.avgDwellSec>0&&ps.avgDwellSec<3) mult*=1.15;
    // Trending up → extra boost
    if(ps.trend>0.1) mult*=1.2;
    return mult;
  }

  getTopProducts(n=5){
    return Object.values(this.productStats)
      .filter(p=>p.impressions>0)
      .sort((a,b)=>b.ctr-a.ctr)
      .slice(0,n);
  }

  getRecentEvents(n=8){
    return this.events.slice(-n).reverse();
  }
}

const analytics=new AnalyticsStore();

function useAnalytics(){
  const[,setTick]=useState(0);
  useEffect(()=>{
    return analytics.subscribe(()=>setTick(t=>t+1));
  },[]);
  return analytics;
}

function getTimeContext(){
  const h=new Date().getHours();
  if(h>=6&&h<11)return{period:"morgen",boost:["Kaffe","Frokost"],label:"God morgen",icon:"🌅",weight:1.5};
  if(h>=11&&h<14)return{period:"lunsj",boost:["Suppe","Salat","Drikke"],label:"Lunsjtid",icon:"☀️",weight:1.2};
  if(h>=14&&h<17)return{period:"ettermiddag",boost:["Dessert","Kaffe","Snacks"],label:"Ettermiddag",icon:"🌤",weight:1.0};
  if(h>=17&&h<21)return{period:"middag",boost:["Vin","Drink","Dessert"],label:"Middagstid",icon:"🌆",weight:1.5};
  return{period:"kveld",boost:["Drink","Dessert","Vin"],label:"God kveld",icon:"🌙",weight:1.3};
}
function getWeatherContext(){return{type:"warm",temp:24,boost:["Drikke","Gelato","Salat","Iskrem"],label:"Varm dag",icon:"☀️",weight:1.8};}
function getInventoryStatus(){return{low:["p6"],out:[],promoted:["p2","p5"]};}
function getHistoryContext(){return{conversionRate:{"p7":0.34,"p1":0.28,"p2":0.25,"p4":0.22,"p5":0.20}};}

function getCartCategories(items){
  return items.map(i=>{const n=i.name.toLowerCase();
    if(n.includes("pizza"))return"Pizza";if(n.includes("pasta"))return"Pasta";
    if(n.includes("vin"))return"Vin";if(n.includes("dessert")||n.includes("tiramisù")||n.includes("gelato"))return"Dessert";
    if(n.includes("suppe"))return"Suppe";if(n.includes("burger"))return"Burger";
    if(n.includes("kaffe")||n.includes("espresso"))return"Kaffe";return null;}).filter(Boolean);
}

function computeAIScore(item,cartKeys,time,weather,inventory,history,suggestedNames){
  if(suggestedNames.has(item.name))return{score:-1,reasons:[]};
  const reasons=[];let score=0;

  let ctxHits=0;
  cartKeys.forEach(k=>{if(item.cats.includes(k)){ctxHits++;score+=5;}});
  if(ctxHits>0)reasons.push({icon:"🎯",text:`Passer til ${cartKeys.slice(0,2).join(" & ")}`,w:ctxHits*5});

  let timeHit=false;
  time.boost.forEach(b=>{if(item.cats.includes(b)||item.tag===b){score+=2*time.weight;timeHit=true;}});
  if(timeHit)reasons.push({icon:time.icon,text:time.label,w:Math.round(2*time.weight)});

  let wxHit=false;
  weather.boost.forEach(b=>{if(item.cats.includes(b)||item.tag===b||item.name.toLowerCase().includes(b.toLowerCase())){score+=2.5*weather.weight;wxHit=true;}});
  if(wxHit)reasons.push({icon:weather.icon,text:`${weather.label} (${weather.temp}°)`,w:Math.round(2.5*weather.weight)});

  if(item.pop==="fire"){score+=3;reasons.push({icon:"🔥",text:`${item.sold} bestilt i dag`,w:3});}
  else if(item.pop==="star"){score+=2;reasons.push({icon:"⭐",text:"Populær",w:2});}
  else if(item.pop==="thumb"){score+=1.5;reasons.push({icon:"👍",text:"Andre velger denne",w:1.5});}
  score+=(item.sold||0)/80;

  if(inventory.promoted.includes(item.id)){score+=3;reasons.push({icon:"👨‍🍳",text:"Kokken anbefaler",w:3});}
  if(inventory.low.includes(item.id)){score+=1;reasons.push({icon:"⏳",text:"Få igjen",w:1});}
  if(inventory.out.includes(item.id))return{score:-1,reasons:[]};

  const conv=history.conversionRate[item.id];
  if(conv&&conv>0.2){score+=conv*8;reasons.push({icon:"📊",text:`${Math.round(conv*100)}% legger til`,w:Math.round(conv*8)});}

  // ★ LEARNING MULTIPLIER from analytics
  const learnMult=analytics.getLearningMultiplier(item.id);
  if(learnMult!==1.0){
    score*=learnMult;
    if(learnMult>1.2)reasons.push({icon:"🧠",text:"AI-favoritt",w:2});
    else if(learnMult<0.8)reasons.push({icon:"📉",text:"Lav respons",w:-1});
  }

  reasons.sort((a,b)=>b.w-a.w);
  return{score,reasons:reasons.slice(0,3)};
}

function getAIRankedPromos(cartItems,allItems,suggestedNames,max){
  const cartKeys=getCartCategories(cartItems);
  const cartNameTokens=cartItems.map(c=>c.name.toLowerCase().split(" ")).flat();
  const time=getTimeContext(),weather=getWeatherContext(),inventory=getInventoryStatus(),history=getHistoryContext();

  const scored=allItems.map(item=>{
    const nameTokens=item.name.toLowerCase().split(" ");
    const isInCart=cartNameTokens.some(ct=>nameTokens.some(nt=>nt.length>3&&nt===ct));
    if(isInCart)return{...item,aiScore:-1,aiReasons:[]};
    const{score,reasons}=computeAIScore(item,cartKeys,time,weather,inventory,history,suggestedNames);
    return{...item,aiScore:score,aiReasons:reasons};
  });
  return scored.filter(i=>i.aiScore>0).sort((a,b)=>b.aiScore-a.aiScore).slice(0,max);
}

function getContextHeadline(item,cart){
  if(!item.contextLine)return item.desc;
  const cats=getCartCategories(cart);
  for(const c of cats){if(item.contextLine[c])return item.contextLine[c];}
  return item.contextLine.default||item.desc;
}

const h=React.createElement;

function AnimNum({value,suffix=""}){
  const[d,setD]=useState(value);const prev=useRef(value);
  useEffect(()=>{if(value===prev.current)return;const f=prev.current,diff=value-f;let i=0;
    const iv=setInterval(()=>{i++;setD(Math.round(f+diff*(i/14)));if(i>=14){clearInterval(iv);setD(value);}},22);
    prev.current=value;return()=>clearInterval(iv);},[value]);
  return h("span",null,d.toLocaleString("nb-NO"),suffix);
}

function TimerBar({duration,onComplete,active,accent}){
  const[p,setP]=useState(0);
  useEffect(()=>{if(!active){setP(0);return;}const s=Date.now();

        h("span",{style:{fontSize:"15px",fontWeight:800,color:T.text}},"plorea"),
        h("span",{style:{fontSize:"10px",color:T.textMuted,background:T.surfaceAlt,padding:"3px 9px",borderRadius:"5px",fontWeight:500}},"CFD v8 · AI Analytics Loop"),
        h("button",{onClick:()=>setMode(mode==="idle"?"active":"idle"),style:{padding:"4px 10px",borderRadius:"6px",border:`1px solid ${T.border}`,color:T.textMuted,fontSize:"10px",fontWeight:600}},mode==="idle"?"⏸ Idle":"▶ Aktiv")),
