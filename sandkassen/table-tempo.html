<!DOCTYPE html>
<html lang="nb">
<head>

<title>Table Tempo — Plorea</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Sora:wght@400;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg-page:#F7F8FA;--surface:#FFFFFF;--surface-hover:#F1F5F9;--overlay:rgba(0,0,0,0.48);--text-primary:#1A1A1A;--text-secondary:#666666;--text-muted:#C4C4C4;--primary:#6BB8DA;--accent:#2E6B87;--secondary:#468DAC;--border:#E9E9E9;--border-strong:#D9D9D9;--success:#6BDAB2;--success-bg:#E8F7F1;--warning:#DADA6B;--warning-bg:#F7F7E0;--error:#DA6B6B;--error-bg:#FAEAEA;--info-bg:#EBF6FB;--selection-bg:#EBF6FB;--selection-border:#99D2E8;--sidebar-bg:#1A1825;--sidebar-border:#2E2C38;--channel-table-bg:#362F4A;--el-1:0 1px 4px rgba(0,0,0,0.07),0 0 0 1px rgba(0,0,0,0.04);--el-2:0 4px 16px rgba(0,0,0,0.08),0 0 0 1px rgba(0,0,0,0.04);--el-3:0 12px 40px rgba(0,0,0,0.12),0 0 0 1px rgba(0,0,0,0.04);--r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:20px;--r-full:9999px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',-apple-system,sans-serif;font-size:15px;line-height:1.6;color:var(--text-primary);background:var(--bg-page);-webkit-font-smoothing:antialiased;overflow:hidden;height:100vh}
.mono{font-family:'JetBrains Mono',monospace}.sora{font-family:'Sora',sans-serif}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:translateX(0)}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:99px}
button{font-family:inherit;cursor:pointer}button:hover{filter:brightness(1.06)}
input::placeholder{color:var(--text-muted)}input:focus{outline:none;box-shadow:0 0 0 3px rgba(107,184,218,0.30)}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:220px;background:var(--sidebar-bg);display:flex;flex-direction:column;border-right:1px solid var(--sidebar-border);z-index:50}
.sidebar-logo{padding:24px 20px 18px;border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0}
.sidebar-logo .wordmark{font-family:'Sora',sans-serif;font-size:15px;font-weight:700;color:#fff}
.sidebar-logo .wordmark span{color:var(--primary)}
.sidebar-logo .sub{font-size:10px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.28);margin-top:3px}
.live-badge{display:inline-block;margin-top:8px;background:rgba(107,184,218,0.15);border:1px solid rgba(107,184,218,0.25);border-radius:99px;padding:2px 8px;font-size:10px;font-weight:600;color:var(--primary)}
.sidebar-inner{overflow-y:auto;flex:1;padding-bottom:16px}.sidebar-inner::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1)}
.nav-group{margin-bottom:4px}
.nav-group-label{font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.22);padding:14px 20px 4px}
.nav-link{display:flex;align-items:center;gap:8px;padding:7px 20px;font-size:12.5px;font-weight:400;color:rgba(255,255,255,0.48);text-decoration:none;cursor:pointer;border-left:2px solid transparent;transition:color 100ms,background 100ms}
.nav-link:hover{color:rgba(255,255,255,0.82);background:rgba(255,255,255,0.04)}
.nav-link.active{color:var(--primary);border-left-color:var(--primary);background:rgba(107,184,218,0.06);font-weight:500}
.nav-link .dot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:0.5;flex-shrink:0}
.sidebar-footer{padding:12px 20px;border-top:1px solid rgba(255,255,255,0.07)}
.main{margin-left:220px;height:100vh;display:flex;flex-direction:column}
.top-bar{padding:14px 28px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--surface);flex-shrink:0}
.eyebrow{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--secondary)}
.eyebrow::before{content:'';display:block;width:16px;height:2px;background:var(--primary);border-radius:99px}
.meta-tag{display:inline-flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-full);padding:4px 10px;font-size:11px;font-weight:500;color:var(--text-secondary);box-shadow:var(--el-1)}
.meta-tag .pip{width:6px;height:6px;border-radius:50%}
.content-area{flex:1;overflow-y:auto;padding:16px 24px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--el-1)}
.card-label{font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted)}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:var(--r-full)}
.badge .pip{width:5px;height:5px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel" data-type="module">
const {useState,useEffect,useCallback,useRef}=React;
const PHASES=[{id:"arrival",label:"Ankomst",icon:"→",color:"#6BB8DA",targetMin:2},{id:"seated",label:"Plassert",icon:"◉",color:"#468DAC",targetMin:3},{id:"ordered",label:"Bestilt",icon:"📋",color:"#2E6B87",targetMin:5},{id:"appetizer",label:"Forrett",icon:"🥗",color:"#C4A82B",targetMin:15},{id:"main",label:"Hovedrett",icon:"🍽",color:"#DA946B",targetMin:25},{id:"dessert",label:"Dessert",icon:"🍰",color:"#B8A8D4",targetMin:15},{id:"bill",label:"Regning",icon:"💳",color:"#6BDAB2",targetMin:5},{id:"clearing",label:"Rydding",icon:"✓",color:"#9B98A8",targetMin:5}];
const ZONES={bar:{label:"Baren",color:"#6BB8DA"},vindu:{label:"Vindu",color:"#468DAC"},hoved:{label:"Hovedsal",color:"#DA946B"},terrasse:{label:"Terrasse",color:"#6BDAB2"},privat:{label:"Privat",color:"#B8A8D4"}};
const SERVERS=[{id:"erik",name:"Erik",color:"#6BB8DA"},{id:"marie",name:"Marie",color:"#B8A8D4"},{id:"jonas",name:"Jonas",color:"#6BDAB2"},{id:"sofia",name:"Sofia",color:"#DA946B"}];
const TCOL={fast:"#6BB8DA",good:"#6BDAB2",slow:"#C4A82B",critical:"#DA6B6B"};
const TBG={fast:"#EBF6FB",good:"#E8F7F1",slow:"#F7F7E0",critical:"#FAEAEA"};
const TTXT={fast:"#2E6B87",good:"#1A6B4A",slow:"#5C5C00",critical:"#8B2020"};

function gp(now,idx,durs){const p=[];let t=now;for(let i=durs.length-1;i>=0;i--)t-=durs[i]*60000;for(let i=0;i<durs.length;i++){p.push({phaseIdx:i,start:t,duration:durs[i]*60000});t+=durs[i]*60000;}return p;}
function initTables(){const n=Date.now();return[
{id:1,name:"B1",zone:"bar",seats:4,guests:2,phaseIdx:4,phaseStart:n-18*60000,phases:gp(n,4,[2,3,6,20,18]),vip:false,note:"",snooze:0,server:"erik",orderValue:890,ticketAge:18,kitchen:"cooking",allergies:"",x:8,y:12,w:8,h:8,shape:"round"},
{id:2,name:"B2",zone:"bar",seats:4,guests:4,phaseIdx:2,phaseStart:n-4*60000,phases:gp(n,2,[1,2,4]),vip:false,note:"",snooze:0,server:"marie",orderValue:0,ticketAge:0,kitchen:"waiting",allergies:"",x:20,y:12,w:9,h:6,shape:"rect"},
{id:3,name:"B3",zone:"bar",seats:4,guests:0,phaseIdx:-1,phaseStart:n,phases:[],vip:false,note:"",snooze:0,server:"",orderValue:0,ticketAge:0,kitchen:"",allergies:"",x:8,y:24,w:8,h:8,shape:"round"},
{id:4,name:"V1",zone:"vindu",seats:4,guests:2,phaseIdx:5,phaseStart:n-8*60000,phases:gp(n,5,[2,4,7,22,30,8]),vip:true,note:"Jubileum",snooze:0,server:"jonas",orderValue:2450,ticketAge:0,kitchen:"done",allergies:"",x:36,y:4,w:9,h:6,shape:"rect"},
{id:5,name:"V2",zone:"vindu",seats:6,guests:5,phaseIdx:3,phaseStart:n-12*60000,phases:gp(n,3,[1,3,5,12]),vip:false,note:"",snooze:0,server:"sofia",orderValue:1680,ticketAge:12,kitchen:"cooking",allergies:"Laktose",x:48,y:4,w:11,h:6,shape:"rect"},
{id:6,name:"V3",zone:"vindu",seats:4,guests:0,phaseIdx:-1,phaseStart:n,phases:[],vip:false,note:"",snooze:0,server:"",orderValue:0,ticketAge:0,kitchen:"",allergies:"",x:62,y:4,w:9,h:6,shape:"rect"},
{id:7,name:"H1",zone:"hoved",seats:6,guests:6,phaseIdx:6,phaseStart:n-2*60000,phases:gp(n,6,[2,3,8,18,28,12,2]),vip:false,note:"",snooze:0,server:"erik",orderValue:3200,ticketAge:0,kitchen:"done",allergies:"",x:36,y:18,w:11,h:6,shape:"rect"},
{id:8,name:"H2",zone:"hoved",seats:8,guests:7,phaseIdx:4,phaseStart:n-32*60000,phases:gp(n,4,[3,5,9,25,32]),vip:true,note:"Firmamiddag",snooze:0,server:"marie",orderValue:4800,ticketAge:32,kitchen:"delayed",allergies:"Nøtter",x:50,y:18,w:13,h:7,shape:"rect"},
{id:9,name:"H3",zone:"hoved",seats:6,guests:4,phaseIdx:1,phaseStart:n-6*60000,phases:gp(n,1,[2,6]),vip:false,note:"",snooze:0,server:"jonas",orderValue:0,ticketAge:0,kitchen:"waiting",allergies:"",x:36,y:30,w:10,h:10,shape:"round"},
{id:10,name:"H4",zone:"hoved",seats:6,guests:0,phaseIdx:-1,phaseStart:n,phases:[],vip:false,note:"",snooze:0,server:"",orderValue:0,ticketAge:0,kitchen:"",allergies:"",x:50,y:30,w:11,h:6,shape:"rect"},
{id:11,name:"H5",zone:"hoved",seats:4,guests:3,phaseIdx:3,phaseStart:n-20*60000,phases:gp(n,3,[1,2,4,20]),vip:false,note:"Venter på gjest",snooze:0,server:"sofia",orderValue:1120,ticketAge:20,kitchen:"delayed",allergies:"",x:65,y:18,w:8,h:8,shape:"round"},
{id:12,name:"T1",zone:"terrasse",seats:4,guests:2,phaseIdx:5,phaseStart:n-10*60000,phases:gp(n,5,[1,3,6,16,22,10]),vip:false,note:"",snooze:0,server:"erik",orderValue:1560,ticketAge:0,kitchen:"done",allergies:"",x:80,y:6,w:8,h:8,shape:"round"},
{id:13,name:"T2",zone:"terrasse",seats:4,guests:3,phaseIdx:2,phaseStart:n-8*60000,phases:gp(n,2,[2,4,8]),vip:false,note:"",snooze:0,server:"jonas",orderValue:0,ticketAge:0,kitchen:"waiting",allergies:"",x:80,y:18,w:9,h:6,shape:"rect"},
{id:14,name:"T3",zone:"terrasse",seats:6,guests:0,phaseIdx:-1,phaseStart:n,phases:[],vip:false,note:"",snooze:0,server:"",orderValue:0,ticketAge:0,kitchen:"",allergies:"",x:80,y:30,w:10,h:10,shape:"round"},
{id:15,name:"P1",zone:"privat",seats:8,guests:8,phaseIdx:3,phaseStart:n-28*60000,phases:gp(n,3,[5,8,12,28]),vip:true,note:"Firmamiddag — forhåndsbestilt",snooze:0,server:"marie",orderValue:6400,ticketAge:28,kitchen:"cooking",allergies:"Gluten, Skalldyr",x:36,y:44,w:14,h:7,shape:"rect"},
{id:16,name:"P2",zone:"privat",seats:6,guests:0,phaseIdx:-1,phaseStart:n,phases:[],vip:false,note:"Reservert 20:30",snooze:0,server:"",orderValue:0,ticketAge:0,kitchen:"",allergies:"",x:54,y:44,w:11,h:6,shape:"rect"},
];}
const elMin=s=>Math.max(0,(Date.now()-s)/60000);
const fmtT=ms=>new Date(ms).toLocaleTimeString("nb-NO",{hour:"2-digit",minute:"2-digit"});
const fmtKr=v=>v.toLocaleString("nb-NO")+" kr";
function getTempo(t){if(t.phaseIdx<0)return null;const r=elMin(t.phaseStart)/PHASES[t.phaseIdx].targetMin;if(r<=0.7)return{level:"fast",score:r,label:"Rask"};if(r<=1.1)return{level:"good",score:r,label:"I rute"};if(r<=1.5)return{level:"slow",score:r,label:"Treg"};return{level:"critical",score:r,label:"Kritisk"};}
function predictFree(t){if(t.phaseIdx<0)return 0;return Math.round(Math.max(0,PHASES[t.phaseIdx].targetMin-elMin(t.phaseStart))+PHASES.slice(t.phaseIdx+1).reduce((s,p)=>s+p.targetMin,0));}

function getCauses(t,all){if(t.phaseIdx<0)return null;const tp=getTempo(t);if(!tp||tp.level==="fast"||tp.level==="good")return null;const ph=PHASES[t.phaseIdx],el=Math.round(elMin(t.phaseStart)),c=[];
if(["appetizer","main","dessert"].includes(ph.id)){if(t.kitchen==="delayed")c.push({f:"Kjøkken forsinket",p:72,i:"🔥"});else if(t.kitchen==="cooking"&&t.ticketAge>ph.targetMin*.8)c.push({f:"Ticket age høy",p:58,i:"🎫"});const kl=all.filter(x=>x.phaseIdx>=0&&["cooking","delayed"].includes(x.kitchen)).length;if(kl>=5)c.push({f:`Kjøkken backlog (${kl})`,p:64,i:"📦"});}
const srv=SERVERS.find(s=>s.id===t.server);if(srv){const sl=all.filter(x=>x.server===t.server&&x.phaseIdx>=0).length;if(sl>=4)c.push({f:`${srv.name} har ${sl} bord`,p:45,i:"🏃"});}
if(ph.id==="seated"&&el>ph.targetMin)c.push({f:"Meny ikke levert",p:70,i:"📋"});
if(ph.id==="bill"&&el>ph.targetMin)c.push({f:"Regning ikke levert",p:80,i:"💳"});
if(el>ph.targetMin*1.8&&c.length<2)c.push({f:"Gjester bruker tid",p:30,i:"💬"});
return c.length?c.sort((a,b)=>b.p-a.p):null;}

function getActions(t,all){if(t.phaseIdx<0)return[];const ph=PHASES[t.phaseIdx],tp=getTempo(t),el=Math.round(elMin(t.phaseStart)),a=[];
if(ph.id==="seated"&&el>3)a.push({type:"service",label:"Send servitør for bestilling",pr:"high",icon:"📋"});
if(ph.id==="ordered"&&el>4)a.push({type:"kitchen",label:"Bekreft ticket i kjøkken",pr:"high",icon:"🔔"});
if(["appetizer","main"].includes(ph.id)&&t.kitchen==="delayed"){a.push({type:"kitchen",label:"Prioriter ticket",pr:"critical",icon:"🔥"});a.push({type:"service",label:"Informer gjester",pr:"high",icon:"💬"});}
if(["appetizer","main"].includes(ph.id)&&el>ph.targetMin*.7&&t.kitchen==="cooking")a.push({type:"kitchen",label:"Sjekk ticket-status",pr:"medium",icon:"🎫"});
if(ph.id==="main"&&el>ph.targetMin*.8)a.push({type:"upsell",label:"Forbered dessertmeny",pr:"medium",icon:"🍰"});
if(ph.id==="dessert"&&el>ph.targetMin*.6)a.push({type:"upsell",label:"Tilby kaffe / digestif",pr:"low",icon:"☕"});
if(ph.id==="dessert"&&el>ph.targetMin)a.push({type:"service",label:"Spør om regning",pr:"medium",icon:"💳"});
if(ph.id==="bill"&&el>3)a.push({type:"service",label:"Lever regning / terminal",pr:"high",icon:"💳"});
if(ph.id==="bill"&&el>5&&all.filter(x=>x.phaseIdx<0).length<=2)a.push({type:"seating",label:"Blokkerer seating — prioriter",pr:"critical",icon:"🪑"});
if(ph.id==="clearing")a.push({type:"service",label:"Send runner for rydding",pr:"high",icon:"🧹"});
if(tp&&tp.level==="good"&&ph.id==="main"){a.push({type:"upsell",label:"Tilby dessert",pr:"low",icon:"🍰"});a.push({type:"upsell",label:"Tilby digestif",pr:"low",icon:"🥃"});}
const po={critical:0,high:1,medium:2,low:3};return a.sort((x,y)=>po[x.pr]-po[y.pr]);}

function getPriority(t,all){if(t.phaseIdx<0)return{score:0,reasons:[]};const tp=getTempo(t);if(!tp)return{score:0,reasons:[]};let s=0;const r=[];
if(tp.level==="critical"){s+=40;r.push("Kritisk");}else if(tp.level==="slow"){s+=20;r.push("Treg");}
if(t.vip){s+=15;r.push("VIP");}s+=t.guests*2;if(t.guests>=6)r.push(`${t.guests}g`);
if(all.filter(x=>x.phaseIdx<0).length<=2&&["bill","clearing"].includes(PHASES[t.phaseIdx].id)){s+=25;r.push("Blokkerer seating");}
if(t.orderValue>3000){s+=10;r.push("Høy verdi");}if(t.kitchen==="delayed"){s+=15;r.push("Kjøkken");}return{score:s,reasons:r};}

function getCopilot(tables){const occ=tables.filter(t=>t.phaseIdx>=0),free=tables.filter(t=>t.phaseIdx<0),ins=[];
const del=occ.filter(t=>t.kitchen==="delayed"),kitA=occ.filter(t=>["cooking","delayed"].includes(t.kitchen));
if(del.length>=2)ins.push({type:"critical",icon:"🔥",title:"Kjøkken overbelastet",desc:`${del.length} tickets forsinket, ${kitA.length} aktive`,actions:["Sett pause på nye tickets","Prioriter VIP-bord"]});
if(free.length<=1){const preds=occ.map(t=>({t,f:predictFree(t)})).sort((a,b)=>a.f-b.f);const eta=preds[0]?preds[0].f:15;ins.push({type:"warning",icon:"🪑",title:"Høyt seatinpress",desc:`${free.length} ledige. Neste: ~${eta}m`,actions:[`Pause walk-ins ${eta}m`,"Prioriter rydding"]});}
const dr=occ.filter(t=>PHASES[t.phaseIdx].id==="main"&&elMin(t.phaseStart)>PHASES[t.phaseIdx].targetMin*.7);
if(dr.length>0)ins.push({type:"opportunity",icon:"💰",title:`${dr.length} bord klare for dessert`,desc:dr.map(t=>t.name).join(", "),actions:dr.map(t=>`Dessertmeny til ${t.name}`)});
SERVERS.forEach(srv=>{const l=occ.filter(t=>t.server===srv.id).length;if(l>=5)ins.push({type:"warning",icon:"🏃",title:`${srv.name} overbelastet`,desc:`${l} aktive bord`,actions:["Omfordel bord","Send runner"]});});
const bw=occ.filter(t=>PHASES[t.phaseIdx].id==="bill"&&elMin(t.phaseStart)>5);
if(bw.length>0)ins.push({type:"warning",icon:"💳",title:`${bw.length} venter på regning`,desc:bw.map(t=>t.name).join(", "),actions:bw.map(t=>`Regning til ${t.name}`)});
const po={critical:0,warning:1,opportunity:2};return ins.sort((a,b)=>po[a.type]-po[b.type]);}

// ═══ UI ═══
function TempoBadge({tp}){if(!tp)return <span style={{fontSize:11,color:"var(--text-muted)"}}>Ledig</span>;return <span className="badge" style={{background:TBG[tp.level],color:TTXT[tp.level]}}><span className="pip" style={{background:TCOL[tp.level]}}/>{tp.label}</span>;}
function PhasePill({idx,sm}){if(idx<0)return <span style={{color:"var(--text-muted)",fontSize:sm?10:12}}>—</span>;const p=PHASES[idx];return <span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:sm?10:12,fontWeight:500,color:p.color}}><span style={{fontSize:sm?11:13}}>{p.icon}</span>{p.label}</span>;}
function ActionTag({action:a}){const c={critical:"var(--error)",high:"#C4A82B",medium:"var(--secondary)",low:"var(--text-secondary)"};const b={critical:"var(--error-bg)",high:"var(--warning-bg)",medium:"var(--info-bg)",low:"var(--surface-hover)"};return <div style={{display:"flex",alignItems:"center",gap:6,padding:"4px 8px",background:b[a.pr],borderRadius:"var(--r-sm)",fontSize:10,borderLeft:`2px solid ${c[a.pr]}`}}><span>{a.icon}</span><span style={{flex:1,color:"var(--text-primary)",fontWeight:500}}>{a.label}</span><span style={{fontSize:8,fontWeight:700,color:c[a.pr],textTransform:"uppercase",letterSpacing:".06em"}}>{a.type}</span></div>;}

function StatsBar({tables}){
  const occ=tables.filter(t=>t.phaseIdx>=0),free=tables.filter(t=>t.phaseIdx<0);
  const ts=occ.map(t=>getTempo(t)).filter(Boolean),crits=ts.filter(t=>t.level==="critical").length,slows=ts.filter(t=>t.level==="slow").length;
  const svc=crits>=2?"red":(crits>=1||slows>=3)?"yellow":"green";
  const svcD={red:{bg:"var(--error-bg)",c:"#8B2020",l:"Kritisk"},yellow:{bg:"var(--warning-bg)",c:"#5C5C00",l:"Presset"},green:{bg:"var(--success-bg)",c:"#1A6B4A",l:"God flyt"}};
  const del=occ.filter(t=>t.kitchen==="delayed").length;
  const bn=del>=2?{l:"Kjøkken",c:"var(--error)"}:slows>=3?{l:"Service",c:"#C4A82B"}:{l:"Ingen",c:"var(--success)"};
  const pr=free.length<=1?{l:"Høy",c:"var(--error)"}:free.length<=3?{l:"Medium",c:"#C4A82B"}:{l:"Lav",c:"var(--success)"};
  const riskTables=occ.filter(t=>{const tp=getTempo(t);return tp&&(tp.level==="slow"||tp.level==="critical");});

    <div style={{marginBottom:8}}><div className="card-label" style={{marginBottom:2}}>Notat</div><div style={{display:"flex",gap:3}}><input value={ni} onChange={e=>setNi(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")onNote(table.id,ni)}} placeholder="Legg til notat..." style={{flex:1,background:"var(--surface-hover)",border:"1px solid var(--border)",borderRadius:"var(--r-sm)",padding:"4px 8px",color:"var(--text-primary)",fontSize:10,fontFamily:"'Plus Jakarta Sans',sans-serif"}}/><button onClick={()=>onNote(table.id,ni)} style={{background:"var(--info-bg)",border:"1px solid var(--selection-border)",borderRadius:"var(--r-sm)",padding:"3px 10px",color:"var(--accent)",fontSize:9,fontWeight:600}}>Lagre</button></div></div>
    {occ&&<div><div className="card-label" style={{marginBottom:5}}>Tidslinje</div><div style={{position:"relative",paddingLeft:18}}><div style={{position:"absolute",left:5,top:3,bottom:3,width:1,background:"var(--border)"}}/>
      {table.phases.map((p,i)=>{const ph=PHASES[p.phaseIdx],dur=Math.round(p.duration/60000),over=dur>ph.targetMin*1.3,cur=p.phaseIdx===table.phaseIdx;return <div key={i} style={{marginBottom:8,position:"relative"}}><div style={{position:"absolute",left:-14,top:3,width:8,height:8,borderRadius:"50%",background:cur?ph.color:"var(--surface-hover)",border:`2px solid ${ph.color}`,boxShadow:cur?`0 0 5px ${ph.color}40`:"none"}}/><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:11,fontWeight:cur?700:500,color:cur?"var(--text-primary)":"var(--text-secondary)"}}>{ph.icon} {ph.label}</span><span className="mono" style={{fontSize:9,color:over?"var(--error)":cur?ph.color:"var(--text-muted)"}}>{dur}m{over?` (+${dur-ph.targetMin}m)`:""}</span></div><div style={{marginTop:2,height:3,background:"var(--surface-hover)",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.min(100,(dur/ph.targetMin)*100)}%`,background:over?`linear-gradient(90deg,${ph.color},var(--error))`:ph.color,borderRadius:2}}/></div></div>;})}
    </div></div>}
  </div>;
}

function TableCard({table,selected,onClick}){const tp=getTempo(table),occ=table.phaseIdx>=0,el=occ?Math.round(elMin(table.phaseStart)):0,al=tp&&(tp.level==="slow"||tp.level==="critical"),srv=SERVERS.find(s=>s.id===table.server);
  return <div onClick={onClick} className="card" style={{padding:"10px 14px",cursor:"pointer",borderColor:selected?"var(--selection-border)":al?TCOL[tp.level]+"50":undefined,boxShadow:selected?"0 0 0 3px rgba(107,184,218,0.30)":al?`inset 3px 0 0 ${TCOL[tp.level]}`:"var(--el-1)",transition:"all 160ms"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}><div style={{display:"flex",alignItems:"center",gap:5}}><span className="mono" style={{fontSize:13,fontWeight:700,color:occ?"var(--text-primary)":"var(--text-muted)"}}>{table.name}</span>{table.vip&&<span style={{fontSize:7,fontWeight:700,color:"#fff",background:"var(--channel-table-bg)",padding:"1px 5px",borderRadius:"var(--r-full)"}}>VIP</span>}</div><TempoBadge tp={tp}/></div>
    {occ?<><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}><PhasePill idx={table.phaseIdx} sm/><span className="mono" style={{fontSize:9,color:"var(--text-secondary)"}}>{el}m/{PHASES[table.phaseIdx].targetMin}m</span></div>
      <div style={{display:"flex",gap:1,height:3,borderRadius:2,overflow:"hidden",marginBottom:4}}>{table.phases.map((p,i)=>{const ph=PHASES[p.phaseIdx],dur=p.duration/60000,over=dur>ph.targetMin*1.3,cur=p.phaseIdx===table.phaseIdx;return <div key={i} style={{flex:Math.max(dur,.5),background:over?"var(--error)":ph.color,opacity:cur?1:.4,borderRadius:1}}/>;})}</div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"var(--text-secondary)"}}><span>{table.guests}g · {srv?srv.name:"—"}</span>{table.orderValue>0&&<span className="mono" style={{color:"var(--success)"}}>{fmtKr(table.orderValue)}</span>}</div>
    </>:<div style={{fontSize:10,color:"var(--text-muted)",marginTop:2}}>{table.note||`${table.seats}p · Ledig`}</div>}
  </div>;
}

function EveningSummary({tables,onClose}){const occ=tables.filter(t=>t.phaseIdx>=0),guests=tables.reduce((s,t)=>s+t.guests,0),avgC=occ.length?Math.round(occ.reduce((s,t)=>s+t.phases.reduce((a,p)=>a+p.duration/60000,0),0)/occ.length):0;const deadM=occ.reduce((sum,t)=>sum+t.phases.reduce((s,p)=>{const ph=PHASES[p.phaseIdx];return s+Math.max(0,p.duration/60000-ph.targetMin)},0),0);const totalRev=occ.reduce((s,t)=>s+t.orderValue,0),lost=Math.round((deadM/60)*450*(guests/Math.max(occ.length,1)));const best=occ.length>0?occ.reduce((b,t)=>t.orderValue>b.orderValue?t:b,occ[0]):null;
  const srvS=SERVERS.map(sv=>{const st=occ.filter(t=>t.server===sv.id),tm=st.reduce((s,t)=>s+t.phases.reduce((a,p)=>a+p.duration/60000,0),0),rv=st.reduce((s,t)=>s+t.orderValue,0);return{...sv,tables:st.length,guests:st.reduce((s,t)=>s+t.guests,0),avg:st.length?Math.round(tm/st.length):0,rev:rv};}).sort((a,b)=>b.rev-a.rev);
  const phS=PHASES.map((ph,idx)=>{const ds=[];occ.forEach(t=>{const p=t.phases.find(p=>p.phaseIdx===idx);if(p)ds.push(p.duration/60000)});const av=ds.length?ds.reduce((a,b)=>a+b,0)/ds.length:0;return{...ph,idx,avg:Math.round(av*10)/10,oc:ds.filter(d=>d>ph.targetMin*1.2).length,tot:ds.length}});
  const worst=phS.filter(p=>p.tot>0).reduce((w,p)=>p.avg/p.targetMin>w.avg/w.targetMin?p:w,phS[0]);
  return <div onClick={onClose} style={{position:"fixed",inset:0,background:"var(--overlay)",backdropFilter:"blur(8px)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",animation:"fadeIn .3s ease"}}><div onClick={e=>e.stopPropagation()} style={{background:"var(--bg-page)",borderRadius:"var(--r-xl)",border:"1px solid var(--border)",width:720,maxHeight:"88vh",overflow:"auto",padding:28,boxShadow:"var(--el-3)"}}>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:20}}><div><div className="sora" style={{fontSize:20,fontWeight:700}}>Kveldsoversikt</div><div style={{fontSize:11,color:"var(--text-secondary)",marginTop:2}}>{new Date().toLocaleDateString("nb-NO",{weekday:"long",day:"numeric",month:"long"})}</div></div><button onClick={onClose} style={{background:"none",border:"none",color:"var(--text-muted)",fontSize:20}}>✕</button></div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8,marginBottom:20}}>{[{l:"Gjester",v:guests,c:"var(--accent)"},{l:"Omsetning",v:fmtKr(totalRev),c:"var(--success)"},{l:"Snitt syklus",v:`${avgC}m`,c:"var(--secondary)"},{l:"Dead time",v:`${Math.round(deadM)}m`,c:deadM>30?"var(--error)":"#C4A82B"},{l:"Tapt potential",v:fmtKr(lost),c:lost>2000?"var(--error)":"#C4A82B"}].map((k,i)=><div key={i} className="card" style={{padding:"10px 8px",textAlign:"center"}}><div className="mono" style={{fontSize:16,fontWeight:700,color:k.c}}>{k.v}</div><div className="card-label" style={{marginTop:2}}>{k.l}</div></div>)}</div>
    <div style={{marginBottom:20}}><div className="card-label" style={{marginBottom:8}}>Servitør-ytelse</div><div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>{srvS.map(s=><div key={s.id} className="card" style={{padding:"10px 12px"}}><div style={{display:"flex",alignItems:"center",gap:4,marginBottom:4}}><span style={{width:8,height:8,borderRadius:"50%",background:s.color}}/><span style={{fontSize:12,fontWeight:700}}>{s.name}</span></div><div style={{fontSize:10,color:"var(--text-secondary)",lineHeight:1.6}}>{s.tables} bord · {s.guests}g<br/>Snitt: {s.avg}m · <span className="mono" style={{color:"var(--success)",fontWeight:600}}>{fmtKr(s.rev)}</span></div></div>)}</div></div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
      {best&&<div style={{background:"var(--success-bg)",borderRadius:"var(--r-md)",padding:"12px 14px",borderLeft:"3px solid var(--success)"}}><div style={{fontSize:9,fontWeight:700,letterSpacing:".12em",textTransform:"uppercase",color:"#1A6B4A",marginBottom:4}}>Beste bord</div><div style={{fontSize:14,fontWeight:700}}>{best.name} — {fmtKr(best.orderValue)}</div><div style={{fontSize:10,color:"var(--text-secondary)"}}>{best.guests}g · {SERVERS.find(s=>s.id===best.server)?.name||"—"}</div></div>}
      <div style={{background:"var(--error-bg)",borderRadius:"var(--r-md)",padding:"12px 14px",borderLeft:"3px solid var(--error)"}}><div style={{fontSize:9,fontWeight:700,letterSpacing:".12em",textTransform:"uppercase",color:"#8B2020",marginBottom:4}}>Flaskehals</div><div style={{fontSize:14,fontWeight:700}}>{worst.label} — snitt {worst.avg}m</div><div style={{fontSize:10,color:"var(--text-secondary)"}}>Mål: {worst.targetMin}m · {worst.oc} over</div></div>
    </div>
    <div style={{marginBottom:20}}><div className="card-label" style={{marginBottom:8}}>Faseanalyse</div><div style={{display:"flex",flexDirection:"column",gap:3}}>{phS.filter(p=>p.tot>0).map(p=>{const r=p.avg/p.targetMin,isW=p.idx===worst.idx;return <div key={p.idx} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 12px",background:isW?"var(--error-bg)":"var(--surface)",borderRadius:"var(--r-sm)",border:`1px solid ${isW?"#DA6B6B40":"var(--border)"}`,borderLeft:isW?"3px solid var(--error)":"3px solid transparent"}}><span style={{fontSize:13,width:20}}>{p.icon}</span><span style={{fontSize:11,fontWeight:600,flex:1}}>{p.label}</span><div style={{width:80,height:4,background:"var(--surface-hover)",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.min(r*100,100)}%`,background:r>1.3?`linear-gradient(90deg,${p.color},var(--error))`:p.color,borderRadius:2}}/></div><span className="mono" style={{fontSize:9,color:r>1.2?"var(--error)":"var(--text-secondary)",minWidth:50,textAlign:"right"}}>{p.avg}m/{p.targetMin}m</span></div>;})}</div></div>
    <div style={{background:"var(--selection-bg)",borderRadius:"var(--r-md)",padding:"14px 16px",borderLeft:"3px solid var(--primary)"}}><div style={{fontSize:9,fontWeight:700,letterSpacing:".14em",textTransform:"uppercase",color:"var(--accent)",marginBottom:6}}>Anbefalinger for i morgen</div><div style={{display:"flex",flexDirection:"column",gap:4,fontSize:11,color:"var(--text-secondary)",lineHeight:1.5}}>
      <div style={{display:"flex",gap:6}}><span style={{color:"var(--accent)",fontWeight:700}}>1.</span><span><b style={{color:"var(--text-primary)"}}>Kjøkken:</b> {worst.label} er konsekvent treg — forsterke stasjon eller endre prep.</span></div>
      <div style={{display:"flex",gap:6}}><span style={{color:"var(--accent)",fontWeight:700}}>2.</span><span><b style={{color:"var(--text-primary)"}}>Service:</b> {Math.round(deadM)}m dead time — innfør proaktiv dessert-/regningsspørring.</span></div>
      <div style={{display:"flex",gap:6}}><span style={{color:"var(--accent)",fontWeight:700}}>3.</span><span><b style={{color:"var(--text-primary)"}}>Omsetning:</b> {fmtKr(lost)} tapt — målrett upsell dessert og digestif.</span></div>
    </div></div>
  </div></div>;
}

// ═══ APP ═══
function App(){
  const [tables,setTables]=useState(initTables);const [selectedId,setSelectedId]=useState(null);const [now,setNow]=useState(Date.now());const [zone,setZone]=useState("all");const [view,setView]=useState("floor");const [showSummary,setShowSummary]=useState(false);const [soundOn,setSoundOn]=useState(true);const lastAlertRef=useRef(new Set());const audioRef=useRef(null);
  useEffect(()=>{const iv=setInterval(()=>{setNow(Date.now());setTables(p=>p.map(t=>{if(t.phaseIdx<0||!t.phases.length)return t;const l=t.phases[t.phases.length-1];return{...t,phases:[...t.phases.slice(0,-1),{...l,duration:Date.now()-l.start}]};}));},1000);return()=>clearInterval(iv);},[]);
  useEffect(()=>{if(!soundOn)return;const crits=tables.filter(t=>{const tp=getTempo(t);return tp&&tp.level==="critical"&&t.snooze<Date.now();});const nw=crits.filter(t=>!lastAlertRef.current.has(t.id));if(nw.length>0){try{if(!audioRef.current)audioRef.current=new(window.AudioContext||window.webkitAudioContext)();const c=audioRef.current,o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.setValueAtTime(880,c.currentTime);o.frequency.setValueAtTime(660,c.currentTime+.1);g.gain.setValueAtTime(.06,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.3);o.start(c.currentTime);o.stop(c.currentTime+.3);}catch(e){}}lastAlertRef.current=new Set(crits.map(t=>t.id));},[tables,soundOn]);
  const advance=useCallback(id=>{setTables(p=>p.map(t=>{if(t.id!==id)return t;const n=Date.now();if(t.phaseIdx<0)return{...t,phaseIdx:0,phaseStart:n,guests:Math.floor(Math.random()*(t.seats-1))+2,phases:[{phaseIdx:0,start:n,duration:0}]};if(t.phaseIdx>=PHASES.length-1)return t;const nx=t.phaseIdx+1;return{...t,phaseIdx:nx,phaseStart:n,phases:[...t.phases,{phaseIdx:nx,start:n,duration:0}]};}));},[]);
  const reset=useCallback(id=>{setTables(p=>p.map(t=>t.id===id?{...t,phaseIdx:-1,phaseStart:Date.now(),guests:0,phases:[],snooze:0}:t));setSelectedId(null);},[]);
  const updateNote=useCallback((id,n)=>{setTables(p=>p.map(t=>t.id===id?{...t,note:n}:t));},[]);
  const snoozeTable=useCallback(id=>{setTables(p=>p.map(t=>t.id===id?{...t,snooze:Date.now()+5*60000}:t));},[]);
  const sel=tables.find(t=>t.id===selectedId),filtered=zone==="all"?tables:tables.filter(t=>t.zone===zone);

  return <>
    <nav className="sidebar"><div className="sidebar-logo"><div className="wordmark">Pl<span>or</span>ea</div><div className="sub">Table Tempo</div><div className="live-badge">● Live</div></div>
      <div className="sidebar-inner">
        <div className="nav-group"><div className="nav-group-label">Oversikt</div>{[{id:"floor",label:"Plantegning"},{id:"grid",label:"Bordkort"},{id:"list",label:"Listevisning"}].map(it=><a key={it.id} className={`nav-link ${view===it.id?"active":""}`} onClick={()=>setView(it.id)}><span className="dot"/>{it.label}</a>)}</div>
        <div className="nav-group"><div className="nav-group-label">Analyse</div><a className="nav-link" onClick={()=>setShowSummary(true)}><span className="dot"/>Kveldsoversikt</a></div>
        <div className="nav-group"><div className="nav-group-label">Soner</div>{["all",...Object.keys(ZONES)].map(z=><a key={z} className={`nav-link ${zone===z?"active":""}`} onClick={()=>setZone(z)}><span className="dot" style={{background:z==="all"?undefined:ZONES[z].color,opacity:zone===z?1:.5}}/>{z==="all"?"Alle soner":ZONES[z].label}</a>)}</div>
      </div>
      <div className="sidebar-footer"><button onClick={()=>setSoundOn(!soundOn)} style={{width:"100%",fontSize:11,padding:"6px 12px",background:soundOn?"rgba(107,184,218,0.1)":"rgba(218,107,107,0.1)",border:`1px solid ${soundOn?"rgba(107,184,218,0.25)":"rgba(218,107,107,0.25)"}`,borderRadius:"var(--r-sm)",color:soundOn?"var(--primary)":"var(--error)",fontWeight:600}}>{soundOn?"🔔 Lydvarsler på":"🔇 Lydvarsler av"}</button></div>
    </nav>
    <div className="main">
      <div className="top-bar"><div><div className="eyebrow">Bordets rytme</div><div className="sora" style={{fontSize:20,fontWeight:700,letterSpacing:"-0.02em",marginTop:3}}>Table Tempo</div></div><div style={{display:"flex",alignItems:"center",gap:12}}><span className="meta-tag"><span className="pip" style={{background:"var(--success)",animation:"pulse 2s ease-in-out infinite"}}/>Live</span><span className="mono" style={{fontSize:18,fontWeight:700,color:"var(--accent)"}}>{new Date(now).toLocaleTimeString("nb-NO",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}</span></div></div>
      <div className="content-area"><StatsBar tables={tables}/>
        <div style={{display:"flex",gap:14}}>
          <div style={{flex:1,minWidth:0}}>
            {view==="floor"&&<FloorPlan tables={filtered} selectedId={selectedId} onSelect={id=>setSelectedId(selectedId===id?null:id)}/>}
            {view==="grid"&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:8}}>{filtered.map(t=><div key={t.id} style={{animation:"fadeIn .3s ease"}}><TableCard table={t} selected={selectedId===t.id} onClick={()=>setSelectedId(selectedId===t.id?null:t.id)}/></div>)}</div>}
            {view==="list"&&<div className="card" style={{overflow:"hidden"}}><div style={{display:"grid",gridTemplateColumns:"44px 1fr 80px 60px 65px 50px 55px 60px",gap:6,padding:"8px 14px",fontSize:8,fontWeight:700,letterSpacing:".12em",textTransform:"uppercase",color:"var(--text-muted)",borderBottom:"2px solid var(--border-strong)",background:"var(--surface-hover)"}}><span>Bord</span><span>Fase</span><span>Tid</span><span>Total</span><span>Tempo</span><span>Gjester</span><span>Verdi</span><span>Servitør</span></div>
              {filtered.map(t=>{const tp=getTempo(t),el=t.phaseIdx>=0?Math.round(elMin(t.phaseStart)):0,tot=Math.round(t.phases.reduce((s,p)=>s+p.duration/60000,0)),srv=SERVERS.find(s=>s.id===t.server);return <div key={t.id} onClick={()=>setSelectedId(selectedId===t.id?null:t.id)} style={{display:"grid",gridTemplateColumns:"44px 1fr 80px 60px 65px 50px 55px 60px",gap:6,padding:"8px 14px",fontSize:11,alignItems:"center",cursor:"pointer",borderBottom:"1px solid var(--border)",background:selectedId===t.id?"var(--selection-bg)":"var(--surface)"}}><span className="mono" style={{fontWeight:700,color:t.phaseIdx>=0?"var(--text-primary)":"var(--text-muted)"}}>{t.name}{t.vip?" ★":""}</span><PhasePill idx={t.phaseIdx} sm/><span className="mono" style={{fontSize:10,color:"var(--text-secondary)"}}>{t.phaseIdx>=0?`${el}m/${PHASES[t.phaseIdx].targetMin}m`:"—"}</span><span className="mono" style={{fontSize:10,color:"var(--text-muted)"}}>{tot>0?`${tot}m`:"—"}</span><TempoBadge tp={tp}/><span style={{fontSize:10,color:"var(--text-secondary)",textAlign:"center"}}>{t.guests||"—"}</span><span className="mono" style={{fontSize:9,color:t.orderValue?"var(--success)":"var(--text-muted)"}}>{t.orderValue?fmtKr(t.orderValue):"—"}</span><span style={{fontSize:10,color:srv?srv.color:"var(--text-muted)"}}>{srv?srv.name:"—"}</span></div>;})}
            </div>}
          </div>
          <div style={{width:280,flexShrink:0,display:"flex",flexDirection:"column",gap:10}}>
            <CopilotPanel tables={tables}/>
            <div className="card" style={{padding:"14px 16px"}}><div className="card-label" style={{marginBottom:6}}>Prioriterte varsler</div><AlertPanel tables={tables} onSnooze={snoozeTable}/></div>
            <PhaseWave tables={tables}/>
            <PredictionPanel tables={tables}/>
            {sel&&<DetailPanel table={sel} onAdvance={advance} onReset={reset} onClose={()=>setSelectedId(null)} onNote={updateNote} onSnooze={snoozeTable} allTables={tables}/>}
          </div>
        </div>
      </div>
    </div>
    {showSummary&&<EveningSummary tables={tables} onClose={()=>setShowSummary(false)}/>}
  </>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
